<style>
  body { padding: 0 !important; }
  :root {
    --display: "Newsreader", Georgia, serif;
    --serif:   "Newsreader", Georgia, serif;
  }
  [data-dc-artboard] { background: var(--bg) !important; }
  /* v0.8.5 F5 — initial paint suppression. */

    opacity: 0;
    transition: opacity 240ms ease-out;
  }
  body.ready {
    opacity: 1;
  }
</style>

<body data-product="personal">

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="onboarding/design-canvas.jsx"></script>
<script type="text/babel" src="onboarding/parts.jsx"></script>
<script type="text/babel" src="onboarding/screens-radical.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const R = window.ScreensRadical;

  const W = 1240;
  const H = 880;

  function App() {
    return (
      <DesignCanvas
        title="Liminal · First Read · v0.1 pilot"
        subtitle="3 steps · the delta IS the onboarding · vault is born from the first correction">

        <DCSection id="firstread" title="The first read · the first correction · the first signature">
          <DCArtboard id="r01" label="01 · A read"       width={W} height={H}><R.R01_Read /></DCArtboard>
          <DCArtboard id="r02" label="02 · A correction" width={W} height={H}><R.R02_Correction /></DCArtboard>
          <DCArtboard id="r03" label="03 · A signature"  width={W} height={H}><R.R03_Signature /></DCArtboard>
        </DCSection>

      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  // v0.8.5 F5 — fade body in after React mounts
  requestAnimationFrame(() => document.body.classList.add("ready"));
</script>

</body>
