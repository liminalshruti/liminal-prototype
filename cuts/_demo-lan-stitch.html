<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo · Lan Wu · Liminal (stitch)</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230b0b0d'/%3E%3Cpath d='M16 5 27 16 16 27 5 16Z' fill='none' stroke='%23c9c4bc' stroke-width='1.6'/%3E%3C/svg%3E">

<!--
  cuts/_demo-lan-stitch.html · Tier 3 · the in-page soft-cut stitch
  ──────────────────────────────────────────────────────────────────────
  Beats 1-3 are iframed (each loaded with ?embed=1 so its own rail/note is
  suppressed; this shell owns the one master rail + presenter note). Advancing
  swaps which iframe is shown: no top-level navigation, no white flash, the
  founder never loses place. Beat 4 (PROVE) opens the deployed walkthrough in
  a new tab. The plain linker (_demo-lan.html) stays the guaranteed fallback;
  this is the upside version.
  Veracity: no em dashes, no emojis, no banned strings.
-->

<link rel="stylesheet" href="../design-system/tokens/design-tokens.css">
<link rel="stylesheet" href="../lib/cut-shell.css">
<link rel="stylesheet" href="../lib/brand-upgrade.css">

<style>
  html, body { margin: 0; background: var(--bg); height: 100%; overflow: hidden; }
  body { font-family: var(--font-mono, "Geist Mono", monospace); }

  /* master rail (owns the stitch; mirrors lib/beat-rail.js look) */
  #s-rail { position: fixed; top: 0; left: 0; right: 0; z-index: 30; display: flex; justify-content: center; pointer-events: none; }
  #s-rail .inner { pointer-events: auto; display: flex; align-items: stretch; gap: 2px; margin-top: 8px; padding: 4px;
    border: 1px solid var(--card-border, #232327); border-radius: 999px; background: rgba(10,10,11,0.86);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); box-shadow: 0 4px 20px rgba(0,0,0,0.45); }
  #s-rail .home { display: flex; align-items: center; justify-content: center; width: 26px; color: var(--cerulean, #197EEB);
    text-decoration: none; font-size: 13px; border-radius: 999px; }
  #s-rail .home:hover { background: var(--hover, rgba(255,255,255,0.06)); }
  #s-rail button.s-beat { display: flex; align-items: center; gap: 7px; padding: 5px 13px; border-radius: 999px;
    border: 0; background: transparent; cursor: pointer; color: var(--text-faint, #6B6862); font: inherit; font-size: 11px;
    letter-spacing: .08em; transition: color 180ms, background 180ms; white-space: nowrap; }
  #s-rail button.s-beat .num { font-weight: 600; opacity: .8; }
  #s-rail button.s-beat:hover { color: var(--text-dim, #9a968e); background: var(--hover, rgba(255,255,255,0.05)); }
  #s-rail button.s-beat.on { color: var(--bg, #0A0A0B); background: var(--cerulean, #197EEB); }
  #s-rail button.s-beat .ext { font-size: 9px; opacity: .7; }

  /* the iframe stage */
  #stage { position: absolute; inset: 0; }
  .frame-wrap { position: absolute; inset: 0; opacity: 0; visibility: hidden; transition: opacity 320ms ease; }
  .frame-wrap.on { opacity: 1; visibility: visible; z-index: 2; }
  .frame-wrap iframe { width: 100%; height: 100%; border: 0; display: block; background: var(--bg); }

  /* presenter note (shell-owned, mirrors lib/beat-marginalia.js) */
  #s-note { position: fixed; left: 18px; bottom: 104px; z-index: 31; max-width: 264px;
    font-family: "Caveat", var(--font-serif, cursive); font-size: 21px; line-height: 1.25; color: var(--cerulean, #197EEB);
    background: rgba(10,10,11,0.92); border-left: 2px solid var(--cerulean, #197EEB); border-radius: 0 8px 8px 0;
    padding: 11px 15px; box-shadow: 0 6px 22px rgba(0,0,0,0.5);
    opacity: 0; transform: translateY(6px); transition: opacity 260ms, transform 260ms; pointer-events: none; }
  body.note-on #s-note { opacity: 1; transform: none; }
  #s-note .sig { display: block; margin-top: 5px; font-size: 14px; color: var(--text-faint, #6B6862); }
  #s-note-toggle { position: fixed; left: 18px; bottom: 18px; z-index: 32; font-size: 12px; display: flex; align-items: center;
    gap: 7px; cursor: pointer; color: var(--text-faint, #6B6862); background: rgba(10,10,11,0.86);
    border: 1px solid var(--card-border, #232327); border-radius: 999px; padding: 6px 13px; }
  #s-note-toggle:hover { color: var(--text-dim, #9a968e); }
  body.note-on #s-note-toggle { color: var(--cerulean, #197EEB); border-color: var(--cerulean, #197EEB); }

  /* a tiny loading hint behind each iframe until it paints */
  .frame-wrap .loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: var(--text-faint, #6B6862); font-size: 12px; letter-spacing: .1em; z-index: 1; }
</style>
</head>
<body>

<nav id="s-rail" aria-label="Demo beats">
  <div class="inner">
    <a class="home" href="./_demo-lan.html" title="Plain launcher (fallback)" aria-label="Plain launcher">◇</a>
    <button class="s-beat" data-beat="1"><span class="num">1</span><span>FEEL</span></button>
    <button class="s-beat" data-beat="2"><span class="num">2</span><span>UNDERSTAND</span></button>
    <button class="s-beat" data-beat="3"><span class="num">3</span><span>PRICE</span></button>
    <button class="s-beat" data-beat="4"><span class="num">4</span><span>PROVE</span><span class="ext">tab</span></button>
  </div>
</nav>

<div id="stage">
  <div class="frame-wrap" data-beat="1"><div class="loading">loading beat 1</div></div>
  <div class="frame-wrap" data-beat="2"><div class="loading">loading beat 2</div></div>
  <div class="frame-wrap" data-beat="3"><div class="loading">loading beat 3</div></div>
</div>

<div id="s-note"><span id="s-note-text"></span><span class="sig">· sr</span></div>
<button id="s-note-toggle" aria-label="Toggle founder note"><span>✎</span><span>note</span><span> ⌘N</span></button>

<script>
(function () {
  var SRC = {
    1: 'thread/open-loops.html?embed=1',
    2: '01-slate-tray.html?embed=1',
    3: '11-govern.html?subject=spend&embed=1'
  };
  var NOTE = {
    1: 'receipted to the exact source. dismiss a wrong one, it learns your line.',
    2: 'the disagreement is the signal. i correct the read, i stay in command. local-first, signed.',
    3: 'spend is the wedge. judgment is the company. same loop, every subject.',
    4: 'refusal with receipts. notarized on a public ledger. verifiable today.'
  };
  var WALKTHROUGH = 'https://liminalshruti.github.io/algorand-berlin-2026/walkthrough.html';

  var wraps = {};
  document.querySelectorAll('.frame-wrap').forEach(function (w) { wraps[w.getAttribute('data-beat')] = w; });
  var btns = {};
  document.querySelectorAll('#s-rail .s-beat').forEach(function (b) { btns[b.getAttribute('data-beat')] = b; });
  var noteText = document.getElementById('s-note-text');
  var loaded = {};

  function ensureFrame(n) {
    if (loaded[n] || !SRC[n]) return;
    var iframe = document.createElement('iframe');
    iframe.setAttribute('title', 'Beat ' + n);
    iframe.setAttribute('loading', 'eager');
    iframe.src = SRC[n];
    wraps[n].appendChild(iframe);
    loaded[n] = true;
  }

  function show(n) {
    if (String(n) === '4') { window.open(WALKTHROUGH, '_blank', 'noopener'); return; }
    ensureFrame(n);
    // preload the next beat so advancing is instant
    ensureFrame(n + 1);
    Object.keys(wraps).forEach(function (k) { wraps[k].classList.toggle('on', k === String(n)); });
    Object.keys(btns).forEach(function (k) { btns[k].classList.toggle('on', k === String(n)); });
    btns['4'].classList.remove('on');
    if (noteText) noteText.textContent = NOTE[n] || '';
  }

  document.querySelectorAll('#s-rail .s-beat').forEach(function (b) {
    b.addEventListener('click', function () { show(b.getAttribute('data-beat')); });
  });

  // arrow-key advance (presenter convenience)
  document.addEventListener('keydown', function (e) {
    var cur = parseInt((document.querySelector('#s-rail .s-beat.on') || {}).getAttribute
      ? document.querySelector('#s-rail .s-beat.on').getAttribute('data-beat') : '1', 10) || 1;
    if (e.key === 'ArrowRight' && cur < 4) show(cur + 1);
    else if (e.key === 'ArrowLeft' && cur > 1) show(cur - 1);
  });

  // presenter note toggle (Cmd-N / click)
  function toggleNote() { document.body.classList.toggle('note-on'); }
  document.getElementById('s-note-toggle').addEventListener('click', toggleNote);
  document.addEventListener('keydown', function (e) {
    if ((e.metaKey || e.ctrlKey) && (e.key === 'n' || e.key === 'N')) { e.preventDefault(); toggleNote(); }
  });

  // start on beat 1 (or ?start=N)
  var start = parseInt(new URLSearchParams(location.search).get('start'), 10);
  show(start >= 1 && start <= 3 ? start : 1);
})();
</script>
</body>
</html>
