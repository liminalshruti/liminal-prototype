<!doctype html>
<html lang="en" data-product="business" data-density="analyst" data-relationship="operator">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cut 00 · Agency — one loop, the subject is a parameter · Liminal</title>
<!--
  Cut 00 · Agency — one loop, the subject is a parameter
  ──────────────────────────────────────────────────────────────────────
  Loop-stage · full-loop  (subject-parametric — the SUBJECTS object IS the switch)
  Altitude   · L1–L4       (spans the whole ladder via subject switch)
  Surface    · desktop
  Framing    · infra       (the substrate that travels — "one loop, every subject")
  Maturity   · refining
  Spec ref   · CUT_CONSOLIDATION_MAP.md   (NOTE: spec not in repo — orphaned ref)
  Coordinate per TAXONOMY.md v2 · THE merge-target / the loop invariant made flesh.
  Cut 00 already does what 08/09/11 + molehunt want to be: one full-loop surface
  with the subject (= altitude) as a parameter. The others are its panes.
  ──────────────────────────────────────────────────────────────────────

  Cut 00 · The Agency master. ONE shell + ONE loop; the SUBJECT is a switch (pattern · notification ·
  custody · OSINT · spend). Each subject reskins the four registers and swaps its EVIDENCE PANE — so the
  distinctive charts from cuts 01/02/08/09/11 are preserved, each as its subject's pane (the kernel travels).
  Upgraded: real Tray→Slate composition + the orbital agent-coverage viz with refusal arrows.
  Real design system: design-tokens.css + Perfectly Nineties / Geist. Spec: CUT_CONSOLIDATION_MAP.md.
  ── Switch subject (top) · drag a Tray tile → Slate (harden) · hover an agent (coverage+refusal) ·
     click a claim's cite (evidence) · Amend a read (correct) · Sign.
-->
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../design-system/tokens/design-tokens.css">
<link rel="stylesheet" href="../design-system/components/framing.css">
<style>
@font-face{font-family:"Nineties Headliner";src:url("../fonts/nineties-headliner.otf") format("opentype");font-display:swap}
@font-face{font-family:"Perfectly Nineties";src:url("../fonts/perfectly-nineties-regular.otf") format("opentype");font-weight:400;font-display:swap}
@font-face{font-family:"Perfectly Nineties";src:url("../fonts/PerfectlyNineties-Semibold.otf") format("opentype");font-weight:600;font-display:swap}
*{box-sizing:border-box}html,body{margin:0;height:100%}
/* ui-skills polish: even heading wrap / orphan-free body */
h1,h2,h3{text-wrap:balance}p{text-wrap:pretty}
/* magnetic-hover + press physics (canon-filtered: motion-only, --ease-spring, transform-only) */
button{transition:transform .22s var(--ease-spring,ease),color .15s,background .15s,border-color .15s}
button:hover{transform:translateY(-1.5px)}button:active{transform:translateY(0) scale(.97);transition-duration:.08s}
@media (prefers-reduced-motion:reduce){button{transition:color .15s,background .15s}button:hover,button:active{transform:none}}
body{background:var(--bg);color:var(--text);font:14px/1.5 var(--sans);-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;
  background-image:radial-gradient(900px 480px at 8% -6%,var(--diligence-50),transparent 60%),radial-gradient(760px 480px at 106% 4%,var(--depth-50),transparent 55%)}
/* tabular figures — AFTER the body font shorthand (which would otherwise reset font-variant-numeric) */
body{font-variant-numeric:tabular-nums}
.mono{font-family:var(--mono)}
.shell{width:min(1200px,98vw);height:min(770px,95vh);display:grid;grid-template-rows:auto 1fr auto;border:1px solid var(--card-border);border-radius:10px;overflow:hidden;background:var(--frame-bg);box-shadow:0 40px 90px rgba(0,0,0,.6);position:relative}

/* TOP RIBBON · frame + SUBJECT SWITCH */
.rb-top{display:flex;align-items:center;gap:14px;padding:9px 13px;background:var(--frame-bg-3);border-bottom:1px solid var(--frame-border);font:11px/1 var(--mono);color:var(--text-mid)}
.traffic{display:flex;gap:7px}.traffic i{width:11px;height:11px;border-radius:50%;display:block}.traffic .r{background:#ff5f57}.traffic .y{background:#febc2e}.traffic .g{background:#28c840}
.brand{display:flex;align-items:center;gap:7px;white-space:nowrap}.brand .dia{color:var(--diligence);font:15px/1 var(--display)}.brand .bc{color:var(--text-faint)}.brand b{color:var(--text);font-weight:500}
.subjects{display:flex;gap:3px;margin:0 auto;background:var(--frame-bg);border:1px solid var(--card-border);border-radius:6px;padding:3px}
.subj{font:9px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);background:transparent;border:0;border-radius:4px;padding:6px 10px;cursor:pointer;transition:.15s;white-space:nowrap}
.subj:hover{color:var(--text)}.subj.on{color:var(--bg);background:var(--diligence)}
.frame-id{font:9px/1 var(--mono);color:var(--text-faint);white-space:nowrap}.frame-id b{color:var(--text-mid)}
.cmdk{font:9px/1 var(--mono);color:var(--text-faint);border:1px solid var(--card-border);border-radius:4px;padding:6px 8px;cursor:pointer}.cmdk:hover{color:var(--text-mid)}

/* MIDDLE */
.mid{display:grid;grid-template-columns:230px 1fr 250px;min-height:0}

/* LEFT RAIL · SIGNALS — Tray → Slate composition */
.rail-l{background:var(--frame-bg-2);border-right:1px solid var(--frame-border);display:flex;flex-direction:column;overflow:hidden}
.rl-h{display:flex;align-items:center;gap:7px;padding:12px 14px 8px;font:9px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint)}
.rl-h .live{display:inline-flex;align-items:center;gap:5px;color:var(--signal);margin-left:auto}.rl-h .live::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--signal);animation:pl 1.1s var(--ease) infinite}
.slate{flex:1;margin:0 9px;border:1px dashed var(--card-border-2);border-radius:7px;padding:9px;overflow-y:auto;transition:border-color .2s,background .2s}
.slate.drop{border-color:var(--diligence);background:var(--diligence-bg)}
.slate-h{font:8px/1 var(--mono);letter-spacing:.18em;text-transform:uppercase;color:var(--text-mute);margin-bottom:7px;display:flex}.slate-h .ct{margin-left:auto;color:var(--diligence)}
.tile{border:1px solid var(--card-border);border-radius:5px;background:var(--frame-bg);padding:7px 9px;margin-bottom:6px;cursor:grab;transition:.15s}
.tile:active{cursor:grabbing}.tile.dragging{opacity:.4}
.tile .src{font:8px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint)}
.tile .nm{margin-top:3px;font:10px/1.3 var(--mono);color:var(--text-mid)}
.tile .rows{margin-top:5px;font:8.5px/1.5 var(--mono);color:var(--text-faint);display:none;border-top:1px dashed var(--card-border);padding-top:4px}.tile.open .rows{display:block}
.tile.cited{border-color:var(--diligence);background:var(--diligence-bg)}.tile.cited .src{color:var(--diligence)}.tile.cited .nm{color:var(--text)}
.tray{margin:7px 9px 0;border-top:1px solid var(--frame-border);padding:9px 0 12px}
.tray-h{font:8px/1 var(--mono);letter-spacing:.18em;text-transform:uppercase;color:var(--text-mute);padding:0 5px 7px;display:flex}.tray-h .hint{margin-left:auto;color:var(--watch);text-transform:none;letter-spacing:.04em}
.tile.tray-tile{border-style:dashed;opacity:.78}.tile.tray-tile .nm{color:var(--text-dim)}

/* CENTER · the READ */
.work{overflow-y:auto;padding:18px 24px}
.invoke{display:flex;align-items:baseline;gap:9px;font:10px/1 var(--mono);color:var(--text-faint);border-bottom:1px solid var(--card-border);padding-bottom:11px}.invoke b{color:var(--diligence);letter-spacing:.12em;text-transform:uppercase}
/* .seam — provided by design-system/components/framing.css (synced from canon) */
.subj-head{margin:2px 0 0}.subj-head .sk{font:9px/1 var(--mono);letter-spacing:.2em;text-transform:uppercase;color:var(--text-faint)}
.subj-head h2{margin:7px 0 0;font:400 22px/1.15 var(--display);color:var(--text)}
/* evidence pane (subject-specific chart) */
.evidence{margin:14px 0;border:1px solid var(--card-border);border-radius:8px;background:var(--frame-bg-2);overflow:hidden}
.ev-h{padding:9px 13px;border-bottom:1px solid var(--card-border);background:var(--frame-bg-3);font:9px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--text-mid);display:flex}.ev-h .tag{margin-left:auto;color:var(--text-faint)}
.ev-body{padding:15px}
/* — spend: alloc bar + agent-fit swap — */
.allocbar{height:26px;border-radius:4px;overflow:hidden;display:flex;border:1px solid var(--card-border);position:relative;max-width:440px;margin-bottom:16px}
.allocbar .p{background:var(--diligence);display:flex;align-items:center;padding-left:10px;font:9px/1 var(--mono);color:#fff;letter-spacing:.08em}
.allocbar .s{background:var(--depth);display:flex;align-items:center;padding-left:10px;font:9px/1 var(--mono);color:#fff;letter-spacing:.08em;position:relative}
.allocbar .ghost{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--alarm);box-shadow:0 0 0 1px var(--alarm)}.allocbar .ghost::after{content:"actual 24%";position:absolute;top:-15px;left:-25px;font:8px/1 var(--mono);color:var(--alarm);white-space:nowrap}
.swap{display:grid;grid-template-columns:1fr 24px 1fr;align-items:stretch;max-width:440px}
.swap .side{padding:11px 13px;border:1px solid var(--card-border);border-radius:5px;background:var(--frame-bg)}
.swap .side.cur{border-color:var(--alarm-edge)}.swap .side.sug{border-color:var(--connection);background:linear-gradient(180deg,var(--connection-bg),transparent)}
.swap .ro{font:8px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint)}.swap .ag{margin:6px 0 0;font:13px/1.2 var(--sans);color:var(--text);font-weight:500}.swap .co{margin-top:3px;font:9px/1.2 var(--mono);color:var(--text-dim)}
.swap .bd{display:inline-flex;align-items:center;gap:5px;margin-top:9px;font:8px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase}.swap .bd::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}.swap .cur .bd{color:var(--alarm)}.swap .sug .bd{color:var(--connection)}
.swap .arrow{display:flex;align-items:center;justify-content:center;color:var(--depth);font:15px/1 var(--mono)}
/* — custody: map + marker-rings — */
.map{width:100%;height:200px;border-radius:6px;background:radial-gradient(120% 100% at 30% 20%,#0c1622,#08080a);border:1px solid var(--card-border);display:block}
.mk{transform-box:fill-box;transform-origin:center}
.mk circle.ring{fill:none;stroke:var(--watch);stroke-width:1;opacity:.5;animation:ring 2.4s var(--ease) infinite}
.mk circle.core{fill:var(--watch)}.mk.alarm circle.ring{stroke:var(--alarm)}.mk.alarm circle.core{fill:var(--alarm)}
@keyframes ring{0%{r:3;opacity:.7}100%{r:16;opacity:0}}
.map-legend{margin-top:9px;display:flex;gap:14px;font:8.5px/1 var(--mono);letter-spacing:.08em;color:var(--text-faint)}.map-legend i{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle}
/* — OSINT: layered reads + hypothesis bar — */
.layers{display:flex;flex-direction:column;gap:8px}
.layer{display:grid;grid-template-columns:80px 1fr;gap:10px;align-items:center}
.layer .ln{font:8px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint)}
.layer .lc{font:11px/1.4 var(--mono);color:var(--text-mid);border-left:2px solid var(--depth);padding-left:9px}
.hyp{margin-top:14px}.hyp-l{display:flex;justify-content:space-between;font:8px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);margin-bottom:5px}
.hyp-bar{height:7px;border-radius:99px;background:var(--frame-bg-3);overflow:hidden;display:flex}
.hyp-bar .h1{background:var(--connection);width:62%}.hyp-bar .h2{background:var(--watch);width:26%}.hyp-bar .h3{background:var(--alarm);width:12%}
/* — notification: dense audit-trail — */
.atrail{font:10px/1 var(--mono)}
.arow{display:grid;grid-template-columns:54px 70px 1fr auto;gap:10px;align-items:baseline;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.arow .at{color:var(--text-mute)}.arow .ak{color:var(--depth);letter-spacing:.06em}.arow .ae{color:var(--text-mid)}.arow .av{color:var(--text-faint)}
.arow.contra .ae{color:var(--alarm)}.arow.match .av{color:var(--connection)}
/* — pattern: orbital coverage (shared with the agent viz) — */
.orbital-pane{display:flex;align-items:center;gap:18px}
.orb-note{font:11px/1.6 var(--serif,"Perfectly Nineties",Georgia,serif);color:var(--text-dim);flex:1}

/* the read · registers */
.reg{padding:13px 0;border-bottom:1px solid rgba(255,255,255,.03);opacity:0;transform:translateY(5px);animation:rin .5s var(--ease) forwards}
.reg .rh{display:flex;align-items:baseline;gap:9px}.reg .rname{font:10px/1 var(--mono);letter-spacing:.2em;text-transform:uppercase}.reg .rt{font:9px/1 var(--mono);color:var(--text-mute);margin-left:auto}
.reg .amend{font:8px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint);border:1px solid var(--card-border);border-radius:3px;padding:3px 6px;cursor:pointer;opacity:0;transition:.15s}.reg:hover .amend{opacity:1}.reg .amend:hover{color:var(--diligence);border-color:var(--diligence)}
.reg .rbody{margin-top:8px;font:13.5px/1.55 var(--serif,"Perfectly Nineties",Georgia,serif);color:var(--text-mid)}.reg .rbody .hl{color:var(--text)}
.reg.r0 .rname{color:var(--diligence)}.reg.r1 .rname{color:var(--depth)}.reg.r2 .rname{color:var(--judgment)}.reg.r3 .rname{color:var(--connection)}
.reg.corrected{background:linear-gradient(90deg,var(--diligence-bg),transparent 60%)}.reg .cmark{display:none;font:8px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--diligence);margin-left:7px}.reg.corrected .cmark{display:inline}
.cite{font:9px/1 var(--mono);color:var(--depth);border:1px solid var(--depth-edge);border-radius:3px;padding:2px 6px;margin-left:4px;cursor:pointer}.cite:hover{background:var(--depth-bg)}
.refusal{display:flex;gap:9px;margin:9px 0 0;padding:8px 11px;border-left:2px solid var(--judgment);background:var(--judgment-bg);border-radius:0 4px 4px 0}.refusal .ico{color:var(--judgment);font:600 12px/1.3 var(--mono)}.refusal .tx{font:11px/1.45 var(--mono);color:var(--text-mid)}.refusal .tx b{color:var(--judgment);font-weight:500}
.verdict{display:inline-flex;align-items:center;gap:8px;margin-top:4px;font:11px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--alarm);border:1px solid var(--alarm-edge);background:var(--alarm-bg);padding:7px 11px;border-radius:4px}

.dispo{display:flex;align-items:center;gap:9px;margin-top:16px;padding-top:13px;border-top:1px dashed var(--card-border-2)}
.dispo .lbl{font:9px/1 var(--mono);letter-spacing:.18em;text-transform:uppercase;color:var(--text-faint);margin-right:auto}.dispo .lbl .sub{display:block;margin-top:4px;color:var(--text-mute);font-size:8px;letter-spacing:.04em;text-transform:none}
.db{font:10px/1 var(--mono);letter-spacing:.13em;text-transform:uppercase;padding:9px 13px;border-radius:3px;border:1px solid var(--card-border);background:var(--hover);color:var(--text-mid);cursor:pointer;transition:.15s}.db:hover{color:var(--text);border-color:var(--text-faint)}
.db.sign{color:#fff;background:var(--judgment);border-color:var(--judgment)}.db.sign:hover{box-shadow:0 0 20px var(--judgment-glow);transform:translateY(-1px)}

/* RIGHT RAIL · AGENCY — orbital coverage + register list */
.rail-r{background:var(--frame-bg-2);border-left:1px solid var(--frame-border);padding:13px 0;overflow-y:auto}
.rr-h{display:flex;justify-content:space-between;padding:0 14px 9px;border-bottom:1px solid var(--frame-border);margin-bottom:6px;font:9px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint)}
.orbit-wrap{padding:6px 12px 10px;display:flex;justify-content:center}
svg.orbit{width:170px;height:170px}
svg.orbit .arc{fill:none;stroke-width:2.4;opacity:.55;transition:opacity .2s,stroke-width .2s}
svg.orbit .arc.r0{stroke:var(--diligence)}svg.orbit .arc.r1{stroke:var(--depth)}svg.orbit .arc.r2{stroke:var(--judgment)}svg.orbit .arc.r3{stroke:var(--connection)}
svg.orbit g.ag.hot .arc{opacity:1;stroke-width:4}
svg.orbit .glyph{font:7px/1 var(--mono);fill:var(--text-mid);text-transform:uppercase;letter-spacing:.1em}
svg.orbit g.ag.hot .glyph{fill:var(--text)}
svg.orbit .refuse{fill:none;stroke:var(--judgment);stroke-width:1;stroke-dasharray:2 3;opacity:0;transition:opacity .2s}
svg.orbit g.ag.hot .refuse{opacity:.8}
svg.orbit .core{fill:var(--frame-bg-3);stroke:var(--card-border);stroke-width:1}
.reglist{padding:4px 0 0}
.regblk{padding:6px 14px}
.regblk .rl{display:flex;align-items:center;gap:8px;font:9px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;cursor:default}.regblk .rl .d{width:7px;height:7px;border-radius:50%}
.regblk.r0 .rl{color:var(--diligence)}.regblk.r0 .d{background:var(--diligence)}.regblk.r1 .rl{color:var(--depth)}.regblk.r1 .d{background:var(--depth)}.regblk.r2 .rl{color:var(--judgment)}.regblk.r2 .d{background:var(--judgment)}.regblk.r3 .rl{color:var(--connection)}.regblk.r3 .d{background:var(--connection)}
.regblk .cov{margin-top:4px;padding-left:15px;font:8.5px/1.4 var(--mono);color:var(--text-faint)}.regblk .cov .rf{color:var(--judgment)}

/* BOTTOM RIBBON · chain */
.rb-bot{display:flex;align-items:center;gap:11px;padding:8px 13px;background:var(--frame-bg-3);border-top:1px solid var(--frame-border);font:9px/1 var(--mono);color:var(--text-faint);letter-spacing:.05em;overflow-x:auto}
.rb-bot .lab{color:var(--diligence);letter-spacing:.16em;text-transform:uppercase;flex-shrink:0}
.ev2{display:flex;gap:6px;align-items:baseline;flex-shrink:0}.ev2 .t{color:var(--text-mute)}.ev2 .e{color:var(--text-mid)}.ev2.ref .e{color:var(--judgment)}.ev2.corr .e{color:var(--diligence)}.ev2.fresh{animation:fr 1.6s var(--ease)}

/* DECISION LEDGER — the chain ribbon promotes into this (Sealed Stack + corrections indent + anchor lane) */
.rb-bot{cursor:pointer}
.rb-bot .open-l{margin-left:auto;flex-shrink:0;color:var(--diligence);letter-spacing:.14em;text-transform:uppercase}
.ledger{position:absolute;left:0;right:0;bottom:0;z-index:45;background:var(--frame-bg);border-top:1px solid var(--judgment);box-shadow:0 -24px 60px rgba(0,0,0,.6);transform:translateY(100%);transition:transform .32s var(--ease);max-height:80%;display:flex;flex-direction:column}
.ledger.open{transform:translateY(0)}
.ledger-h{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--card-border);background:var(--frame-bg-2)}
.ledger-h .lt{font:11px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--text-mid)}.ledger-h .lt b{color:var(--judgment)}
.ledger-h .sub{font:9px/1.3 var(--mono);color:var(--text-faint)}
.ledger-h .prove{margin-left:auto;font:9px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--depth);border:1px solid var(--depth-edge);border-radius:4px;padding:7px 11px;cursor:pointer;transition:.15s}
.ledger-h .prove:hover,.ledger-h .prove.on{background:var(--depth-bg);color:var(--text)}
.ledger-h .close{font:13px/1 var(--mono);color:var(--text-faint);cursor:pointer;padding:4px 8px}
.ledger-b{padding:16px 20px;overflow-y:auto}
.lanehd{display:none}.ledger.proving .lanehd{display:grid;grid-template-columns:1fr 190px;gap:14px;font:8px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint);max-width:760px;margin:0 auto 8px}.lanehd .a{text-align:right;color:var(--depth)}
.lgrid{display:flex;flex-direction:column;gap:10px;max-width:560px;margin:0 auto}.ledger.proving .lgrid{max-width:760px}
.lrow{display:grid;grid-template-columns:1fr;align-items:center}.ledger.proving .lrow{grid-template-columns:1fr 190px;gap:14px}
.page2{position:relative;background:var(--cream-100);color:var(--cream-800);border-radius:3px;padding:10px 13px 10px 16px;box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 8px 18px rgba(0,0,0,.4),0 0 0 3px rgba(0,0,0,.22)}
.page2::before{content:"";position:absolute;top:0;bottom:0;left:0;width:4px;border-radius:3px 0 0 3px;background:var(--text-mute)}
.page2.find::before{background:var(--connection)}.page2.corr::before{background:var(--diligence)}.page2.dec::before{background:var(--judgment);box-shadow:0 0 12px var(--judgment-glow)}.page2.refuse::before{background:var(--judgment)}.page2.anchor::before{background:var(--depth)}
.page2.corr,.page2.refuse{margin-left:22px;transform:scale(.98)}
.page2 .ph{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.page2 .k{font:7.5px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--cream-700)}
.page2 .seal{margin-left:auto;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font:8px/1 var(--mono);color:#fff;background:var(--text-mute)}
.page2.find .seal{background:#1FBA67}.page2.corr .seal{background:var(--diligence)}.page2.dec .seal,.page2.refuse .seal{background:var(--judgment)}.page2.anchor .seal{background:var(--depth)}
.page2 .pb{font:12px/1.4 var(--serif,"Perfectly Nineties",Georgia,serif);color:var(--cream-800)}
.page2 .pf{margin-top:6px;padding-top:5px;border-top:1px solid rgba(60,40,10,.18);font:7.5px/1 var(--mono);color:var(--cream-700)}
.areceipt{align-self:center;padding:8px 10px;border:1px dashed var(--depth-edge);border-radius:6px;background:var(--depth-bg);font:8px/1.4 var(--mono);color:var(--depth);text-align:center}
.areceipt.none{border-color:var(--card-border);color:var(--text-mute);background:transparent}
.toast{position:absolute;bottom:46px;left:50%;transform:translateX(-50%) translateY(8px);opacity:0;background:var(--frame-bg);border:1px solid var(--diligence);border-radius:6px;padding:9px 13px;font:10px/1.3 var(--mono);color:var(--text);box-shadow:0 12px 30px rgba(0,0,0,.5);z-index:40;transition:.2s;display:flex;gap:8px}.toast.show{opacity:1;transform:translateX(-50%)}.toast .d{color:var(--diligence)}
@keyframes rin{to{opacity:1;transform:none}}@keyframes pl{0%,100%{opacity:1}50%{opacity:.3}}@keyframes fr{0%{background:var(--diligence-bg);padding:2px 6px;border-radius:3px}100%{background:transparent;padding:0}}
@media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>

<body>
<div class="shell">
  <div class="rb-top">
    <div class="traffic"><i class="r"></i><i class="y"></i><i class="g"></i></div>
    <div class="brand"><span class="dia">◇</span><b>Liminal</b><span class="bc">·</span>Agency</div>
    <div class="subjects" id="subjects"></div>
    <div class="frame-id" id="frameid"></div>
    <div class="cmdk">⌘K</div>
  </div>
  <div class="mid">
    <aside class="rail-l"><div class="rl-h">Signals<span class="live">live</span></div>
      <div class="slate" id="slate"></div>
      <div class="tray"><div class="tray-h">Tray · diffuse<span class="hint">drag ↑ to harden</span></div><div id="tray"></div></div>
    </aside>
    <section class="work" id="work"></section>
    <aside class="rail-r" id="agency"></aside>
  </div>
  <div class="rb-bot" id="chain"></div>
  <div class="ledger" id="ledger">
    <div class="ledger-h"><span class="lt">◇ Decision <b>ledger</b></span><span class="sub">append-only · hash-linked · corrections never overwrite</span>
      <span class="prove" id="prove">⛓ prove on-chain</span><span class="close" id="lclose">✕</span></div>
    <div class="ledger-b"><div class="lanehd"><span>local-first vault</span><span class="a">algorand</span></div><div class="lgrid" id="lgrid"></div></div>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script>
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)],body=document.body;

/* ── the subject definitions: same loop, different subject (skin + signals + evidence + verdict) ── */
const SUBJECTS={
  spend:{label:'AI spend',product:'business · subject = agent fleet',
    registers:['Diligence','Synthesis','Judgment','Outreach'],
    cover:['reads the spend facts','frames vs the OKRs','the verdict + refusals','the move, drafted'],
    refuse:['won’t set policy','won’t price','won’t draft outreach','won’t judge'],
    slate:[['Claude usage','usage-events · $4,500 Opus','E01–E21 · by category'],['OKR baseline','60% product / 40% security','O1 0.6 · O2 0.4'],['GitHub','pr-evidence · PR-103','PR-103 · product · →E14'],['Registry','agent-registry · CalendarOps','verified · ~10% Opus']],
    tray:[['Security','security-tickets','12 open · P0×2'],['Access','model-access-list','cohort 7 · Opus']],
    sk:'subject · the agent fleet, this period',title:'Is the Opus 4.8 spend tracking the OKRs?',
    reads:['<span class="hl">$4,500</span> of Opus spend across 7 engineers <span class="cite" data-c="0">usage-events</span>. Product 56% · security 24% · calendar/admin 11%.','Against <span class="hl">60/40</span> <span class="cite" data-c="1">okr-baseline</span> — security under-allocated, frontier spend leaking to cheap work.','VERDICT','Route calendar to <span class="hl">CalendarOps</span> <span class="cite" data-c="3">agent-registry</span> — verified, ~10% of Opus.'],
    verdict:'⚠ Not ready · 2 fixes · 1 correction',
    refusalLine:'<b>Exec-comms refused — not its lane.</b> It won’t draft until Judgment clears. The boundary working, logged.',
    evidence:'spend'},
  custody:{label:'Custody',product:'defense · subject = a contested location',
    registers:['Custody','Trial','Verdict','Review'],
    cover:['holds the evidence','tries the hypothesis','the disposition','process audit'],
    refuse:['won’t conclude','won’t publish','won’t re-open','won’t read content'],
    slate:[['SIGINT','intercept · strait transit','3 vessels · AIS dark'],['IMINT','overhead · 04:12Z','marker δ moved 2nm'],['Pattern','prior transits','7 in 30d · 2 dark']],
    tray:[['HUMINT','source note','low confidence'],['OSINT','port records','partial']],
    sk:'subject · a contested maritime location',title:'Custody read · strait transit anomaly',
    reads:['Three vessels transited <span class="hl">AIS-dark</span> <span class="cite" data-c="0">IMINT</span>; marker δ shifted 2nm overnight.','Hypothesis: coordinated dark transit — <span class="hl">tried against</span> 7 prior transits <span class="cite" data-c="2">Pattern</span>.','VERDICT','Custody held; recommend escalate to watch-officer, not publish.'],
    verdict:'◆ Hold · escalate · do not publish',
    refusalLine:'<b>Review refused to read content — process only.</b> Oversight sees the chain, not the intercept. The privacy boundary, structural.',
    evidence:'custody'},
  osint:{label:'OSINT',product:'open-source · subject = a claim',
    registers:['Diligence','Redteam','Reconcile','Decide'],
    cover:['gathers sources','attacks the claim','settles the posterior','the call'],
    refuse:['won’t opine','won’t confirm','won’t source','won’t gather'],
    slate:[['Source A','primary doc','filed Nov 12'],['Source B','corroborator','independent'],['Redteam','counter-evidence','1 strong']],
    tray:[['Source C','weak signal','single-sourced'],['Archive','prior reads','3']],
    sk:'subject · an open-source claim',title:'OSINT read · the contested assertion',
    reads:['Two independent sources support the claim <span class="cite" data-c="0">Source A</span>; one is primary.','Redteam found <span class="hl">one strong counter</span> <span class="cite" data-c="2">Redteam</span> — the timeline doesn’t reconcile.','VERDICT','Posterior 62% true · 26% partial · 12% false — decide: partial, with the contradiction flagged.'],
    verdict:'▲ Partial · contradiction unresolved',
    refusalLine:'<b>Decide refused to upgrade past the evidence.</b> The counter doesn’t reconcile, so the posterior stays split. Refusal as honesty.',
    evidence:'osint'},
  notice:{label:'Notification',product:'operator · subject = a contradicting notice',
    registers:['Forensic','Judgment','Outreach','Operations'],
    cover:['authenticates','verdicts the contradiction','drafts the response','schedules + vaults'],
    refuse:['won’t interpret','won’t send','won’t conclude','won’t verdict'],
    slate:[['Email','rejection notice','DKIM pass'],['Dashboard','live app state','still "in review"'],['Vault','prior decisions','application v1']],
    tray:[['CRM','HubSpot internals','X-HS-Cid'],['Calendar','window SLA','14d stated']],
    sk:'subject · a notice that contradicts your records',title:'Diligence · routing-mismatch notice',
    reads:['Email DKIM/SPF <span class="hl">pass</span> <span class="cite" data-c="0">Email</span>, but recipient routed to the catch-all, not the founder address.','The notice says "rejected"; the dashboard <span class="hl">still shows in-review</span> <span class="cite" data-c="1">Dashboard</span> — they contradict.','VERDICT','Draft a clarification to the partner; hold the silent-wait until the window closes.'],
    verdict:'⚠ Real-but-contradicted · 1 action',
    refusalLine:'<b>Operations refused to vault before Judgment.</b> Nothing is recorded until the contradiction is verdicted. Order preserved.',
    evidence:'notice'},
  pattern:{label:'Your pattern',product:'personal · subject = you',
    registers:['Diligence','Synthesis','Judgment','Outreach'],
    cover:['reads your week','frames the shape','what it means','the gentle next move'],
    refuse:['won’t diagnose','won’t prescribe','won’t score','won’t advise'],
    slate:[['Granola','partner call · Tue','coffee · Northstar'],['Git','feat: bounded refusal','shipped'],['Calendar','the week','dense']],
    tray:[['Notes','obsidian','3 edits'],['Messages','the thread','open loop']],
    sk:'subject · your own week, read back',title:'Your pattern · what this week held',
    reads:['A heavy build week <span class="cite" data-c="1">Git</span> with one high-stakes partner call <span class="cite" data-c="0">Granola</span>.','The shape: output high, but the open loop with the partner is unclosed — that’s the weight.','VERDICT','Not a problem to fix — a thread to close. One message clears it.','Drafted, in your voice — short, no hedging. Yours to send.'],
    verdict:'◍ Read · one open loop',
    refusalLine:'<b>Judgment refused to diagnose.</b> It reads the shape and names the loop; it won’t pathologize. The anti-domain, held.',
    evidence:'pattern'},
};
const ORDER=['pattern','notice','custody','osint','spend'];
let CUR='spend',corrections=0,signed=false;
const CHAIN=[['14:31','signals captured',''],['14:32','registers read',''],['14:32','refusal logged','ref'],['14:32','verdict reached','']];

/* ── evidence panes (the preserved charts, one per subject) ── */
function evidencePane(kind){
  if(kind==='spend')return `<div class="ev-h">Evidence · spend vs OKR<span class="tag">recomputed</span></div><div class="ev-body">
    <div class="allocbar"><div class="p" style="width:60%">product 60%</div><div class="s" style="width:40%">security 40%<span class="ghost"></span></div></div>
    <div class="swap"><div class="side cur"><span class="ro">current</span><div class="ag">Opus 4.8</div><div class="co">calendar · high tier</div><span class="bd">out of scope</span></div><div class="arrow">→</div><div class="side sug"><span class="ro">suggested</span><div class="ag">CalendarOps</div><div class="co">~10% · scoped</div><span class="bd">verified</span></div></div></div>`;
  if(kind==='custody')return `<div class="ev-h">Evidence · the contested location<span class="tag">IMINT + pattern</span></div><div class="ev-body">
    <svg class="map" viewBox="0 0 440 200"><path d="M0,150 Q80,120 140,140 T260,120 Q320,110 360,135 L440,120 L440,200 L0,200 Z" fill="#0e1a26" stroke="var(--card-border-2)"/><path d="M150,0 Q180,60 160,110 Q150,140 175,200" fill="none" stroke="var(--card-border-2)" stroke-dasharray="3 4"/><text x="186" y="40" class="glyph" fill="var(--text-faint)" font-size="8" font-family="var(--mono)">STRAIT</text>
      <g class="mk alarm" transform="translate(210,108)"><circle class="ring" r="3"/><circle class="core" r="3"/></g>
      <g class="mk" transform="translate(255,96)"><circle class="ring" r="3"/><circle class="core" r="3"/></g>
      <g class="mk" transform="translate(300,124)"><circle class="ring" r="3"/><circle class="core" r="3"/></g></svg>
    <div class="map-legend"><span><i style="background:var(--alarm)"></i>marker δ · moved 2nm</span><span><i style="background:var(--watch)"></i>AIS-dark transit</span></div></div>`;
  if(kind==='osint')return `<div class="ev-h">Evidence · layered reads + posterior<span class="tag">3 sources</span></div><div class="ev-body">
    <div class="layers"><div class="layer"><span class="ln">Primary</span><span class="lc">Source A · filed Nov 12 · supports</span></div><div class="layer"><span class="ln">Corrob.</span><span class="lc">Source B · independent · supports</span></div><div class="layer"><span class="ln">Counter</span><span class="lc" style="border-color:var(--alarm)">Redteam · timeline doesn’t reconcile</span></div></div>
    <div class="hyp"><div class="hyp-l"><span>posterior</span><span>true 62 · partial 26 · false 12</span></div><div class="hyp-bar"><div class="h1"></div><div class="h2"></div><div class="h3"></div></div></div></div>`;
  if(kind==='notice')return `<div class="ev-h">Evidence · the contradiction, authenticated<span class="tag">forensic</span></div><div class="ev-body">
    <div class="atrail">
      <div class="arow match"><span class="at">04:12</span><span class="ak">DKIM</span><span class="ae">signature valid · sender authentic</span><span class="av">pass</span></div>
      <div class="arow"><span class="at">04:12</span><span class="ak">ROUTE</span><span class="ae">to catch-all@ — not founder@</span><span class="av">anomaly</span></div>
      <div class="arow contra"><span class="at">04:13</span><span class="ak">STATE</span><span class="ae">notice "rejected" vs dashboard "in-review"</span><span class="av">contradiction</span></div>
      <div class="arow"><span class="at">04:13</span><span class="ak">SLA</span><span class="ae">stated review window · 14d · not elapsed</span><span class="av">open</span></div></div></div>`;
  if(kind==='pattern')return `<div class="ev-h">Evidence · the week, as coverage<span class="tag">your signals</span></div><div class="ev-body"><div class="orbital-pane">${orbitSVG(true)}<p class="orb-note">Four registers traversed the same week from different positions. Diligence read the facts; Synthesis found the shape; Judgment named the open loop and <em>refused to pathologize it</em>. The coverage is what was read — the gaps are what was refused.</p></div></div>`;
  return '';
}

/* ── the orbital agent-coverage viz (shared: right rail + the pattern evidence pane) ── */
function orbitSVG(big){
  const S=SUBJECTS[CUR], R=S.registers, cx=85,cy=85,rad=60;
  // four 80° arcs, one per register, centered at top/right/bottom/left
  const arc=(i)=>{const a0=(i*90-40)*Math.PI/180,a1=(i*90+40)*Math.PI/180;
    const x0=cx+rad*Math.cos(a0),y0=cy+rad*Math.sin(a0),x1=cx+rad*Math.cos(a1),y1=cy+rad*Math.sin(a1);
    return `M ${x0.toFixed(1)} ${y0.toFixed(1)} A ${rad} ${rad} 0 0 1 ${x1.toFixed(1)} ${y1.toFixed(1)}`;};
  const lx=(i)=>cx+(rad+13)*Math.cos(i*90*Math.PI/180), ly=(i)=>cy+(rad+13)*Math.sin(i*90*Math.PI/180);
  // refusal arrow: short dashed line pointing inward (anti-domain) from each arc midpoint
  const rfx=(i)=>cx+(rad-16)*Math.cos(i*90*Math.PI/180), rfy=(i)=>cy+(rad-16)*Math.sin(i*90*Math.PI/180);
  const ax=(i)=>cx+rad*Math.cos(i*90*Math.PI/180), ay=(i)=>cy+rad*Math.sin(i*90*Math.PI/180);
  return `<svg class="orbit" viewBox="0 0 170 170">
    <circle class="core" cx="${cx}" cy="${cy}" r="30"/>
    <text x="${cx}" y="${cy-2}" text-anchor="middle" class="glyph" style="fill:var(--text-faint)">${S.label}</text>
    <text x="${cx}" y="${cy+8}" text-anchor="middle" class="glyph" style="fill:var(--text-mute);font-size:6px">subject</text>
    ${R.map((nm,i)=>`<g class="ag r${i}" data-ag="${i}">
      <path class="arc r${i}" d="${arc(i)}"/>
      <line class="refuse" x1="${ax(i).toFixed(1)}" y1="${ay(i).toFixed(1)}" x2="${rfx(i).toFixed(1)}" y2="${rfy(i).toFixed(1)}"/>
      <text class="glyph" x="${lx(i).toFixed(1)}" y="${(ly(i)+2).toFixed(1)}" text-anchor="middle">${nm.slice(0,4)}</text></g>`).join('')}
  </svg>`;
}

/* ── renderers ── */
function renderSubjects(){$('#subjects').innerHTML=ORDER.map(k=>`<button class="subj ${k===CUR?'on':''}" data-subj="${k}">${SUBJECTS[k].label}</button>`).join('');}
function renderSlate(){const S=SUBJECTS[CUR];
  $('#slate').innerHTML=`<div class="slate-h">Slate · being read<span class="ct">${S.slate.length}</span></div>`+
    S.slate.map((t,i)=>tileHTML(t,i,false)).join('');
  $('#tray').innerHTML=S.tray.map((t,i)=>tileHTML(t,i+100,true)).join('');}
const tileHTML=(t,i,tray)=>`<div class="tile ${tray?'tray-tile':''}" draggable="true" data-tile="${i}"><span class="src">${t[0]}</span><div class="nm">${t[1]}</div><div class="rows">${t[2]}</div></div>`;
function renderAgency(){const S=SUBJECTS[CUR];
  $('#agency').innerHTML=`<div class="rr-h"><span>Agency · ${S.product.split('·')[0].trim()}</span></div>
    <div class="orbit-wrap">${orbitSVG()}</div>
    <div class="reglist">${S.registers.map((nm,i)=>`<div class="regblk r${i}" data-ag="${i}"><div class="rl"><span class="d"></span>${nm}</div><div class="cov">${S.cover[i]}<br><span class="rf">⊘ ${S.refuse[i]}</span></div></div>`).join('')}</div>`;}
function renderChain(){$('#chain').innerHTML=`<span class="lab">chain</span>`+CHAIN.map((e,i)=>`<span class="ev2 ${e[2]} ${i===CHAIN.length-1&&e[3]==='new'?'fresh':''}"><span class="t">${e[0]}</span><span class="e">${e[1]}</span></span>`).join('')+`<span class="ev2 open-l">▲ ledger</span>`;$('#chain').scrollLeft=99999;if($('#ledger').classList.contains('open'))renderLedger();}
const HASHES=['a1f2…9c','b3e8…d1','7d4b…a284','c9a0…7f','e5d1…3b','f2c8…6a','11ab…4d','9f0e…2c','42de…7e','aa01…5f'];
const hashOf=i=>HASHES[i]||('h'+i+'…x');
function ledgerKind(e){const x=(e[1]||'').toLowerCase();
  if(x.includes('anchor')||x.includes('sealed'))return 'anchor';
  if(x.includes('verdict')||x.includes('ratified'))return 'dec';
  if(e[2]==='ref'||x.includes('refus'))return 'refuse';
  if(e[2]==='corr'||x.includes('correction')||x.includes('hardened'))return 'corr';
  return 'find';}
const LK={find:['finding','✓'],corr:['correction','✎'],dec:['verdict','◇'],refuse:['refusal','⊘'],anchor:['anchored','⛓']};
function renderLedger(){const proving=$('#ledger').classList.contains('proving');
  $('#lgrid').innerHTML=CHAIN.map((e,i)=>{const k=ledgerKind(e),[label,glyph]=LK[k];
    const prev=i>0?` ← ${hashOf(i-1)}`:'';
    const anchored=(k==='dec'||k==='anchor');
    const rec=proving?(anchored?`<div class="areceipt">anchored<br>txn LIM…${(0x4002+i).toString(16).toUpperCase()}</div>`:`<div class="areceipt none">local-first<br>not yet anchored</div>`):'';
    return `<div class="lrow"><div class="page2 ${k}"><div class="ph"><span class="k">${label}</span><span class="seal">${glyph}</span></div><div class="pb">${e[1]}</div><div class="pf">sha ${hashOf(i)}${prev}</div></div>${rec}</div>`;}).join('');}
function openLedger(){$('#ledger').classList.add('open');renderLedger();}
function renderRead(){const S=SUBJECTS[CUR];
  const regHTML=S.registers.map((nm,i)=>{
    if(S.reads[i]==='VERDICT')return `<div class="reg r${i}" data-reg="${i}" style="animation-delay:${.1+i*.16}s"><div class="rh"><span class="rname">${nm}</span><span class="rt">verdict</span></div>
      <div class="rbody"><span class="verdict">${S.verdict}</span><div class="refusal"><span class="ico">⊘</span><span class="tx">${S.refusalLine}</span></div></div></div>`;
    return `<div class="reg r${i}" data-reg="${i}" style="animation-delay:${.1+i*.16}s"><div class="rh"><span class="rname">${nm}</span><span class="cmark">· corrected</span><span class="rt">+${(0.4+i*1.5).toFixed(1)}s</span><span class="amend" data-amend="${i}">Amend read</span></div>
      <div class="rbody">${S.reads[i]}</div></div>`;}).join('');
  $('#work').innerHTML=`<div class="invoke"><b>/agency invoked</b><span>reading · ${S.product}</span></div>
    <div class="seam">Switch the subject above — spend, custody, OSINT, a notice, your own week — and the four registers reskin, but the loop never changes: read · judge · refuse · correct · sign. <b>That invariance is the product. Not five tools — one substrate, pointed at whatever's in front of you.</b></div>
    <div class="subj-head"><span class="sk">${S.sk}</span><h2>${S.title}</h2></div>
    <div class="evidence">${evidencePane(S.evidence)}</div>
    ${regHTML}
    <div class="dispo"><span class="lbl">Disposition<span class="sub" id="cc">${corrections} corrections · the read is the model’s until you change it</span></span>
      <button class="db" data-act="defer">Defer</button><button class="db sign" data-act="sign">${corrections?'Correct → ':''}Sign &amp; hand off</button></div>
    <div id="artwrap"></div>`;
}
function renderFrame(){$('#frameid').innerHTML=SUBJECTS[CUR].product;}

function go(k){CUR=k;corrections=0;signed=false;
  CHAIN.length=4; $('#ledger').classList.remove('open','proving');$('#prove')&&$('#prove').classList.remove('on');
  renderSubjects();renderFrame();renderSlate();renderAgency();renderRead();renderChain();
  toast('Subject → '+SUBJECTS[k].label+' · same loop, reskinned');}

/* ── interactions ── */
function toast(m){const t=$('#toast');t.innerHTML='<span class="d">◇</span>'+m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2400);}
function recordCorrection(w){corrections++;CHAIN.push(['14:3'+(3+corrections),'correction · '+w,'corr','new']);renderChain();const cc=$('#cc');if(cc)cc.textContent=corrections+' correction'+(corrections>1?'s':'')+' · this is YOUR read now';const sb=$('.db.sign');if(sb&&!signed)sb.textContent='Correct → Sign & hand off';toast('Correction recorded · appended to the chain (never overwrites)');}
function sign(){if(signed)return;signed=true;CHAIN.push(['14:36','sealed · anchored · chain verified','corr','new']);renderChain();
  $('#artwrap').innerHTML=`<div style="margin-top:14px;border-left:3px solid var(--judgment);background:var(--judgment-bg);border-radius:0 6px 6px 0;padding:13px 16px"><div style="font:9px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--judgment)">sealed${corrections?' · with '+corrections+' correction'+(corrections>1?'s':''):''}</div><div style="margin-top:8px;font:13px/1.5 var(--serif,Georgia,serif);color:var(--text)">${SUBJECTS[CUR].verdict.replace(/^[^ ]+ /,'')} — handed off, anchored to the chain. Reversible by correction (append-only).</div></div>`;
  const sb=$('.db.sign');if(sb)sb.style.display='none';toast('Sealed & handed off · the loop will return it in Today');}

document.addEventListener('click',e=>{
  if(e.target.closest('#prove')){const l=$('#ledger');l.classList.toggle('proving');$('#prove').classList.toggle('on');renderLedger();return;}
  if(e.target.closest('#lclose')){$('#ledger').classList.remove('open','proving');$('#prove').classList.remove('on');return;}
  if(e.target.closest('#chain')){openLedger();return;}
  if(e.target.closest('#artwrap')&&$('#artwrap').innerHTML.trim()){openLedger();return;}
  const s=e.target.closest('[data-subj]');if(s){go(s.dataset.subj);return;}
  const cite=e.target.closest('[data-c]');if(cite){highlight(+cite.dataset.c);return;}
  const am=e.target.closest('[data-amend]');if(am){const r=$(`.reg[data-reg="${am.dataset.amend}"]`);r.classList.add('corrected');recordCorrection(SUBJECTS[CUR].registers[am.dataset.amend]+' read');return;}
  const tl=e.target.closest('.tile');if(tl&&!tl.classList.contains('tray-tile')){tl.classList.toggle('open');return;}
  const act=e.target.closest('[data-act]');if(act){act.dataset.act==='sign'?sign():toast('Deferred · returns in Today');return;}
});
function highlight(i){$$('.tile').forEach(t=>t.classList.remove('cited'));const t=$(`.tile[data-tile="${i}"]`);if(t){t.classList.add('cited','open');}}
// agent hover → light its coverage + the signals it reads
document.addEventListener('mouseover',e=>{const a=e.target.closest('[data-ag]');if(a){const i=a.dataset.ag;$$('svg.orbit g.ag').forEach(g=>g.classList.toggle('hot',g.dataset.ag===i));$$('.regblk').forEach(b=>b.style.opacity=b.dataset.ag===i?'1':'.5');}});
document.addEventListener('mouseout',e=>{if(e.target.closest('[data-ag]')){$$('svg.orbit g.ag').forEach(g=>g.classList.remove('hot'));$$('.regblk').forEach(b=>b.style.opacity='1');}});
// Tray → Slate drag (harden)
let dragId=null;
document.addEventListener('dragstart',e=>{const t=e.target.closest('.tile');if(t){dragId=t.dataset.tile;t.classList.add('dragging');}});
document.addEventListener('dragend',e=>{const t=e.target.closest('.tile');if(t)t.classList.remove('dragging');});
const slate=$('#slate');
slate.addEventListener('dragover',e=>{e.preventDefault();slate.classList.add('drop');});
slate.addEventListener('dragleave',()=>slate.classList.remove('drop'));
slate.addEventListener('drop',e=>{e.preventDefault();slate.classList.remove('drop');
  const S=SUBJECTS[CUR];const idx=+dragId-100;if(idx>=0&&S.tray[idx]){const t=S.tray.splice(idx,1)[0];S.slate.push(t);renderSlate();CHAIN.push(['14:3'+(3+corrections),'slate · hardened '+t[0],'corr','new']);renderChain();toast('Hardened '+t[0]+' onto the slate — the agents now read it');}});

go('spend');
</script>
</body>
</html>
