<!doctype html>
<html lang="en" data-product="business" data-density="analyst" data-relationship="operator">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cut 00 · Agency Sam-Seed · One Loop, One Operator, Six Stages · Liminal</title>
<!--
  Cut 00 · Agency Sam-Seed Storyboard
  ──────────────────────────────────────────────────────────────────────
  Loop-stage   · entry → capture → read → contradiction → reframe → resolution
  Framing      · one continuous surface, six regions, ONE visual language
  Design canon · Nineties Headliner + Perfectly Nineties + Geist Mono
  Data source  · data/sam-seed.js (SAM_SEED object)
  Loop state   · lib/sam-seed-loop.js (createSamSeedLoop)
  Elevation    · premium operator-tool aesthetic — Bloomberg terminal designed by an artist
  ──────────────────────────────────────────────────────────────────────

  The Sam-seed situation: IC pen-test lead discovers that a 1,000-finding
  triage crisis is NOT a skill problem (team failure) but a SYSTEM problem
  (coordination debt). Bounded agents read the mess, contradictions surface
  where logic breaks, the reframe FLIPS from accusation ("you guys failed")
  to optimization ("we need observability + shared definitions"), and Sam
  lands a path that keeps trust intact.

  This surface plays the whole journey in one continuous scroll/sequence,
  with seamless visual transitions between stages. The reframe is the
  emotional center — the visual turn IS the payoff.
-->
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Geist Mono is the only Google-Fonts dependency (canon). Display + serif are LOCAL @font-face below (Nineties Headliner / Perfectly Nineties). -->
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../design-system/tokens/design-tokens.css">
<style>
@font-face{font-family:"NinetiesHeadliner";src:url("../fonts/nineties-headliner.otf") format("opentype");font-weight:700;font-style:normal;font-display:swap}
@font-face{font-family:"Perfectly Nineties";src:url("../fonts/perfectly-nineties-regular.otf") format("opentype");font-weight:400;font-display:swap}
@font-face{font-family:"Perfectly Nineties";src:url("../fonts/PerfectlyNineties-Semibold.otf") format("opentype");font-weight:600;font-display:swap}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
body{
  display:flex;align-items:flex-start;justify-content:center;
  padding:40px 20px;background-image:
    radial-gradient(900px 480px at 8% -6%,var(--clarity-50),transparent 60%),
    radial-gradient(760px 480px at 106% 4%,var(--depth-50),transparent 55%);
  font-variant-numeric:tabular-nums;
}
h1,h2,h3,h4{text-wrap:balance}
p{text-wrap:pretty}
button{cursor:pointer;transition:transform .22s var(--ease),color .15s,background .15s,border-color .15s}
button:hover{transform:translateY(-1.5px)}
button:active{transform:scale(.97);transition-duration:.08s}
@media (prefers-reduced-motion:reduce){button{transition:color .15s,background .15s}button:hover,button:active{transform:none}}

/* ─ Container & Grid ─ */
.shell{
  width:100%;max-width:1180px;margin:0 auto;
  background:var(--frame-bg);border:1px solid var(--frame-border);border-radius:8px;
  overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.5);
}

/* ─ Top Bar ─ */
.rb-top{
  display:flex;align-items:center;gap:16px;padding:12px 20px;
  background:var(--frame-bg-2);border-bottom:1px solid var(--frame-border);
  font:9px/1 var(--mono);letter-spacing:.16em;color:var(--text-faint);
}
.rb-top .brand{display:flex;align-items:center;gap:8px;color:var(--text);font-weight:500}
.rb-top .brand .dia{color:var(--clarity)}.rb-top .brand .bc{color:var(--text-faint)}
.rb-top .stage-tag{margin-left:auto;display:flex;align-items:center;gap:6px;padding:4px 10px;
  border:1px solid var(--diligence-edge);border-radius:4px;background:var(--diligence-bg);color:var(--diligence);}
.rb-top .stage-tag .dot{width:4px;height:4px;border-radius:50%;background:currentColor;animation:pl 1.2s var(--ease) infinite}

/* ─ Main content area ─ */
.content{
  flex:1;overflow-y:auto;padding:24px 32px;
  max-height:calc(100vh - 200px);
}

/* ─ Stage regions (seamless transitions) ─ */
.stage-region{
  margin-bottom:0;padding-bottom:32px;border-bottom:1px solid var(--frame-border);
  opacity:1;animation:fadeIn .4s var(--ease) forwards;
}
.stage-region:last-child{border-bottom:none;padding-bottom:0}
@keyframes fadeIn{from{opacity:.7;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ─ Entry Stage ─ */
.stage-entry .sk{
  font:9px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px;
}
.stage-entry h1{
  font:64px/1 var(--display);color:var(--text);margin-bottom:12px;font-weight:400;
}
.stage-entry .crisis-summary{
  font:14px/1.6 var(--serif);color:var(--text-mid);max-width:680px;margin-bottom:20px;
}
.stage-entry .operator-intro{
  display:flex;align-items:baseline;gap:12px;padding:16px;background:var(--frame-bg-3);border:1px solid var(--card-border);border-radius:6px;margin-bottom:24px;
}
.stage-entry .operator-intro .label{font:9px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint);min-width:80px}
.stage-entry .operator-intro .content{font:13px/1.4 var(--serif);color:var(--text)}

/* ─ Capture Stage ─ */
.stage-capture .sk{
  font:9px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px;
}
.stage-capture h2{
  font:36px/1.1 var(--display);color:var(--text);margin-bottom:20px;font-weight:400;
}
.stage-capture .tiles-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-bottom:20px;
}
.tile-card{
  border:1px solid var(--card-border);border-radius:6px;background:var(--frame-bg);padding:14px;
  transition:.15s;cursor:grab;user-select:none;
}
.tile-card:hover{background:var(--frame-bg-3);border-color:var(--clarity-edge)}
.tile-card:active{cursor:grabbing}
.tile-card .tile-src{font:8px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);margin-bottom:6px}
.tile-card .tile-nm{font:12px/1.2 var(--sans);font-weight:500;color:var(--text);margin-bottom:8px}
.tile-card .tile-desc{font:11px/1.4 var(--mono);color:var(--text-dim)}

/* ─ Read Stage ─ */
.stage-read .sk{
  font:9px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px;
}
.stage-read h2{
  font:36px/1.1 var(--display);color:var(--text);margin-bottom:24px;font-weight:400;
}
.agent-reads{
  display:flex;flex-direction:column;gap:16px;
}
.agent-read{
  padding:16px;border-left:3px solid var(--frame-border);background:var(--frame-bg-3);border-radius:0 4px 4px 0;
  animation:slideIn .5s var(--ease) forwards;opacity:0;
}
.agent-read:nth-child(1){animation-delay:0s}
.agent-read:nth-child(2){animation-delay:.1s}
.agent-read:nth-child(3){animation-delay:.2s}
.agent-read:nth-child(4){animation-delay:.3s}
@keyframes slideIn{from{opacity:.5;transform:translateX(-8px)}to{opacity:1;transform:none}}
.agent-read .agent-header{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
.agent-read .agent-register{
  font:9px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;font-weight:600;padding:4px 8px;
  border-radius:3px;
}
.agent-read.reg-diligence .agent-register{color:var(--diligence);background:var(--diligence-bg)}
.agent-read.reg-judgment .agent-register{color:var(--judgment);background:var(--judgment-bg)}
.agent-read.reg-outreach .agent-register{color:var(--outreach);background:var(--outreach-bg)}
.agent-read.reg-synthesis .agent-register{color:var(--synthesis);background:var(--synthesis-bg)}
.agent-read .agent-confidence{
  margin-left:auto;font:8px/1 var(--mono);color:var(--text-faint);
}
.agent-read .agent-text{
  font:13px/1.55 var(--serif);color:var(--text-mid);line-height:1.6;
}

/* ─ Contradiction Stage ─ */
.stage-contradiction .sk{
  font:9px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--alarm);margin-bottom:8px;
}
.stage-contradiction h2{
  font:36px/1.1 var(--display);color:var(--text);margin-bottom:20px;font-weight:400;
}
.contradictions-list{
  display:flex;flex-direction:column;gap:16px;
}
.contradiction-pair{
  border:1px solid var(--alarm-edge);border-radius:6px;background:var(--alarm-bg);padding:16px;
}
.contradiction-pair .agents{
  display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;
  font:11px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);
}
.contradiction-pair .agents .agent-name{color:var(--text-mid);font-weight:500}
.contradiction-pair .agents .vs{color:var(--alarm);font-weight:600}
.contradiction-pair .on{
  font:13px/1.5 var(--serif);color:var(--text-mid);margin-bottom:12px;
}
.contradiction-pair .productive{
  font:12px/1.4 var(--serif);color:var(--text);padding:12px;background:var(--frame-bg);border-radius:4px;border-left:2px solid var(--connection);
}

/* ─ Reframe Stage (THE EMOTIONAL TURN) ─ */
.stage-reframe .sk{
  font:9px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--wholeness);margin-bottom:8px;
}
.stage-reframe h2{
  font:36px/1.1 var(--display);color:var(--wholeness);margin-bottom:24px;font-weight:400;
}
.reframe-journey{
  display:grid;grid-template-columns:1fr auto 1fr;gap:20px;align-items:stretch;
}
.reframe-frame{
  padding:20px;border-radius:6px;border:1px solid var(--card-border);background:var(--frame-bg-3);
}
.reframe-frame.from{border-color:var(--alarm-edge);background:var(--alarm-bg)}
.reframe-frame.to{border-color:var(--wholeness-edge);background:var(--wholeness-bg)}
.reframe-frame .label{
  font:9px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;
  color:var(--text-faint);display:block;
}
.reframe-frame.from .label{color:var(--alarm)}
.reframe-frame.to .label{color:var(--wholeness)}
.reframe-frame .content{
  font:13px/1.55 var(--serif);color:var(--text-mid);line-height:1.6;
}
.reframe-arrow{
  display:flex;align-items:center;justify-content:center;
  font:32px/1 var(--mono);color:var(--synthesis);
  animation:pulse-arrow 1.6s var(--ease) infinite;
}
@keyframes pulse-arrow{
  0%,100%{opacity:.6;transform:scaleX(1)}
  50%{opacity:1;transform:scaleX(1.2)}
}
.reframe-emotional{
  grid-column:1/-1;margin-top:16px;padding:16px;border-left:3px solid var(--wholeness);background:var(--wholeness-soft);border-radius:0 4px 4px 0;
}
.reframe-emotional .label{
  font:9px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--wholeness);margin-bottom:8px;
}
.reframe-emotional .content{
  font:13px/1.5 var(--serif);color:var(--text);font-style:italic;
}

/* ─ Resolution Stage ─ */
.stage-resolution .sk{
  font:9px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--outreach);margin-bottom:8px;
}
.stage-resolution h2{
  font:36px/1.1 var(--display);color:var(--text);margin-bottom:20px;font-weight:400;
}
.resolution-path{
  padding:20px;border:1px solid var(--outreach-edge);border-radius:6px;background:var(--outreach-bg);margin-bottom:16px;
}
.resolution-path .feeling{
  font:11px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--outreach);margin-bottom:12px;
}
.resolution-path .content{
  font:13px/1.55 var(--serif);color:var(--text-mid);line-height:1.65;
}

/* ─ Bottom ribbon ─ */
.rb-bot{
  display:flex;align-items:center;gap:12px;padding:12px 20px;
  background:var(--frame-bg-2);border-top:1px solid var(--frame-border);
  font:9px/1 var(--mono);letter-spacing:.12em;color:var(--text-faint);
}
.rb-bot .adv-ctrl{
  margin-left:auto;display:flex;gap:8px;
}
.adv-btn{
  padding:6px 12px;border:1px solid var(--card-border);border-radius:4px;background:var(--frame-bg);
  color:var(--text);font:9px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;
  transition:.15s;
}
.adv-btn:hover{border-color:var(--clarity);background:var(--clarity-bg);color:var(--clarity)}
.adv-btn.disabled{opacity:.4;cursor:not-allowed}

/* ─ Keyframes ─ */
@keyframes pl{0%,100%{opacity:1}50%{opacity:.3}}
@media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<div class="shell">
  <div class="rb-top">
    <div class="brand"><span class="dia">◇</span><b>Liminal</b><span class="bc">·</span>Agency</div>
    <span id="operator-name" style="margin-left:12px;font-weight:500;color:var(--text)"></span>
    <div class="stage-tag">
      <span class="dot"></span>
      <span id="stage-label"></span>
    </div>
  </div>

  <div class="content" id="content"></div>

  <div class="rb-bot">
    <span id="stage-counter"></span>
    <div class="adv-ctrl">
      <button class="adv-btn" id="prev-btn">← Back</button>
      <button class="adv-btn" id="next-btn">Next →</button>
    </div>
  </div>
</div>

<script type="module">
import { SAM_SEED } from '../data/sam-seed.js';
import { createSamSeedLoop } from '../lib/sam-seed-loop.js';

const loop = createSamSeedLoop(SAM_SEED);
const state = loop.state;

const STAGE_NAMES = {
  entry: 'First Run',
  capture: 'Capture Findings',
  read: 'Agent Reads',
  contradiction: 'Logic Breaks',
  reframe: 'System Reframing',
  resolution: 'Path Forward',
};

const STAGE_ORDER = ['entry', 'capture', 'read', 'contradiction', 'reframe', 'resolution'];

function registerToClass(register) {
  return `reg-${register.toLowerCase().replace(/\s+/g, '-')}`;
}

function renderEntry() {
  const { operator, situation } = SAM_SEED;
  return `
    <div class="stage-region stage-entry">
      <span class="sk">Operator arrival · first run · no team yet</span>
      <h1>${operator.label}</h1>
      <p class="crisis-summary">${situation.crisis_summary}</p>
      <div class="operator-intro">
        <span class="label">Role</span>
        <span class="content">${operator.role}</span>
      </div>
      <div class="operator-intro">
        <span class="label">Context</span>
        <span class="content">${operator.context}</span>
      </div>
      <p style="margin-top:20px;font:12px/1.5 var(--serif);color:var(--text-faint)">
        <strong>Stakes:</strong> ${situation.stakes}
      </p>
    </div>
  `;
}

function renderCapture() {
  const { tray_tiles } = SAM_SEED;
  const tiles = tray_tiles.map(t => `
    <div class="tile-card" draggable="true" data-tile-id="${t.id}">
      <span class="tile-src">${t.source}</span>
      <div class="tile-nm">${t.label}</div>
      <div class="tile-desc">${t.description}</div>
    </div>
  `).join('');

  return `
    <div class="stage-region stage-capture">
      <span class="sk">The tray · ~1,000 findings artifacts · drag to slate when ready</span>
      <h2>Triage Crisis</h2>
      <div class="tiles-grid">${tiles}</div>
      <p style="font:11px/1.5 var(--serif);color:var(--text-faint);margin-top:16px">
        The crisis: ~1,000 frontier-model findings produced contradictory classifications.
        Dropped here: the raw scan, two rounds of triage (v1 and v2), process gaps, and the
        audit that revealed the true bottleneck.
      </p>
    </div>
  `;
}

function renderRead() {
  const { agent_reads } = SAM_SEED;
  const reads = agent_reads.map(ar => `
    <div class="agent-read ${registerToClass(ar.register)}">
      <div class="agent-header">
        <span class="agent-register">${ar.agent}</span>
        <span class="agent-confidence">${ar.confidence}</span>
      </div>
      <p class="agent-text">${ar.read_text}</p>
    </div>
  `).join('');

  return `
    <div class="stage-region stage-read">
      <span class="sk">Bounded agents examine the slate · each reads from their register</span>
      <h2>Agent Reads</h2>
      <div class="agent-reads">${reads}</div>
      <p style="font:11px/1.5 var(--serif);color:var(--text-faint);margin-top:20px">
        Four specialist reads converge on the same artifacts. The agents agree on the
        <em>surface facts</em> (240 items reclassified, process visibility zero) but
        disagree on the <em>root cause</em>. That disagreement is the signal.
      </p>
    </div>
  `;
}

function renderContradiction() {
  const { contradictions } = SAM_SEED;
  const pairs = contradictions.map(c => `
    <div class="contradiction-pair">
      <div class="agents">
        <span class="agent-name">${c.a}</span>
        <span class="vs">vs</span>
        <span class="agent-name">${c.b}</span>
      </div>
      <p class="on"><strong>On:</strong> ${c.on}</p>
      <p class="productive">
        <strong>Why it matters:</strong> ${c.productive}
      </p>
    </div>
  `).join('');

  return `
    <div class="stage-region stage-contradiction">
      <span class="sk">The agents visibly disagree · classification logic breaks here</span>
      <h2>Contradictions</h2>
      <div class="contradictions-list">${pairs}</div>
      <p style="font:11px/1.5 var(--serif);color:var(--text-faint);margin-top:20px">
        The contradictions are not failures — they're the <em>signal that reveals where
        the system broke.</em> No shared definition of "moderate" (P2). No observability
        into decision-making. No live calibration. The team isn't bad; the system is.
      </p>
    </div>
  `;
}

function renderReframe() {
  const { reframe } = SAM_SEED;
  return `
    <div class="stage-region stage-reframe">
      <span class="sk">The emotional turn · the read flips from accusation to optimization</span>
      <h2>The Reframe</h2>
      <div class="reframe-journey">
        <div class="reframe-frame from">
          <span class="label">${reframe.from}</span>
          <p class="content">${reframe.from_copy}</p>
        </div>
        <div class="reframe-arrow">→</div>
        <div class="reframe-frame to">
          <span class="label">${reframe.to}</span>
          <p class="content">${reframe.to_copy}</p>
        </div>
      </div>
      <div class="reframe-emotional">
        <span class="label">The shift</span>
        <p class="content">
          Sam catches that Tariq isn't a bad manager; he's caught in a bad system.
          The audit was right (the work had errors), but the accusation framing is
          replaced by optimization framing. That shift keeps trust intact.
        </p>
      </div>
    </div>
  `;
}

function renderResolution() {
  const { resolution } = SAM_SEED;
  return `
    <div class="stage-region stage-resolution">
      <span class="sk">The path forward · trust preserved · system improved · boundaries clear</span>
      <h2>Resolution</h2>
      <div class="resolution-path">
        <span class="feeling">Feeling: ${resolution.feeling}</span>
        <p class="content">${resolution.copy}</p>
      </div>
      <p style="font:11px/1.5 var(--serif);color:var(--text-faint)">
        The team doesn't feel accused. Tariq doesn't feel defensive. The second audit
        becomes a co-design session instead of a trial. System fixed, relationships intact,
        next assessment clear.
      </p>
    </div>
  `;
}

function render() {
  const { stage } = loop.state;
  const contentDiv = document.getElementById('content');

  let html = '';
  switch (stage) {
    case 'entry':
      html = renderEntry();
      break;
    case 'capture':
      html = renderCapture();
      break;
    case 'read':
      html = renderRead();
      break;
    case 'contradiction':
      html = renderContradiction();
      break;
    case 'reframe':
      html = renderReframe();
      break;
    case 'resolution':
      html = renderResolution();
      break;
  }

  contentDiv.innerHTML = html;

  // Update top bar
  document.getElementById('operator-name').textContent = SAM_SEED.operator.label;
  document.getElementById('stage-label').textContent = STAGE_NAMES[stage];
  document.getElementById('stage-counter').textContent =
    `Stage ${STAGE_ORDER.indexOf(stage) + 1} of ${STAGE_ORDER.length}`;

  // Update button states
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  const curIdx = STAGE_ORDER.indexOf(stage);

  if (curIdx === 0) {
    prevBtn.classList.add('disabled');
    prevBtn.disabled = true;
  } else {
    prevBtn.classList.remove('disabled');
    prevBtn.disabled = false;
  }

  if (curIdx === STAGE_ORDER.length - 1) {
    nextBtn.classList.add('disabled');
    nextBtn.disabled = true;
  } else {
    nextBtn.classList.remove('disabled');
    nextBtn.disabled = false;
  }
}

function advance() {
  const curIdx = STAGE_ORDER.indexOf(loop.state.stage);
  if (curIdx < STAGE_ORDER.length - 1) {
    loop.advance();
    render();
  }
}

function retreat() {
  const curIdx = STAGE_ORDER.indexOf(loop.state.stage);
  if (curIdx > 0) {
    const prevStage = STAGE_ORDER[curIdx - 1];
    // Manually transition backward (the loop doesn't have a retreat, so we set stage directly)
    loop.state.stage = prevStage;
    render();
  }
}

// Event listeners
document.getElementById('next-btn').addEventListener('click', advance);
document.getElementById('prev-btn').addEventListener('click', retreat);

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    advance();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    retreat();
  }
});

// Initial render
render();
</script>
</body>
</html>
