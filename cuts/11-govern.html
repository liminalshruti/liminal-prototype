  loved prototype interactions. Real verified figures ($13,045→$4,500 · naïve $446→verified $284; E14/PR-103 dropped $162
  adversarial catch). Restores: the 4-register read + the CORRECTION FLOW (correction is the
  primary act), the OKR allocation bar, the OG Today + Mirror surfaces, and the

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../design-system/components/framing.css">
<!-- Shared design system (converged): chrome + canonical .artifact from cut-shell.css. -->
<link rel="stylesheet" href="../lib/cut-shell.css">
<link rel="stylesheet" href="../lib/brand-upgrade.css">
<style>
@font-face{font-family:"Nineties Headliner";src:url("../fonts/nineties-headliner.otf") format("opentype");font-weight:400;font-display:swap}
@font-face{font-family:"Perfectly Nineties";src:url("../fonts/perfectly-nineties-regular.otf") format("opentype");font-weight:400;font-display:swap}
@font-face{font-family:"Perfectly Nineties";src:url("../fonts/PerfectlyNineties-Semibold.otf") format("opentype");font-weight:600;font-display:swap}
*{box-sizing:border-box}html,body{margin:0;height:100%}
h1,h2,h3{text-wrap:balance}p{text-wrap:pretty}
button{transition:transform .22s var(--ease-spring,ease),color .15s,background .15s,border-color .15s}
button:hover{transform:translateY(-1.5px)}button:active{transform:translateY(0) scale(.97);transition-duration:.08s}
@media (prefers-reduced-motion:reduce){button{transition:color .15s,background .15s}button:hover,button:active{transform:none}}
body{background:var(--bg);color:var(--text);font:14px/1.5 var(--sans);-webkit-font-smoothing:antialiased;
  background-image:radial-gradient(900px 480px at 8% -6%,var(--diligence-50),transparent 60%),radial-gradient(760px 480px at 106% 4%,var(--depth-50),transparent 55%);
  display:flex;align-items:center;justify-content:center;min-height:100vh;padding:18px}
.mono{font-family:var(--mono)}.serif{font-family:var(--serif,"Perfectly Nineties",Georgia,serif)}
/* CHROME (.shell/.rb-top/.traffic/.brand/.rb-bot) inherited from converged cut-shell.css. */

/* ── top-bar tabs ── */
.tabs{display:flex;gap:2px;margin:0 auto}
.tab{font:9px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);background:transparent;border:1px solid transparent;border-radius:4px;padding:6px 11px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:7px}
.tab:hover{color:var(--text);background:var(--hover)}.tab.on{color:var(--text);background:var(--hover);border-color:var(--card-border)}
.tab .k{font-size:8px;color:var(--text-mute);border:1px solid var(--card-border);border-radius:2px;padding:0 4px}
.tab .badge{background:var(--watch);color:var(--bg);border-radius:8px;font-size:8px;padding:1px 5px;letter-spacing:0}
.cmdk{font:9px/1 var(--mono);letter-spacing:.1em;color:var(--text-faint);border:1px solid var(--card-border);border-radius:4px;padding:6px 9px;cursor:pointer;display:flex;gap:6px;align-items:center}
.cmdk:hover{color:var(--text-mid);border-color:var(--text-faint)}
.rel{display:flex;align-items:center;gap:5px}.rel .lbl{color:var(--text-faint);font-size:8px;letter-spacing:.14em;text-transform:uppercase}
.rel button{font:8px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);background:transparent;border:1px solid var(--card-border);border-radius:3px;padding:5px 7px;cursor:pointer;transition:.15s}
.rel button:hover{color:var(--text)}.rel button.on{color:var(--bg);background:var(--diligence);border-color:var(--diligence)}

/* ── 3-pane middle ── */
.mid{display:grid;grid-template-columns:280px 1fr 320px;min-height:0;position:relative;transition:grid-template-columns .25s var(--ease)}
/* Today/Mirror/Registry/Log go full-width (focus the center) */
body[data-surface="today"] .mid,body[data-surface="mirror"] .mid,body[data-surface="registry"] .mid,body[data-surface="log"] .mid{grid-template-columns:0px 1fr 0px}
body[data-surface="today"] .rail-l,body[data-surface="today"] .rail-r,body[data-surface="mirror"] .rail-l,body[data-surface="mirror"] .rail-r,body[data-surface="registry"] .rail-l,body[data-surface="registry"] .rail-r,body[data-surface="log"] .rail-l,body[data-surface="log"] .rail-r{opacity:0;pointer-events:none}
.rail-l,.rail-r{transition:opacity .2s var(--ease)}

/* ── LEFT RAIL · evidence signals · skinned to cut 01's slate/tray tile vocabulary
   (visual only · same .sig/.src/.nm/.act/.rows classes, same renderSignals logic).
   The tile look: macOS title-bar w/ traffic-dots + source · display-font title ·
   seated-nib rail connector · dashed/diffuse tray, solid slate. ── */
.rail-l{background:var(--frame-bg-2);border-right:1px solid var(--frame-border);padding:13px 0;overflow-y:auto}
.rl-h{display:flex;align-items:center;gap:7px;padding:0 15px 8px;font:9px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint)}
.rl-h .live{display:inline-flex;align-items:center;gap:5px;color:var(--signal);margin-left:auto}.rl-h .live::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--signal);animation:pl 1.1s var(--ease) infinite}
.rl-sub{padding:0 15px 9px;font:8px/1.4 var(--mono);letter-spacing:.08em;color:var(--text-mute);border-bottom:1px solid var(--frame-border);margin-bottom:8px}
.rl-grp{padding:9px 15px 4px;font:8px/1 var(--mono);letter-spacing:.18em;text-transform:uppercase;color:var(--text-mute)}
/* the tile · cut-01 .tile shape */
.sig{position:relative;margin:6px 9px 6px 22px;border:1px solid var(--card-border);border-radius:4px;background:var(--frame-bg-2);cursor:pointer;overflow:hidden;transition:border-color .22s var(--ease),transform .28s var(--ease),box-shadow .28s var(--ease),opacity .22s}
/* seated nib · the tab linking the tile to the rail (cut 01) */
.sig::before{content:"";position:absolute;top:15px;left:-13px;width:12px;height:1px;background:var(--card-border-2,var(--card-border))}
.sig::after{content:"";position:absolute;top:13px;left:-17px;width:5px;height:5px;border-radius:50%;background:var(--frame-bg);border:1px solid var(--card-border-2,var(--card-border));transition:background .22s,border-color .22s,box-shadow .22s}
.sig:hover{border-color:var(--diligence);transform:translateX(-3px);box-shadow:-6px 6px 20px rgba(0,0,0,.42),0 0 24px var(--diligence-bg);z-index:4}
.sig:hover::after{background:var(--diligence);border-color:var(--diligence);box-shadow:0 0 8px var(--diligence)}
/* the title-bar · macOS traffic-lights + source eyebrow (cut 01 .tile-bar) */
.sig .src{display:flex;align-items:center;gap:8px;padding:6px 10px;background:rgba(255,255,255,.025);border-bottom:1px solid var(--card-border);font:8px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint)}
.sig .src::before{content:"";flex-shrink:0;width:23px;height:7px;border-radius:10px;
  background:radial-gradient(circle 3.5px at 3.5px 3.5px,rgba(255,255,255,.18) 0 3.5px,transparent 0),radial-gradient(circle 3.5px at 11.5px 3.5px,rgba(255,255,255,.18) 0 3.5px,transparent 0),radial-gradient(circle 3.5px at 19.5px 3.5px,rgba(255,255,255,.18) 0 3.5px,transparent 0)}
/* the title · display font (cut 01 .tile-label) */
.sig .nm{padding:7px 12px 8px;font:12.5px/1.25 var(--display,"Nineties Headliner",Georgia,serif);letter-spacing:-.005em;color:var(--text)}
/* tray · diffuse · dashed (cut 01 idiom) · the harden affordance lives in the bar */
.sig.tray{border-style:dashed;opacity:.82}.sig.tray .src{color:var(--watch)}.sig.tray .act{color:var(--watch)}
.sig .act{margin-left:auto;flex-shrink:0;font:8px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint)}
.sig.slate .act{color:var(--good)}
.sig.cited{border-color:var(--diligence)}.sig.cited .src{background:var(--diligence-bg);color:var(--diligence)}.sig.cited .src::before{background:radial-gradient(circle 3.5px at 3.5px 3.5px,var(--diligence) 0 3.5px,transparent 0),radial-gradient(circle 3.5px at 11.5px 3.5px,var(--diligence) 0 3.5px,transparent 0),radial-gradient(circle 3.5px at 19.5px 3.5px,var(--diligence) 0 3.5px,transparent 0)}.sig.cited .nm{color:var(--text)}
.sig .rows{padding:0 12px 9px;font:9px/1.5 var(--mono);color:var(--text-faint);display:none}
.sig.open .rows{display:block}

/* ── CENTER ── */
.work{padding:0;overflow-y:auto;position:relative}
.pad{padding:22px 28px;display:flex;flex-direction:column;gap:16px}
.invoke{display:flex;align-items:baseline;gap:10px;font:10px/1 var(--mono);letter-spacing:.06em;color:var(--text-faint);border-bottom:1px solid var(--card-border);padding-bottom:12px}
.invoke b{color:var(--diligence);letter-spacing:.12em;text-transform:uppercase}
.invoke .invoke-q{margin-left:auto;color:var(--text-mute);letter-spacing:.04em}.invoke .invoke-q b{color:var(--text-mid);text-transform:none;letter-spacing:.02em}

/* ── SUBJECT SWITCHER (converged from cut 00) · the loop's subject is a parameter ── */
.subjects{display:flex;gap:3px;margin:0 0 14px;background:var(--frame-bg);border:1px solid var(--card-border);border-radius:6px;padding:3px;width:fit-content}
.subj{font:9px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);background:transparent;border:0;border-radius:4px;padding:7px 12px;cursor:pointer;transition:.15s;white-space:nowrap}
.subj:hover{color:var(--text)}.subj.on{color:var(--bg);background:var(--diligence)}
.subj .deep{font-size:7px;letter-spacing:.14em;opacity:.6;margin-left:5px}
/* per-subject read head (non-spend subjects reuse this; spend keeps its native sense-h) */
.subj-head{margin:2px 0 12px}.subj-head .sk{font:9px/1 var(--mono);letter-spacing:.2em;text-transform:uppercase;color:var(--text-faint)}
.subj-head h2{margin:7px 0 0;font:400 22px/1.15 var(--display);color:var(--text)}
/* ported evidence-pane primitives (custody map · osint layers · notice atrail · pattern coverage) */
.subj-map{width:100%;height:170px;border-radius:6px;background:radial-gradient(120% 100% at 30% 20%,#0c1622,#08080a);border:1px solid var(--card-border);display:block}
.map-legend{display:flex;gap:18px;margin-top:9px;font:8px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint)}
.map-legend i{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.layers{display:flex;flex-direction:column;gap:6px}
.layer{display:flex;gap:12px;align-items:baseline;padding:8px 11px;border:1px solid var(--card-border);border-radius:5px;background:var(--frame-bg)}
.layer.counter{border-color:var(--alarm-edge);background:var(--alarm-bg)}
.layer .ln{font:8px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint);min-width:54px}
.layer .lc{font:11px/1.4 var(--mono);color:var(--text-mid)}.layer.counter .lc{color:var(--alarm)}
.hyp{margin-top:12px}.hyp-l{display:flex;justify-content:space-between;font:9px/1 var(--mono);letter-spacing:.06em;color:var(--text-faint);margin-bottom:6px}
.hyp-bar{display:flex;height:14px;border-radius:3px;overflow:hidden;border:1px solid var(--card-border)}
.hyp-bar .h1{flex:62;background:var(--good)}.hyp-bar .h2{flex:26;background:var(--watch)}.hyp-bar .h3{flex:12;background:var(--alarm)}
.atrail{display:flex;flex-direction:column;gap:5px}
.arow{display:grid;grid-template-columns:54px 1fr auto;gap:12px;align-items:center;padding:8px 11px;border:1px solid var(--card-border);border-radius:5px;background:var(--frame-bg);font:10px/1.3 var(--mono)}
.arow .ak{color:var(--text-faint);letter-spacing:.12em}.arow .ae{color:var(--text-mid)}.arow .av{color:var(--text-faint);letter-spacing:.08em;text-transform:uppercase;font-size:8px}
.arow.match{border-color:var(--connection-edge,var(--connection))}.arow.match .av{color:var(--connection,var(--good))}
.arow.contra{border-color:var(--alarm-edge);background:var(--alarm-bg)}.arow.contra .av{color:var(--alarm)}
.subj-cov{font:13px/1.6 var(--serif,"Perfectly Nineties",Georgia,serif);color:var(--text-dim)}.subj-cov em{color:var(--text)}
.seam{--seam-mb:14px}

/* sense · vendor table + usage stream */
.sense-h{display:flex;align-items:baseline;gap:10px}
.sense-h .anum{font:9px/1 var(--mono);letter-spacing:.16em;color:var(--diligence);border:1px solid var(--diligence-edge);border-radius:3px;padding:3px 6px}
.sense-h .atitle{font:500 16px/1.2 var(--display);color:var(--text)}
.sense-h .asub{margin-left:auto;font:9px/1 var(--mono);color:var(--text-mute)}
.tbl{width:100%;border-collapse:collapse;font:11px/1.5 var(--mono);border:1px solid var(--card-border);border-radius:7px;overflow:hidden}
.tbl th{text-align:left;padding:8px 11px;font:8px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);background:var(--frame-bg-3);border-bottom:1px solid var(--frame-border)}
.tbl td{padding:7px 11px;color:var(--text-dim);border-bottom:1px solid var(--frame-border)}
.tbl tr:last-child td{border-bottom:0}.tbl td.num{text-align:right;font-variant-numeric:tabular-nums}
.tbl tr.flag td{background:var(--alarm-bg)}.tbl tr.flag td:first-child{color:var(--alarm)}
.tbl tr.total td{font-weight:600;color:var(--text);background:var(--frame-bg-3)}
.stream{display:flex;flex-direction:column;gap:2px;font:10.5px/1 var(--mono)}
.urow{display:grid;grid-template-columns:1fr auto auto;gap:14px;align-items:center;padding:7px 11px;border:1px solid var(--card-border);border-radius:4px;background:var(--frame-bg-2)}
.urow .cat{color:var(--text-faint);font-size:9px}.urow .cost{color:var(--text-mid);font-variant-numeric:tabular-nums}
.urow.flagged{border-color:var(--alarm-edge);background:var(--alarm-bg)}.urow.flagged .cat{color:var(--alarm)}

/* ── the 4-register READ (restored, with correction flow) ── */
.reg{padding:14px 0;border-bottom:1px solid rgba(255,255,255,.03);position:relative;opacity:0;transform:translateY(5px);animation:rin .5s var(--ease) forwards}
.reg .rh{display:flex;align-items:baseline;gap:10px}
.reg .rname{font:10px/1 var(--mono);letter-spacing:.2em;text-transform:uppercase}
.reg .rt{font:9px/1 var(--mono);color:var(--text-mute);margin-left:auto}
.reg .amend{font:8px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);border:1px solid var(--card-border);border-radius:3px;padding:3px 7px;cursor:pointer;opacity:0;transition:.15s}
.reg:hover .amend{opacity:1}.reg .amend:hover{color:var(--diligence);border-color:var(--diligence)}
.reg .rbody{margin-top:9px;font:14px/1.55 var(--serif,"Perfectly Nineties",Georgia,serif);color:var(--text-mid)}
.reg .rbody .hl{color:var(--text)}
.reg.diligence .rname{color:var(--diligence)}.reg.synthesis .rname{color:var(--depth)}.reg.judgment .rname{color:var(--judgment)}.reg.outreach .rname{color:var(--connection)}
.reg.corrected{background:linear-gradient(90deg,var(--diligence-bg),transparent 60%)}
.reg .cmark{display:none;font:8px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--diligence);margin-left:8px}
.reg.corrected .cmark{display:inline}
.reg-edit{display:none;margin-top:9px;gap:8px}
.reg.editing .reg-edit{display:flex;flex-direction:column}
.reg-edit textarea{width:100%;background:var(--frame-bg);border:1px solid var(--card-border);border-radius:4px;color:var(--text);font:12px/1.5 var(--sans);padding:8px 10px;resize:vertical;min-height:54px}
.reg-edit .er{display:flex;gap:8px;align-items:center}
.reg-edit .save{font:8px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:#fff;background:var(--diligence);border:1px solid var(--diligence);border-radius:3px;padding:7px 12px;cursor:pointer}
.reg-edit .cancel{font:8px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);background:transparent;border:1px solid var(--card-border);border-radius:3px;padding:7px 12px;cursor:pointer}
.reg-edit .hint{margin-left:auto;font:8px/1.4 var(--mono);color:var(--text-mute);letter-spacing:.06em;max-width:30ch;text-align:right}
.cite{font:9px/1 var(--mono);letter-spacing:.04em;color:var(--depth);border:1px solid var(--depth-edge);border-radius:3px;padding:2px 6px;margin-left:4px;cursor:pointer;transition:.15s;white-space:nowrap}
.cite:hover{background:var(--depth-bg)}

/* OKR allocation bar (restored) · canon tokens only */
.allocbar{margin-top:11px;height:26px;border-radius:4px;overflow:hidden;display:flex;border:1px solid var(--card-border);position:relative;max-width:400px}
.allocbar .p{background:var(--diligence);display:flex;align-items:center;padding-left:10px;font:9px/1 var(--mono);color:#fff;letter-spacing:.08em}
.allocbar .s{background:var(--depth);display:flex;align-items:center;padding-left:10px;font:9px/1 var(--mono);color:#fff;letter-spacing:.08em;position:relative}
.allocbar .ghost{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--alarm);box-shadow:0 0 0 1px var(--alarm)}
.allocbar .ghost::after{content:"actual 24%";position:absolute;top:-15px;left:-25px;font:8px/1 var(--mono);color:var(--alarm);white-space:nowrap}

/* verdict + refusal */
.verdict{display:inline-flex;align-items:center;gap:9px;margin-top:4px;font:11px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--alarm);border:1px solid var(--alarm-edge);background:var(--alarm-bg);padding:7px 12px;border-radius:4px}
.refusal{display:flex;gap:9px;align-items:flex-start;margin:10px 0 0;padding:8px 12px;border-left:2px solid var(--judgment);background:var(--judgment-bg);border-radius:0 4px 4px 0}
.refusal .ico{color:var(--judgment);font:600 12px/1.3 var(--mono)}
.refusal .tx{font:11px/1.45 var(--mono);color:var(--text-mid)}.refusal .tx b{color:var(--judgment);font-weight:500}

/* the catch (E14/PR-103) · hero beat */
.catch{border-left:2px solid var(--alarm);background:var(--alarm-bg);border-radius:0 5px 5px 0;padding:11px 14px;margin-top:10px}
.catch .ch{display:flex;align-items:center;gap:8px;font:9px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--alarm)}
.catch .cb{margin-top:8px;font:12.5px/1.55 var(--sans);color:var(--text-mid)}.catch .cb b{color:var(--text);font-weight:500}.catch .cb s{color:var(--text-faint);text-decoration-color:var(--alarm)}
.catch .moral{margin-top:9px;font:11px/1.5 var(--serif,Georgia,serif);font-style:italic;color:var(--text-dim)}
.verifier{display:inline-flex;align-items:center;gap:7px;font:9px/1 var(--mono);letter-spacing:.06em;color:var(--judgment);margin:8px 0}
.verifier::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--judgment);animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--judgment-glow)}50%{box-shadow:0 0 0 5px transparent}}

/* reconciliation strip (the visible subtraction · "judges reward this") */
.recon{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:10px 0}
.recon .rc{border:1px solid var(--card-border);border-radius:6px;padding:10px 12px;background:var(--frame-bg-2);position:relative}
.recon .rc .l{font:8px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint)}
.recon .rc .v{margin-top:6px;font:600 19px/1 var(--mono);font-variant-numeric:tabular-nums;color:var(--text)}
.recon .rc.drop .v{color:var(--alarm)}.recon .rc.verified .v{color:var(--good)}.recon .rc.naive .v{color:var(--text-faint)}
.recon .rc .op{position:absolute;left:-9px;top:50%;transform:translateY(-50%);font:13px/1 var(--mono);color:var(--text-mute)}

/* FINDING · clickable provenance artifact (THE hero interaction) */
.finding{border:1px solid var(--card-border);border-radius:7px;background:var(--frame-bg-2);overflow:hidden;margin-bottom:9px}
.finding.dropped{opacity:.78;border-left:3px solid var(--alarm)}
.finding-head{display:flex;align-items:flex-start;gap:8px;padding:11px 13px;cursor:pointer}
.finding-head .meta{flex:1;min-width:0}
.finding-head .badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.finding-head .bdg{display:inline-flex;align-items:center;gap:5px;font:8px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);border:1px solid var(--card-border);border-radius:3px;padding:3px 6px}
.finding-head .bdg.dot::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.finding-head .bdg.good{color:var(--good)}.finding-head .bdg.bad{color:var(--alarm)}.finding-head .bdg.acc{color:var(--diligence)}
.finding-head .ftitle{font:500 13.5px/1.3 var(--sans);color:var(--text)}.finding.dropped .ftitle{color:var(--text-faint);text-decoration:line-through;text-decoration-color:var(--alarm)}
.finding-head .fsave{font:600 16px/1 var(--mono);color:var(--good);font-variant-numeric:tabular-nums;white-space:nowrap}
.finding-head .chev{font:10px/1 var(--mono);color:var(--text-mute);transition:transform .2s;margin-top:2px}
.finding.open .chev{transform:rotate(90deg)}
.finding-route{margin:0 13px 9px;padding:7px 10px;background:var(--diligence-bg);border:1px solid var(--diligence-edge);border-radius:4px;font:10px/1.4 var(--mono);color:var(--text-mid)}
.finding-route .chip{color:var(--connection);border:1px solid var(--connection);border-radius:3px;padding:1px 5px;margin:0 3px}
.finding-body{display:none;border-top:1px dashed var(--card-border)}
.finding.open .finding-body{display:block}
.ev-table{width:100%;border-collapse:collapse;font:9.5px/1.4 var(--mono)}
.ev-table caption{text-align:left;padding:8px 13px 4px;font:8px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint)}
.ev-table td,.ev-table th{padding:5px 13px;text-align:left;color:var(--text-dim);border-bottom:1px solid var(--frame-border)}
.ev-table th{font:8px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint)}
.ev-table td.num{text-align:right;font-variant-numeric:tabular-nums;color:var(--text-mid)}
.ev-table tr:last-child td{border-bottom:0}
.receipt{display:flex;flex-wrap:wrap;gap:6px 18px;padding:9px 13px;background:var(--frame-bg-3);border-top:1px solid var(--frame-border);font:9px/1.4 var(--mono);color:var(--text-dim)}
.receipt .k{color:var(--text-faint);letter-spacing:.08em;text-transform:uppercase;margin-right:5px}
.receipt .full{flex-basis:100%}
.receipt .vbadge{display:inline-flex;align-items:center;gap:5px;color:var(--good);letter-spacing:.06em}.receipt .vbadge::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--good)}
.receipt.bad .vbadge{color:var(--alarm)}.receipt.bad .vbadge::before{background:var(--alarm)}
.finding-correct{padding:10px 13px;border-top:1px dashed var(--card-border);background:var(--frame-bg-3)}
.fc-toggle{font:8px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);border:1px solid var(--card-border);border-radius:3px;padding:5px 9px;cursor:pointer;background:transparent}
.fc-toggle:hover{color:var(--diligence);border-color:var(--diligence)}
.fc-box{display:none;margin-top:9px}.finding.correcting .fc-box{display:block}
.fc-kinds{display:flex;gap:6px;margin-bottom:8px}
.fc-kind{font:8px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);border:1px solid var(--card-border);border-radius:3px;padding:5px 8px;cursor:pointer;background:transparent}
.fc-kind.on{color:#fff;background:var(--diligence);border-color:var(--diligence)}
.fc-box textarea{width:100%;background:var(--frame-bg);border:1px solid var(--card-border);border-radius:4px;color:var(--text);font:11px/1.5 var(--sans);padding:8px 10px;resize:vertical;min-height:46px}
.fc-box .er{display:flex;gap:8px;align-items:center;margin-top:8px}
.fc-box .save{font:8px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:#fff;background:var(--diligence);border:1px solid var(--diligence);border-radius:3px;padding:7px 12px;cursor:pointer}
.fc-done{display:none;margin-top:8px;font:9px/1.4 var(--mono);color:var(--good)}.finding.corrected .fc-done{display:block}.finding.corrected .fc-box{display:none}
/* chain-integrity badge (stays green through corrections) */
.chain-integ{display:inline-flex;align-items:center;gap:5px;font:8px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--good);margin-left:auto;flex-shrink:0}
.chain-integ::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--good);box-shadow:0 0 6px var(--good)}

/* agent-fit swap */
.swap{display:grid;grid-template-columns:1fr 24px 1fr;align-items:stretch;max-width:480px;margin-top:10px}
.swap .side{padding:11px 13px;border:1px solid var(--card-border);border-radius:5px;background:var(--frame-bg-2)}
.swap .side.cur{border-color:var(--alarm-edge)}.swap .side.sug{border-color:var(--connection);background:linear-gradient(180deg,var(--connection-bg),transparent)}
.swap .ro{font:8px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint)}
.swap .ag{margin:6px 0 0;font:13px/1.2 var(--sans);color:var(--text);font-weight:500}
.swap .co{margin-top:3px;font:9px/1.2 var(--mono);color:var(--text-dim)}
.swap .bd{display:inline-flex;align-items:center;gap:5px;margin-top:9px;font:8px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase}.swap .bd::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.swap .cur .bd{color:var(--alarm)}.swap .sug .bd{color:var(--connection)}
.swap .arrow{display:flex;align-items:center;justify-content:center;color:var(--depth);font:15px/1 var(--mono)}
.savings{display:flex;align-items:baseline;gap:9px;margin-top:11px;font:11px/1 var(--mono)}
.savings .was{color:var(--text-faint);text-decoration:line-through;text-decoration-color:var(--alarm)}
.savings .now{font:600 19px/1 var(--mono);color:var(--good);font-variant-numeric:tabular-nums}
.savings .lbl{color:var(--text-mute);letter-spacing:.04em}

/* ratify */
.policy{border:1px solid var(--diligence-edge);border-radius:8px;padding:16px 18px;background:linear-gradient(180deg,var(--diligence-bg),transparent)}
.policy .pt{font:500 19px/1.3 var(--display);color:var(--text)}
.policy .ps{margin-top:8px;font:11px/1.5 var(--mono);color:var(--good)}
.dispo{display:flex;align-items:center;gap:10px;margin-top:6px;flex-wrap:wrap}
.dispo .lbl{font:9px/1.4 var(--mono);letter-spacing:.06em;color:var(--text-faint);margin-right:auto;max-width:46ch}
.db{font:10px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;padding:9px 16px;border-radius:3px;border:1px solid var(--card-border);background:var(--hover);color:var(--text-mid);cursor:pointer}
.db:hover{color:var(--text);border-color:var(--text-faint)}
.db.sign{color:#fff;background:var(--judgment);border-color:var(--judgment)}.db.sign:hover{box-shadow:0 0 22px var(--judgment-glow)}
.db.sign .pre{opacity:.7;font-size:8px}
.calib-cta{margin-top:14px;text-align:center}
.calib-cta button{font:9px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--diligence);background:transparent;border:1px solid var(--diligence-edge);border-radius:4px;padding:8px 14px;cursor:pointer}

/* ── Today surface (OG, restored) ── */
.today{max-width:600px;margin:0 auto;padding:40px 30px}
.today .greet{font:9px/1 var(--mono);letter-spacing:.2em;text-transform:uppercase;color:var(--text-faint)}
.today h1{margin:10px 0 6px;font:400 30px/1.15 var(--display);color:var(--text)}
.today .lede{margin:0 0 26px;font:16px/1.6 var(--serif,"Perfectly Nineties",Georgia,serif);color:var(--text-dim)}
.tcard{display:block;width:100%;text-align:left;border:1px solid var(--card-border);border-radius:8px;background:var(--frame-bg-2);padding:16px 18px;margin-bottom:12px;cursor:pointer;transition:.15s;color:inherit}
.tcard:hover{border-color:var(--text-faint);background:var(--frame-bg-3)}
.tcard .tk{display:flex;align-items:center;gap:8px;font:9px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase}
.tcard .tk .meta{margin-left:auto;color:var(--text-mute);letter-spacing:.08em}
.tcard.decide .tk{color:var(--watch)}.tcard.outcome .tk{color:var(--connection)}.tcard.mirror .tk{color:var(--diligence)}
.tcard h3{margin:8px 0 4px;font:500 17px/1.2 var(--display);color:var(--text)}
.tcard p{margin:0;font:13.5px/1.5 var(--serif,"Perfectly Nineties",Georgia,serif);color:var(--text-dim)}
.tcard .verdict-mini{margin-top:8px;display:inline-block;font:9px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--alarm);border:1px solid var(--alarm-edge);background:var(--alarm-bg);padding:4px 8px;border-radius:3px}

/* ── Mirror surface (OG, restored) ── */
.mirror{max-width:640px;margin:0 auto;padding:36px 30px}
.mirror .greet{font:9px/1 var(--mono);letter-spacing:.2em;text-transform:uppercase;color:var(--text-faint)}
.mirror h1{margin:10px 0 6px;font:400 28px/1.15 var(--display);color:var(--text)}
.mirror .lede{margin:0 0 26px;font:15px/1.6 var(--serif,"Perfectly Nineties",Georgia,serif);color:var(--text-dim);max-width:58ch}
.mstats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.mstat{border:1px solid var(--card-border);border-radius:7px;padding:14px;background:var(--frame-bg-2)}
.mstat .v{font:600 24px/1 var(--mono);font-variant-numeric:tabular-nums;color:var(--text)}
.mstat .l{margin-top:6px;font:9px/1.3 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint)}
.mbars{border:1px solid var(--card-border);border-radius:7px;padding:16px 18px;background:var(--frame-bg-2);margin-bottom:20px}
.mbars h3{margin:0 0 14px;font:9px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--text-mid)}
.mbar{display:grid;grid-template-columns:130px 1fr 40px;align-items:center;gap:12px;margin-bottom:9px;font:10px/1 var(--mono)}
.mbar .lb{color:var(--text-dim)}.mbar .track{height:8px;background:var(--frame-bg-3);border-radius:4px;overflow:hidden}
.mbar .fill{height:100%;border-radius:4px}.mbar .pct{color:var(--text-faint);text-align:right;font-variant-numeric:tabular-nums}
.mnote{border-left:2px solid var(--diligence);padding:4px 0 4px 16px;margin-top:8px}
.mnote .k{font:8px/1 var(--mono);letter-spacing:.18em;text-transform:uppercase;color:var(--diligence)}
.mnote p{margin:8px 0 0;font:15px/1.6 var(--serif,"Perfectly Nineties",Georgia,serif);color:var(--text-mid);font-style:italic}
.mnote ul{margin:8px 0 0;padding-left:18px;font:13px/1.6 var(--sans);color:var(--text-mid)}
.mnote code{font:11px/1 var(--mono);color:var(--text);background:var(--frame-bg-3);padding:1px 5px;border-radius:3px}

/* ── run-badge · marks a real-pipeline run vs the inline demo ── */
.run-badge{margin-left:auto;font:8px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint);border:1px solid var(--card-border);border-radius:3px;padding:4px 8px;align-self:center}
.run-badge.on{color:var(--connection);border-color:var(--connection)}

/* ── OKR surface (reuses .today shell) ── */
.okrs{display:flex;flex-direction:column;gap:18px;margin:6px 0 18px}
.okr-obj{border:1px solid var(--card-border);border-radius:8px;padding:16px 18px;background:var(--frame-bg-2)}
.okr-head{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
.okr-head .okr-n{font:9px/1 var(--mono);letter-spacing:.1em;color:var(--depth)}
.okr-head .okr-name{font:17px/1.2 var(--display,"Nineties Headliner",Georgia,serif);color:var(--text)}
.okr-head .okr-alloc{margin-left:auto;font:13px/1 var(--mono);color:var(--text)}
.okr-obj .track{height:8px;background:var(--frame-bg-3);border-radius:4px;overflow:hidden}
.okr-obj .track .fill{height:100%}
.okr-krs{margin:10px 0 0;padding-left:18px;font:13px/1.6 var(--sans);color:var(--text-dim)}
.okr-foot{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.okr-sum{font:9px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;padding:5px 10px;border-radius:4px;border:1px solid var(--card-border)}
.okr-sum.ok{color:var(--connection);border-color:var(--connection)}
.okr-sum.warn{color:var(--alarm);border-color:var(--alarm-edge,var(--alarm))}
.okr-note{font:9px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint)}

/* ── secondary screens (Registry / Decision log) ── */
.screen{max-width:760px;margin:0 auto;padding:30px;display:flex;flex-direction:column;gap:16px}
.screen .sh{font:9px/1 var(--mono);letter-spacing:.2em;text-transform:uppercase;color:var(--text-faint)}
.screen h1{margin:8px 0 4px;font:400 26px/1.15 var(--display);color:var(--text)}
.screen .lede{margin:0 0 8px;font:14px/1.6 var(--serif,Georgia,serif);color:var(--text-dim);max-width:64ch}
.agents{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.agent{border:1px solid var(--card-border);border-radius:8px;padding:14px 16px;background:var(--frame-bg-2)}
.agent .an{font:500 15px/1.2 var(--sans);color:var(--text)}.agent .at{margin-top:3px;font:9px/1 var(--mono);color:var(--text-dim)}
.agent .badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.agent .bdg{display:inline-flex;align-items:center;gap:5px;font:8px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint)}.agent .bdg::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.agent .bdg.ok{color:var(--good)}.agent .bdg.warn{color:var(--watch)}.agent .bdg.cost{color:var(--diligence)}
.agent .lanes{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.agent .lane{font:8px/1 var(--mono);color:var(--text-dim);border:1px solid var(--card-border);border-radius:3px;padding:3px 6px}
.agent .prov{margin-top:9px;padding-top:8px;border-top:1px solid var(--frame-border);font:8.5px/1.4 var(--mono);color:var(--text-mute)}
.agent .prov .phash{color:var(--diligence)}

/* ── rich registry agent cards (real reputation + proof) ── */
.agent.rich{display:flex;flex-direction:column;gap:8px}
.agent .ar-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.agent .rep{font:600 18px/1 var(--mono);display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.agent .rep .rl{font:7px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint);font-weight:400}
.agent .rep.ok{color:var(--good)}.agent .rep.cost{color:var(--diligence)}.agent .rep.warn{color:var(--watch)}
.agent .claim{font:12px/1.5 var(--serif,"Perfectly Nineties",Georgia,serif);color:var(--text-dim);font-style:italic}

/* ── the agent-fit marketplace swap (hero beat in the loop) ── */
.mswap{margin-top:12px;border:1px solid var(--card-border);border-radius:8px;background:var(--frame-bg-2);overflow:hidden}
.mswap-h{padding:9px 13px;font:10px/1.4 var(--mono);color:var(--text-dim);border-bottom:1px solid var(--frame-border);background:var(--frame-bg-3)}
.mswap-grid{display:grid;grid-template-columns:1fr 52px 1fr;align-items:stretch;gap:0}
.mside{padding:13px 15px;display:flex;flex-direction:column;gap:6px}
.mside.sug{background:color-mix(in srgb,var(--good) 7%,transparent)}
.mside .mrole{font:7px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint)}
.mside .mname{font:500 15px/1.2 var(--sans);color:var(--text)}
.mside.sug .mname{color:var(--good)}
.mside .mmeta{font:8px/1.3 var(--mono);color:var(--text-dim)}
.mside .mstatrow{display:flex;gap:8px;align-items:baseline;margin-top:2px}
.mside .mcost{font:11px/1 var(--mono);color:var(--text)}
.mside .mrep{font:8px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--good)}
.mside .mlanes{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.mside .mproof{margin-top:auto;padding-top:7px;font:8px/1.4 var(--mono);color:var(--text-mute)}
.marrow{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font:15px/1 var(--mono);color:var(--text-faint);border-left:1px solid var(--frame-border);border-right:1px solid var(--frame-border)}
.marrow .msave{font:8px/1 var(--mono);color:var(--good);letter-spacing:.04em}

/* ── RIGHT RAIL · ORBITAL agency (ported from cut 01, canon-clean, spend-subjected) ── */
.rail-r{background:var(--frame-bg-2);border-left:1px solid var(--frame-border);padding:13px 0;overflow-y:auto}
.rr-h{display:flex;justify-content:space-between;align-items:center;padding:0 15px 10px;border-bottom:1px solid var(--frame-border);margin-bottom:6px;font:9px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint)}
.rr-h .live{display:inline-flex;align-items:center;gap:5px;color:var(--signal)}.rr-h .live::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--signal);animation:pl 1.1s var(--ease) infinite}
.orbital-rail{position:relative;width:100%;aspect-ratio:1/1.15;margin:6px auto 8px;padding:0 10px}
.orbital-svg{width:100%;height:100%;display:block;overflow:visible}
.reg-plate{fill:rgba(255,255,255,.025);stroke:var(--frame-border);stroke-width:1}
.reg-plate.diligence{stroke:var(--diligence)}.reg-plate.outreach{stroke:var(--outreach)}.reg-plate.synthesis{stroke:var(--depth)}.reg-plate.judgment{stroke:var(--judgment)}
.reg-label{font-family:var(--mono);font-size:8px;letter-spacing:.16em;text-transform:uppercase;text-anchor:middle;dominant-baseline:middle}
.reg-label.diligence{fill:var(--diligence)}.reg-label.outreach{fill:var(--outreach)}.reg-label.synthesis{fill:var(--depth)}.reg-label.judgment{fill:var(--judgment)}
.agent-slot{font-family:var(--mono);font-size:7px;letter-spacing:.02em;text-anchor:middle;dominant-baseline:middle;fill:rgba(255,255,255,.5);transition:fill .2s}
.agent-glyph{font-family:var(--mono);font-size:9px;text-anchor:middle;dominant-baseline:middle;transition:fill .2s,opacity .4s}
.agent-glyph.queued{fill:rgba(255,255,255,.22)}
.agent-glyph.reading{fill:var(--text);animation:pulse-glyph 4.2s ease-in-out infinite}
.agent-glyph.complete{fill:var(--connection)}
.agent-glyph.refused{fill:var(--judgment)}
@keyframes pulse-glyph{0%,100%{opacity:.55}50%{opacity:1}}
.center-mark{font-family:var(--mono);font-size:14px;text-anchor:middle;dominant-baseline:middle;fill:rgba(255,255,255,.42)}
.center-orb{fill:var(--diligence);fill-opacity:0;stroke:var(--diligence);stroke-opacity:0;transition:fill-opacity .6s,stroke-opacity .6s}
.center-orb.convergent{fill-opacity:.18;stroke-opacity:.55}
.center-orb.sealed{fill-opacity:.32;stroke-opacity:.85;stroke-width:1.5;filter:drop-shadow(0 0 8px var(--diligence-glow))}
.refusal-arrow{fill:none;stroke-width:1;opacity:0;transition:opacity .32s;stroke-linecap:round}
.refusal-arrow.active{opacity:.55}
.refusal-arrow.diligence{stroke:var(--diligence)}.refusal-arrow.judgment{stroke:var(--judgment)}.refusal-arrow.outreach{stroke:var(--outreach)}
.orbital-coverage{font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint);text-align:center;padding:0 14px;margin-top:-2px;line-height:1.55}
.orbital-coverage .ce{color:var(--text-mid)}

/* ── BOTTOM RIBBON · chain ── */
.ev{display:flex;gap:6px;align-items:baseline;flex-shrink:0}.ev .t{color:var(--text-mute)}.ev .e{color:var(--text-mid)}
.ev.ref .e{color:var(--judgment)}.ev.corr .e{color:var(--diligence)}.ev.fresh{animation:fr 1.6s var(--ease)}

/* ⌘K palette + toast */
.palette{position:absolute;inset:0;z-index:50;display:none;align-items:flex-start;justify-content:center;padding-top:14vh;background:rgba(0,0,0,.55);backdrop-filter:blur(3px)}
.palette.open{display:flex}
.pal-box{width:min(520px,92%);background:var(--frame-bg);border:1px solid var(--card-border);border-radius:10px;box-shadow:0 40px 90px rgba(0,0,0,.7);overflow:hidden}
.pal-box input{width:100%;background:transparent;border:0;outline:0;padding:15px 18px;color:var(--text);font:14px/1 var(--mono);border-bottom:1px solid var(--frame-border)}
.pal-box input::placeholder{color:var(--text-faint)}

body[data-relationship="oversight"] .reg .rbody,body[data-relationship="oversight"] .sig .nm{filter:blur(4px);opacity:.5;pointer-events:none}
/* PUBLIC · the bounded-refusal-for-viewers beat · a composed consent-boundary

body[data-relationship="public"] .work>.pad,body[data-relationship="public"] .work>.today,body[data-relationship="public"] .work>.mirror,body[data-relationship="public"] .work>.screen{display:none}

.refuse-frame{display:none;position:absolute;top:0;bottom:0;left:280px;right:320px;z-index:5;background:var(--frame-bg)}

// the orbital demo loop, re-subjected to the SPEND story
let _orbTimer=null;
function orbitalDemo(){
  if(_orbTimer){clearInterval(_orbTimer);_orbTimer=null;}
  const G={queued:'◯',reading:'◉',complete:'●',refused:'⊘'};
  const STEPS=[
    {a:{spend:'reading',util:'queued',security:'queued',marketplace:'queued',execcomms:'queued',misuse:'queued',adversarial:'queued',okr:'queued',reconcile:'queued'},arr:[],cov:'8 bounded + reviewer · 1 reading · scanning the fleet spend',conv:false},
    {a:{spend:'complete',util:'reading',security:'reading',marketplace:'queued',execcomms:'queued',misuse:'reading',adversarial:'queued',okr:'reading',reconcile:'queued'},arr:[],cov:'8 bounded + reviewer · 4 reading · spend + util + OKR + misuse',conv:false},
    {a:{spend:'complete',util:'complete',security:'complete',marketplace:'reading',execcomms:'refused',misuse:'reading',adversarial:'reading',okr:'complete',reconcile:'queued'},arr:['arrow-execcomms'],cov:'exec-comms refused · out of lane, pre-verdict',conv:false},
    {a:{spend:'complete',util:'complete',security:'complete',marketplace:'complete',execcomms:'refused',misuse:'complete',adversarial:'refused',okr:'complete',reconcile:'reading'},arr:['arrow-execcomms','arrow-adversarial'],cov:'adversarial dropped E14 · PR-103 · honesty in the chain',conv:false},
    {a:{spend:'complete',util:'complete',security:'complete',marketplace:'complete',execcomms:'refused',misuse:'complete',adversarial:'refused',okr:'complete',reconcile:'complete'},arr:['arrow-execcomms','arrow-adversarial','arrow-util'],cov:'convergence: route calendar → CalendarOps',conv:true},
    {a:{spend:'complete',util:'complete',security:'complete',marketplace:'complete',execcomms:'refused',misuse:'complete',adversarial:'refused',okr:'complete',reconcile:'complete'},arr:['arrow-execcomms','arrow-adversarial','arrow-util'],cov:'vault committed · the disagreement is the data',conv:true,sealed:true},
  ];
  let i=0;
  function apply(s){
    Object.entries(s.a).forEach(([ag,st])=>{const el=document.querySelector(`[data-agent="${ag}"]`);if(!el)return;el.textContent=G[st];el.classList.remove('queued','reading','complete','refused');el.classList.add(st);});
    document.querySelectorAll('.refusal-arrow').forEach(a=>a.classList.remove('active'));
    s.arr.forEach(id=>{const a=document.getElementById(id);if(a)a.classList.add('active');});
    const c=document.getElementById('coverage-counts');if(c)c.textContent=s.cov;
    const orb=document.getElementById('orbital-center-orb');if(orb){orb.classList.toggle('convergent',!!s.conv&&!s.sealed);orb.classList.toggle('sealed',!!s.sealed);}
  }
  const reduced=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(reduced){apply(STEPS[4]);return;}
  apply(STEPS[0]);i=1;
  _orbTimer=setInterval(()=>{apply(STEPS[i]);i=(i+1)%STEPS.length;},4200);
}

      <em>${r.decision||''}</em></p></div>
  </div>`;
}

// ── Mirror (OG calibration) ─────────────────────────────────────────────────
function renderMirror(){
  body.dataset.surface='mirror';
  $('#work').innerHTML=`<div class="mirror">
    <div class="greet">Mirror · decisions calibrated · last 12 weeks</div>
    <h1>How your judgment is changing</h1>
    <p class="lede">Not what you decided · how you decide. The correction stream is first-party data about your judgment itself; this is it, reflected back. <em>This</em> is the layer that compounds · the spend cockpit was just where you entered it.</p>
    <div class="mstats"><div class="mstat"><div class="v">47</div><div class="l">decisions ratified</div></div><div class="mstat"><div class="v">128</div><div class="l">corrections made</div></div><div class="mstat"><div class="v">2.7×</div><div class="l">corrections per read ↑</div></div></div>
    <div class="mbars"><h3>Where your corrections land (by register)</h3>
      <div class="mbar"><span class="lb">Synthesis · framing</span><div class="track"><div class="fill" style="width:54%;background:var(--depth)"></div></div><span class="pct">54%</span></div>
      <div class="mbar"><span class="lb">Judgment · verdict</span><div class="track"><div class="fill" style="width:23%;background:var(--judgment)"></div></div><span class="pct">23%</span></div>
      <div class="mbar"><span class="lb">Outreach · the move</span><div class="track"><div class="fill" style="width:15%;background:var(--connection)"></div></div><span class="pct">15%</span></div>
      <div class="mbar"><span class="lb">Diligence · facts</span><div class="track"><div class="fill" style="width:8%;background:var(--diligence)"></div></div><span class="pct">8%</span></div></div>
    <div class="mnote"><span class="k">the quiet note</span><p>“Better models read the facts more accurately · and you correct the framing more, not less. The loop is doing what it should: the agents got sharper, and so did your disagreements.”</p></div>
  </div>`;
}

// ── Registry + Decision log (real) ──────────────────────────────────────────
// the agent-fit marketplace swap (the hero beat) · current vs suggested, each verifiable
function swapHTML(fit){
  const side=(s,role,roleCls)=>{
    const costPct=Math.round((s.cost_ratio||0)*100);
    return `<div class="mside ${roleCls}">
      <span class="mrole">${role}</span>
      <div class="mname">${s.name}</div>
      <div class="mmeta">${s.type||''}${s.publisher?' · '+s.publisher:''}</div>
      <div class="mstatrow"><span class="mcost">${costPct}% of frontier</span>${s.reputation_score!=null?`<span class="mrep">rep ${s.reputation_score}</span>`:''}</div>
      <div class="mlanes">${(s.lanes||[]).slice(0,3).map(l=>`<span class="lane">${l.replace(/_/g,' ')}</span>`).join('')}</div>
      <div class="mproof">${s.attested?'⛓ registry-verified · proof '+s.proof_hash:'frontier · out of approved scope'}</div>
    </div>`;
  };
  return `<div class="mswap">
    <div class="mswap-h">${fit.reason}</div>
    <div class="mswap-grid">
      ${side(fit.current,'current','cur')}
      <div class="marrow">→<span class="msave">−${fit.savings_ratio}%</span></div>
      ${side(fit.suggested,'route to','sug')}
    </div>
  </div>`;
}

// agent card · rich (real reputation + proof) when REGISTRY_DATA present, else fixture
function agentCardHTML(a){
  // rich registry agent (from the pipeline): publisher, claim, cost, lanes, reputation, proof
  if(a.reputation){
    const costPct=Math.round((a.cost_ratio||0)*100);
    const score=a.reputation.score;
    const scoreCls=score>=90?'ok':score>=75?'cost':'warn';
    return `<div class="agent rich">
      <div class="ar-top"><div class="an">${a.name}</div><div class="rep ${scoreCls}" title="reputation · ${a.reputation.reads} reads · ${a.reputation.corrections} corrections">${score==null?'—':score}<span class="rl">rep</span></div></div>
      <div class="at">${a.type} · ${a.publisher}</div>
      <div class="claim">${a.claim||''}</div>
      <div class="badges">
        ${a.verified?'<span class="bdg ok">verified</span>':''}
        <span class="bdg ${costPct<=10?'ok':costPct>=100?'warn':'cost'}">${costPct<=10?'low · ':''}${costPct}% of frontier</span>
        ${a.proof?.attested?'<span class="bdg ok">attested</span>':''}
      </div>
      <div class="lanes">${(a.lanes||[]).map(l=>`<span class="lane">${l.replace(/_/g,' ')}</span>`).join('')}</div>
      <div class="prov">${a.proof?.attested?'⛓ '+a.proof.anchor:'frontier model · not registry-published'} · proof <span class="phash">${a.proof?.integrity_hash||'—'}</span></div>
    </div>`;
  }
  // fixture fallback (demo mode)
  return `<div class="agent"><div class="an">${a.name}</div><div class="at">${a.type}</div><div class="badges">${(a.badges||[]).map(b=>`<span class="bdg ${b[0]}">${b[1]}</span>`).join('')}</div><div class="lanes">${(a.lanes||[]).map(l=>`<span class="lane">${l}</span>`).join('')}</div>${a.prov?`<div class="prov">provenance: ${a.prov}</div>`:''}</div>`;
}
function renderRegistry(){
  body.dataset.surface='registry';
  const list=REGISTRY_DATA||AGENTS;
  const cards=list.map(agentCardHTML).join('');
  const verifiable=!!REGISTRY_DATA;
  $('#work').innerHTML=`<div class="screen"><div class="sh">Govern · verifiable agent registry</div><h1>Is your team using the right agent for the job?</h1><p class="lede">Every registered agent carries who published it, what it claims, what it costs, the tasks it's approved for, and a <em>verifiable reputation</em> · a real survived/landed score plus an integrity hash. ${verifiable?'Verified agents are attested on the trustless registry (Algorand TestNet, proven at Berlin); the proof is the identity, not a cheaper unknown.':'Verification is provenance: a registry-verified agent trades frontier spend for a known, attestable identity.'}</p><div class="agents rich">${cards}</div></div>`;
}
function renderLog(){
  body.dataset.surface='log';
  const rows=LOG.map(e=>`<tr><td>${e[0]}</td><td>${e[1]}</td><td>${e[2]}</td><td class="num">${e[3]}</td><td class="num">${e[4]}</td></tr>`).join('');
  $('#work').innerHTML=`<div class="screen"><div class="sh">Govern · decision log</div><h1>Decision log</h1><p class="lede">Append-only trail. Every surviving finding entered the chain; the ratified policy is a new linked entry; the refuted claim is recorded, never silently dropped. Real SHA-256 anchors, hash-linked.</p><table class="tbl"><thead><tr><th>#</th><th>Kind</th><th>Entry</th><th>packet_hash</th><th>prev_hash</th></tr></thead><tbody>${rows}</tbody></table><p class="lede" style="font:11px/1.5 var(--mono);color:var(--text-mute)">${LOG.filter(e=>e[0]!=='—').length} anchored · 1 refuted${signed?' · 1 ratified this session':''} · ${corrections} correction${corrections!==1?'s':''} signed.</p></div>`;
}

// ── correction flow (restored) ──────────────────────────────────────────────
function openRegEdit(reg){
  const r=$(`.reg[data-reg="${reg}"]`); if(!r||r.classList.contains('editing'))return;
  const plain=r.querySelector('.rbody').textContent.trim().slice(0,180);
  r.querySelector('textarea').value=plain;
  r.classList.add('editing'); r.querySelector('textarea').focus();
}
function saveRegEdit(reg){
  const r=$(`.reg[data-reg="${reg}"]`); const val=r.querySelector('textarea').value.trim();
  if(val){ r.querySelector('.rbody').innerHTML='<span class="hl">'+val+'</span>'; }
  r.classList.remove('editing'); r.classList.add('corrected');
  recordCorrection(reg+' read');
}
function recordCorrection(where){
  corrections++; logChain('correction · '+where+' · operator','corr');
  const cc=$('#corrcount'); if(cc) cc.textContent=corrections+' correction'+(corrections>1?'s':'')+' · this is YOUR read now';
  const pre=$('.db.sign .pre'); if(pre) pre.textContent='correct →';
  toast('Correction recorded · appended to the chain (entry '+(5+corrections)+')');
}
// typed finding correction → new linked entry (kind) → re-anchors, badge stays green
function signFindingCorrection(fid,btn){
  const card=$(`.finding[data-finding="${fid}"]`);
  const kind=card.querySelector('.fc-kind.on')?.dataset.fckind||'cross';
  const note=card.querySelector('textarea').value.trim()||'operator amended the read';
  corrections++;
  const h=(0x7d4b+corrections).toString(16);
  logChain('correction · '+kind+' · '+fid+' · re-anchored','corr');
  card.classList.add('corrected');
  card.querySelector('.fc-done').innerHTML=`✓ correction appended &amp; re-anchored · <span class="mono">${kind}</span> · sha256 ${h}…a${corrections}9 · <span style="color:var(--good)">chain verified</span>`;
  const cc=$('#corrcount'); if(cc) cc.textContent=corrections+' correction'+(corrections>1?'s':'')+' · this is YOUR read now';
  const pre=$('.db.sign .pre'); if(pre) pre.textContent='correct →';
  toast('Correction signed · '+kind+' · new linked entry, chain stays verifiable ✓');
}
function logChain(text,cls){CHAIN.push(['t'+(5+corrections),text,cls,'new']);renderChain();}
// invisible presenter affordance · reset demo to a clean opening state (⌥R / 0)
const CHAIN0=CHAIN.slice(0,5).map(e=>e.slice(0,3));
function resetDemo(){
  corrections=0; signed=false;
  CHAIN=CHAIN0.map(e=>e.slice());
  SIGNALS.forEach(s=>{ if(s.id==='tickets'||s.id==='model') s.state='tray'; });
  body.dataset.relationship='operator';
  $$('.rel button').forEach(x=>x.classList.toggle('on',x.dataset.rel==='operator'));
  const db=$('#duebadge'); if(db) db.style.display='';
  renderChain(); go('today');
  toast('Demo reset · clean opening state');
}
function toast(msg){const t=$('#toast');t.innerHTML=`<span class="d">✎</span>${msg}`;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2600);}

// ── ratify → mint canonical artifact (corrections shape it) ─────────────────
function mintArtifact(){
  signed=true; const aw=$('#artwrap'); if(!aw)return;
  const corrLine = corrections? `<span class="corr" style="color:var(--coherence,#7AA9FF)">Operator made ${corrections} correction${corrections>1?'s':''} to the read before sealing · this reflects the corrected judgment.</span> ` : '';
  aw.innerHTML=`<div class="artifact"><div class="ab"><span class="stamp">ratified</span><span class="wh">2026-06 · operator · effective immediately</span></div>
    <div class="abody"><p class="adec">Opus 4.8 cannot be used for calendar management or routine admin work.</p>
    <p class="arat">${corrLine}Calendar/admin usage does not map to the approved OKRs, and a registry-verified lower-cost agent (CalendarOps, ~10% of Opus) covers it. E14 is product engineering (PR-103) and is NOT reclassified.</p>
    <div class="apol"><span class="pc al">allow · product_dev</span><span class="pc al">allow · security_hardening</span><span class="pc al">allow · architecture_review</span><span class="pc dn">deny · calendar_management</span><span class="pc dn">deny · routine_admin</span><span class="pc dn">deny · generic_summarization</span></div>
    <div class="arec"><span class="hl">anchored</span><span class="hs">sha256: 7d4b…a284 · local-first chain · entry ${6+corrections}/${6+corrections}</span><span class="ok">chain verified</span></div></div></div>
    <div class="calib-cta"><button data-go="mirror">◍ see how your judgment is calibrating →</button></div>`;
  const sb=$('.db.sign'); if(sb) sb.style.display='none';
  logChain('ratified · policy anchored · chain verified','corr');
  $('#duebadge').style.display='none';
  toast('Sealed & handed off · reversible by correction (append-only) · see it in Today');
  aw.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ── routing ─────────────────────────────────────────────────────────────────
function go(s){
  $$('.tab').forEach(t=>t.classList.toggle('on',t.dataset.go===s));
  ({today:renderToday,okr:renderOkr,loop:renderLoop,report:renderReport,mirror:renderMirror,registry:renderRegistry,log:renderLog}[s]||renderToday)();
  // path-only motion: replay the fade-up on the freshly-rendered work content
  const w=$('#work'); if(w){w.classList.remove('enter'); void w.offsetWidth; w.classList.add('enter');}
}
function highlightSignal(id){ $$('.sig').forEach(s=>s.classList.remove('cited'));
  const el=$(`.sig[data-sig="${id}"]`); if(el){el.classList.add('cited');el.classList.add('open');el.scrollIntoView({block:'nearest'});} }

document.addEventListener('click',e=>{
  const subj=e.target.closest('[data-subj]'); if(subj){ SUBJECT=subj.dataset.subj; corrections=0; signed=false; renderLoop(); return; }
  const go_=e.target.closest('[data-go]'); if(go_){go(go_.dataset.go);return;}
  const cite=e.target.closest('[data-cite]'); if(cite){highlightSignal(cite.dataset.cite);return;}
  const sig=e.target.closest('[data-sig]'); if(sig){const s=SIGNALS.find(x=>x.id===sig.dataset.sig);
    if(s.state==='tray'){s.state='slate';renderSignals();toast('Hardened '+s.src+' onto the slate');logChain('slate · hardened '+s.id,'corr');}
    else sig.classList.toggle('open'); return;}
  const ar=e.target.closest('[data-amendreg]'); if(ar){openRegEdit(ar.dataset.amendreg);return;}
  const sr=e.target.closest('[data-savereg]'); if(sr){saveRegEdit(sr.dataset.savereg);return;}
  if(e.target.closest('.rcancel')){e.target.closest('.reg').classList.remove('editing');return;}
  // FINDING interactions (the hero): expand → evidence+receipt; correct (typed)
  const fx=e.target.closest('[data-fexpand]'); if(fx){fx.closest('.finding').classList.toggle('open');return;}
  const fct=e.target.closest('[data-fcorrect]'); if(fct){fct.closest('.finding').classList.toggle('correcting');return;}
  const fk=e.target.closest('[data-fckind]'); if(fk){const box=fk.closest('.fc-kinds');box.querySelectorAll('.fc-kind').forEach(x=>x.classList.toggle('on',x===fk));return;}
  const fcs=e.target.closest('[data-fcsave]'); if(fcs){signFindingCorrection(fcs.dataset.fcsave,fcs);return;}
  const act=e.target.closest('[data-act]'); if(act){if(act.dataset.act==='sign')mintArtifact();else toast('Deferred 30 days · returns in Today');return;}
  if(e.target.closest('#cmdk-btn')){togglePalette(true);return;}
  if(e.target.id==='palette'){togglePalette(false);return;}
  const pr=e.target.closest('.pal-row'); if(pr){pr.dataset.act?doPalAct(pr.dataset.act):go(pr.dataset.goto);togglePalette(false);return;}
  const rel=e.target.closest('[data-rel]'); if(rel){body.dataset.relationship=rel.dataset.rel;$$('.rel button').forEach(x=>x.classList.toggle('on',x===rel));return;}
});

// ⌘K palette
const PAL=[{goto:'today',label:'Go · Today (re-entry)',k:'1'},{goto:'loop',label:'Go · The loop (sense→ratify)',k:'2'},{goto:'mirror',label:'Go · Mirror (calibration)',k:'3'},{goto:'registry',label:'Go · Agent registry',k:'4'},{goto:'log',label:'Go · Decision log',k:'5'},{act:'correct',label:'Correct the read · amend Synthesis',k:'C'},{act:'sign',label:'Sign & hand off (ratify)',k:'S'}];
function renderPal(q=''){const list=PAL.filter(p=>p.label.toLowerCase().includes(q.toLowerCase()));
  $('#pal-list').innerHTML=list.map((p,i)=>`<div class="pal-row ${i===0?'sel':''}" ${p.goto?`data-goto="${p.goto}"`:`data-act="${p.act}"`}>${p.label}<span class="pk">${p.k}</span></div>`).join('');}
function togglePalette(open){const p=$('#palette');p.classList.toggle('open',open);if(open){$('#pal-input').value='';renderPal();$('#pal-input').focus();}}
function doPalAct(a){ if(a==='correct'){go('loop');setTimeout(()=>openRegEdit('synthesis'),60);} else if(a==='sign'){go('loop');setTimeout(mintArtifact,60);} }
$('#pal-input').addEventListener('input',e=>renderPal(e.target.value));
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();togglePalette(!$('#palette').classList.contains('open'));return;}
  if($('#palette').classList.contains('open')){if(e.key==='Escape')togglePalette(false);
    if(e.key==='Enter'){const sel=$('.pal-row.sel')||$('.pal-row');if(sel){sel.dataset.goto?go(sel.dataset.goto):doPalAct(sel.dataset.act);togglePalette(false);}}return;}
  if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')return;
  // invisible presenter affordance: ⌥R (or "0") resets demo state between rehearsals/takes
  if((e.key==='0')||(e.altKey&&e.key.toLowerCase()==='r')){e.preventDefault();resetDemo();return;}
  const map={'1':'today','2':'okr','3':'loop','4':'report','5':'mirror','6':'registry','7':'log'}; if(map[e.key])go(map[e.key]);
  if(e.key.toLowerCase()==='c'&&body.dataset.surface==='loop')openRegEdit('synthesis');
  if(e.key.toLowerCase()==='s'&&body.dataset.surface==='loop'&&!signed)mintArtifact();
});

// ── the seam · load real pipeline output when ?run=<json> is present ─────────
// liminal-agents `npm run govern:emit` writes cuts/govern-run.json; opening
// 11-govern.html?run=govern-run.json renders that real run. No ?run ⇒ fixtures.
let OKR={product_pct:60,security_pct:40,objectives:[
  {name:'Accelerate product development',allocation:0.6,key_results:['Ship 3 customer-facing AI features this quarter']},
  {name:'Improve security hardening',allocation:0.4,key_results:['Complete penetration testing and remediate P0/P1 issues']},
]};
let REPORT=null, RUN_MODE='demo', REGISTRY_DATA=null, AGENT_FIT=null;

async function initGovernData(){
  const run=new URLSearchParams(location.search).get('run');
  if(run||window.GOVERN_DATA){
    try{
      const d=run?await fetch(run).then(r=>{if(!r.ok)throw new Error(r.status);return r.json();}):window.GOVERN_DATA;
      // shadow the inline globals with the real run (only present keys override)
      if(d.VENDORS)VENDORS=d.VENDORS; if(d.USAGE)USAGE=d.USAGE; if(d.SIGNALS)SIGNALS=d.SIGNALS;
      if(d.READS)READS=d.READS; if(d.RECON)RECON=d.RECON; if(d.FINDINGS)FINDINGS=d.FINDINGS;
      if(d.CHAIN)CHAIN=d.CHAIN; if(d.LOG)LOG=d.LOG;
      if(typeof d.SPEND_TOTAL==='number')SPEND_TOTAL=d.SPEND_TOTAL;
      if(typeof d.OPUS_TOTAL==='number')OPUS_TOTAL=d.OPUS_TOTAL;
      if(typeof d.COHORT==='number')COHORT=d.COHORT;
      if(typeof d.CLAIMED==='number')CLAIMED=d.CLAIMED;
      if(typeof d.VERIFIED==='number')VERIFIED=d.VERIFIED;
      if(d.okr)OKR=d.okr; if(d.report)REPORT=d.report;
      if(d.REGISTRY)REGISTRY_DATA=d.REGISTRY; if(d.AGENT_FIT)AGENT_FIT=d.AGENT_FIT;
      // hero swap-in-loop: replace the Outreach read's swap with the real marketplace comparison
      if(AGENT_FIT&&READS.outreach)READS.outreach.html='Drafted · the registry has a better-fit verified agent for this task <span class="cite" data-cite="registry">agent-registry</span>. Ready to ratify the routing rule.'+swapHTML(AGENT_FIT);
      RUN_MODE=d.meta?.mode==='live'?'live':'real';
      const badge=$('#run-badge'); if(badge){badge.textContent=RUN_MODE==='live'?'live run':'real run';badge.classList.add('on');}
    }catch(err){
      console.warn('[govern] ?run load failed, using demo fixtures:',err);
    }
  }
  // boot routing: ?subject= picks the loop's subject (cut 11's subject is a parameter);
  // ?beat=loop (or any ?subject) boots straight into the deliberation instead of Today,
  // so the demo deep-link lands on the 8-agent spend loop with no manual click.
  const params=new URLSearchParams(location.search);
  const wantSubject=params.get('subject');
  if(wantSubject&&SUBJECTS[wantSubject])SUBJECT=wantSubject;
  const wantLoop=params.get('beat')==='loop'||!!wantSubject;
  renderChain(); go(wantLoop?'loop':'today');
}

// boot · load real data if requested, then route (?subject/?beat) or land on Today
initGovernData();
</script>
