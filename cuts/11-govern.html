<!doctype html>
<html lang="en" data-product="business" data-density="analyst" data-relationship="operator" data-surface="today">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cut 11 · Govern — the AI-Spend loop · Liminal</title>
<!--
  Cut 11 · Govern — the real AI-Spend Governance loop (v2)
  ──────────────────────────────────────────────────────────────────────
  Loop-stage · full-loop · Altitude · L1→L2 · Surface · desktop
  Framing · wedge→infra (AI-spend) · Maturity · live
  ──────────────────────────────────────────────────────────────────────
  PORTED from the shipped Govern cockpit (liminal-govern/app) + RECONCILED with cut 11's
  loved prototype interactions. Real verified figures ($13,045→$4,500→$324→$162; E14/PR-103
  adversarial catch). Restores: the 4-register read + the CORRECTION FLOW (correction is the
  primary act), the OKR allocation bar, the OG Today + Mirror surfaces, and the 12-agent
  ORBITAL agency rail (from slate-tray, re-subjected to spend, canon-color-clean).
  Follows design-system.html canon: register tokens only, NO inline color overrides.

  Surfaces (tabs + ⌘K): Today (re-entry) · The Loop (sense→read→catch→ratify) · Mirror
  (calibration) · Registry (verified agents) · Decision log (hash chain).
  ── Try it: ⌘K · 1–5 tabs · on the Loop: "Amend read" any register (correction) · Sign to ratify.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../design-system/tokens/design-tokens.css">
<link rel="stylesheet" href="../design-system/components/framing.css">
<!-- Shared design system (converged): chrome + canonical .artifact from cut-shell.css. -->
<link rel="stylesheet" href="../lib/cut-shell.css">
<link rel="stylesheet" href="../lib/brand-upgrade.css">
<style>
@font-face{font-family:"Nineties Headliner";src:url("../fonts/nineties-headliner.otf") format("opentype");font-weight:400;font-display:swap}
@font-face{font-family:"Perfectly Nineties";src:url("../fonts/perfectly-nineties-regular.otf") format("opentype");font-weight:400;font-display:swap}
@font-face{font-family:"Perfectly Nineties";src:url("../fonts/PerfectlyNineties-Semibold.otf") format("opentype");font-weight:600;font-display:swap}
*{box-sizing:border-box}html,body{margin:0;height:100%}
h1,h2,h3{text-wrap:balance}p{text-wrap:pretty}
button{transition:transform .22s var(--ease-spring,ease),color .15s,background .15s,border-color .15s}
button:hover{transform:translateY(-1.5px)}button:active{transform:translateY(0) scale(.97);transition-duration:.08s}
@media (prefers-reduced-motion:reduce){button{transition:color .15s,background .15s}button:hover,button:active{transform:none}}
body{background:var(--bg);color:var(--text);font:14px/1.5 var(--sans);-webkit-font-smoothing:antialiased;
  background-image:radial-gradient(900px 480px at 8% -6%,var(--diligence-50),transparent 60%),radial-gradient(760px 480px at 106% 4%,var(--depth-50),transparent 55%);
  display:flex;align-items:center;justify-content:center;min-height:100vh;padding:18px}
.mono{font-family:var(--mono)}.serif{font-family:var(--serif,"Perfectly Nineties",Georgia,serif)}
/* CHROME (.shell/.rb-top/.traffic/.brand/.rb-bot) inherited from converged cut-shell.css. */

/* ── top-bar tabs ── */
.tabs{display:flex;gap:2px;margin:0 auto}
.tab{font:9px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);background:transparent;border:1px solid transparent;border-radius:4px;padding:6px 11px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:7px}
.tab:hover{color:var(--text);background:var(--hover)}.tab.on{color:var(--text);background:var(--hover);border-color:var(--card-border)}
.tab .k{font-size:8px;color:var(--text-mute);border:1px solid var(--card-border);border-radius:2px;padding:0 4px}
.tab .badge{background:var(--watch);color:var(--bg);border-radius:8px;font-size:8px;padding:1px 5px;letter-spacing:0}
.cmdk{font:9px/1 var(--mono);letter-spacing:.1em;color:var(--text-faint);border:1px solid var(--card-border);border-radius:4px;padding:6px 9px;cursor:pointer;display:flex;gap:6px;align-items:center}
.cmdk:hover{color:var(--text-mid);border-color:var(--text-faint)}
.rel{display:flex;align-items:center;gap:5px}.rel .lbl{color:var(--text-faint);font-size:8px;letter-spacing:.14em;text-transform:uppercase}
.rel button{font:8px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);background:transparent;border:1px solid var(--card-border);border-radius:3px;padding:5px 7px;cursor:pointer;transition:.15s}
.rel button:hover{color:var(--text)}.rel button.on{color:var(--bg);background:var(--diligence);border-color:var(--diligence)}

/* ── 3-pane middle ── */
.mid{display:grid;grid-template-columns:280px 1fr 320px;min-height:0;position:relative;transition:grid-template-columns .25s var(--ease)}
/* Today/Mirror/Registry/Log go full-width (focus the center) */
body[data-surface="today"] .mid,body[data-surface="mirror"] .mid,body[data-surface="registry"] .mid,body[data-surface="log"] .mid{grid-template-columns:0px 1fr 0px}
body[data-surface="today"] .rail-l,body[data-surface="today"] .rail-r,body[data-surface="mirror"] .rail-l,body[data-surface="mirror"] .rail-r,body[data-surface="registry"] .rail-l,body[data-surface="registry"] .rail-r,body[data-surface="log"] .rail-l,body[data-surface="log"] .rail-r{opacity:0;pointer-events:none}
.rail-l,.rail-r{transition:opacity .2s var(--ease)}

/* ── LEFT RAIL · evidence signals ── */
.rail-l{background:var(--frame-bg-2);border-right:1px solid var(--frame-border);padding:13px 0;overflow-y:auto}
.rl-h{display:flex;align-items:center;gap:7px;padding:0 15px 8px;font:9px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint)}
.rl-h .live{display:inline-flex;align-items:center;gap:5px;color:var(--signal);margin-left:auto}.rl-h .live::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--signal);animation:pl 1.1s var(--ease) infinite}
.rl-sub{padding:0 15px 9px;font:8px/1.4 var(--mono);letter-spacing:.08em;color:var(--text-mute);border-bottom:1px solid var(--frame-border);margin-bottom:8px}
.rl-grp{padding:6px 15px 3px;font:8px/1 var(--mono);letter-spacing:.18em;text-transform:uppercase;color:var(--text-mute)}
.sig{margin:3px 9px;padding:7px 9px;border:1px solid var(--card-border);border-radius:5px;background:var(--frame-bg);cursor:pointer;transition:background .25s,border-color .25s,opacity .2s}
.sig .src{font:8px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint)}
.sig .nm{margin-top:3px;font:10.5px/1.3 var(--mono);color:var(--text-mid)}
.sig .act{float:right;font:8px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint)}
.sig.tray{border-style:dashed;opacity:.7}.sig.tray .act{color:var(--watch)}
.sig.slate{border-color:var(--card-border-2)}
.sig.cited{background:var(--diligence-bg);border-color:var(--diligence)}.sig.cited .src{color:var(--diligence)}.sig.cited .nm{color:var(--text)}.sig.cited .act{color:var(--diligence)}
.sig .rows{margin-top:6px;font:9px/1.5 var(--mono);color:var(--text-faint);display:none;border-top:1px dashed var(--card-border);padding-top:5px}
.sig.open .rows{display:block}

/* ── CENTER ── */
.work{padding:0;overflow-y:auto;position:relative}
.pad{padding:22px 28px;display:flex;flex-direction:column;gap:16px}
.invoke{display:flex;align-items:baseline;gap:10px;font:10px/1 var(--mono);letter-spacing:.06em;color:var(--text-faint);border-bottom:1px solid var(--card-border);padding-bottom:12px}
.invoke b{color:var(--diligence);letter-spacing:.12em;text-transform:uppercase}
.seam{--seam-mb:14px}

/* sense — vendor table + usage stream */
.sense-h{display:flex;align-items:baseline;gap:10px}
.sense-h .anum{font:9px/1 var(--mono);letter-spacing:.16em;color:var(--diligence);border:1px solid var(--diligence-edge);border-radius:3px;padding:3px 6px}
.sense-h .atitle{font:500 16px/1.2 var(--display);color:var(--text)}
.sense-h .asub{margin-left:auto;font:9px/1 var(--mono);color:var(--text-mute)}
.tbl{width:100%;border-collapse:collapse;font:11px/1.5 var(--mono);border:1px solid var(--card-border);border-radius:7px;overflow:hidden}
.tbl th{text-align:left;padding:8px 11px;font:8px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);background:var(--frame-bg-3);border-bottom:1px solid var(--frame-border)}
.tbl td{padding:7px 11px;color:var(--text-dim);border-bottom:1px solid var(--frame-border)}
.tbl tr:last-child td{border-bottom:0}.tbl td.num{text-align:right;font-variant-numeric:tabular-nums}
.tbl tr.flag td{background:var(--alarm-bg)}.tbl tr.flag td:first-child{color:var(--alarm)}
.tbl tr.total td{font-weight:600;color:var(--text);background:var(--frame-bg-3)}
.stream{display:flex;flex-direction:column;gap:2px;font:10.5px/1 var(--mono)}
.urow{display:grid;grid-template-columns:1fr auto auto;gap:14px;align-items:center;padding:7px 11px;border:1px solid var(--card-border);border-radius:4px;background:var(--frame-bg-2)}
.urow .cat{color:var(--text-faint);font-size:9px}.urow .cost{color:var(--text-mid);font-variant-numeric:tabular-nums}
.urow.flagged{border-color:var(--alarm-edge);background:var(--alarm-bg)}.urow.flagged .cat{color:var(--alarm)}

/* ── the 4-register READ (restored, with correction flow) ── */
.reg{padding:14px 0;border-bottom:1px solid rgba(255,255,255,.03);position:relative;opacity:0;transform:translateY(5px);animation:rin .5s var(--ease) forwards}
.reg .rh{display:flex;align-items:baseline;gap:10px}
.reg .rname{font:10px/1 var(--mono);letter-spacing:.2em;text-transform:uppercase}
.reg .rt{font:9px/1 var(--mono);color:var(--text-mute);margin-left:auto}
.reg .amend{font:8px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);border:1px solid var(--card-border);border-radius:3px;padding:3px 7px;cursor:pointer;opacity:0;transition:.15s}
.reg:hover .amend{opacity:1}.reg .amend:hover{color:var(--diligence);border-color:var(--diligence)}
.reg .rbody{margin-top:9px;font:14px/1.55 var(--serif,"Perfectly Nineties",Georgia,serif);color:var(--text-mid)}
.reg .rbody .hl{color:var(--text)}
.reg.diligence .rname{color:var(--diligence)}.reg.synthesis .rname{color:var(--depth)}.reg.judgment .rname{color:var(--judgment)}.reg.outreach .rname{color:var(--connection)}
.reg.corrected{background:linear-gradient(90deg,var(--diligence-bg),transparent 60%)}
.reg .cmark{display:none;font:8px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--diligence);margin-left:8px}
.reg.corrected .cmark{display:inline}
.reg-edit{display:none;margin-top:9px;gap:8px}
.reg.editing .reg-edit{display:flex;flex-direction:column}
.reg-edit textarea{width:100%;background:var(--frame-bg);border:1px solid var(--card-border);border-radius:4px;color:var(--text);font:12px/1.5 var(--sans);padding:8px 10px;resize:vertical;min-height:54px}
.reg-edit .er{display:flex;gap:8px;align-items:center}
.reg-edit .save{font:8px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:#fff;background:var(--diligence);border:1px solid var(--diligence);border-radius:3px;padding:7px 12px;cursor:pointer}
.reg-edit .cancel{font:8px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);background:transparent;border:1px solid var(--card-border);border-radius:3px;padding:7px 12px;cursor:pointer}
.reg-edit .hint{margin-left:auto;font:8px/1.4 var(--mono);color:var(--text-mute);letter-spacing:.06em;max-width:30ch;text-align:right}
.cite{font:9px/1 var(--mono);letter-spacing:.04em;color:var(--depth);border:1px solid var(--depth-edge);border-radius:3px;padding:2px 6px;margin-left:4px;cursor:pointer;transition:.15s;white-space:nowrap}
.cite:hover{background:var(--depth-bg)}

/* OKR allocation bar (restored) — canon tokens only */
.allocbar{margin-top:11px;height:26px;border-radius:4px;overflow:hidden;display:flex;border:1px solid var(--card-border);position:relative;max-width:400px}
.allocbar .p{background:var(--diligence);display:flex;align-items:center;padding-left:10px;font:9px/1 var(--mono);color:#fff;letter-spacing:.08em}
.allocbar .s{background:var(--depth);display:flex;align-items:center;padding-left:10px;font:9px/1 var(--mono);color:#fff;letter-spacing:.08em;position:relative}
.allocbar .ghost{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--alarm);box-shadow:0 0 0 1px var(--alarm)}
.allocbar .ghost::after{content:"actual 24%";position:absolute;top:-15px;left:-25px;font:8px/1 var(--mono);color:var(--alarm);white-space:nowrap}

/* verdict + refusal */
.verdict{display:inline-flex;align-items:center;gap:9px;margin-top:4px;font:11px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--alarm);border:1px solid var(--alarm-edge);background:var(--alarm-bg);padding:7px 12px;border-radius:4px}
.refusal{display:flex;gap:9px;align-items:flex-start;margin:10px 0 0;padding:8px 12px;border-left:2px solid var(--judgment);background:var(--judgment-bg);border-radius:0 4px 4px 0}
.refusal .ico{color:var(--judgment);font:600 12px/1.3 var(--mono)}
.refusal .tx{font:11px/1.45 var(--mono);color:var(--text-mid)}.refusal .tx b{color:var(--judgment);font-weight:500}

/* the catch (E14/PR-103) — hero beat */
.catch{border-left:2px solid var(--alarm);background:var(--alarm-bg);border-radius:0 5px 5px 0;padding:11px 14px;margin-top:10px}
.catch .ch{display:flex;align-items:center;gap:8px;font:9px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--alarm)}
.catch .cb{margin-top:8px;font:12.5px/1.55 var(--sans);color:var(--text-mid)}.catch .cb b{color:var(--text);font-weight:500}.catch .cb s{color:var(--text-faint);text-decoration-color:var(--alarm)}
.catch .moral{margin-top:9px;font:11px/1.5 var(--serif,Georgia,serif);font-style:italic;color:var(--text-dim)}
.verifier{display:inline-flex;align-items:center;gap:7px;font:9px/1 var(--mono);letter-spacing:.06em;color:var(--judgment);margin:8px 0}
.verifier::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--judgment);animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--judgment-glow)}50%{box-shadow:0 0 0 5px transparent}}

/* reconciliation strip (the visible subtraction — "judges reward this") */
.recon{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:10px 0}
.recon .rc{border:1px solid var(--card-border);border-radius:6px;padding:10px 12px;background:var(--frame-bg-2);position:relative}
.recon .rc .l{font:8px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint)}
.recon .rc .v{margin-top:6px;font:600 19px/1 var(--mono);font-variant-numeric:tabular-nums;color:var(--text)}
.recon .rc.drop .v{color:var(--alarm)}.recon .rc.verified .v{color:var(--good)}.recon .rc.naive .v{color:var(--text-faint)}
.recon .rc .op{position:absolute;left:-9px;top:50%;transform:translateY(-50%);font:13px/1 var(--mono);color:var(--text-mute)}

/* FINDING — clickable provenance artifact (THE hero interaction) */
.finding{border:1px solid var(--card-border);border-radius:7px;background:var(--frame-bg-2);overflow:hidden;margin-bottom:9px}
.finding.dropped{opacity:.78;border-left:3px solid var(--alarm)}
.finding-head{display:flex;align-items:flex-start;gap:8px;padding:11px 13px;cursor:pointer}
.finding-head .meta{flex:1;min-width:0}
.finding-head .badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.finding-head .bdg{display:inline-flex;align-items:center;gap:5px;font:8px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);border:1px solid var(--card-border);border-radius:3px;padding:3px 6px}
.finding-head .bdg.dot::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.finding-head .bdg.good{color:var(--good)}.finding-head .bdg.bad{color:var(--alarm)}.finding-head .bdg.acc{color:var(--diligence)}
.finding-head .ftitle{font:500 13.5px/1.3 var(--sans);color:var(--text)}.finding.dropped .ftitle{color:var(--text-faint);text-decoration:line-through;text-decoration-color:var(--alarm)}
.finding-head .fsave{font:600 16px/1 var(--mono);color:var(--good);font-variant-numeric:tabular-nums;white-space:nowrap}
.finding-head .chev{font:10px/1 var(--mono);color:var(--text-mute);transition:transform .2s;margin-top:2px}
.finding.open .chev{transform:rotate(90deg)}
.finding-route{margin:0 13px 9px;padding:7px 10px;background:var(--diligence-bg);border:1px solid var(--diligence-edge);border-radius:4px;font:10px/1.4 var(--mono);color:var(--text-mid)}
.finding-route .chip{color:var(--connection);border:1px solid var(--connection);border-radius:3px;padding:1px 5px;margin:0 3px}
.finding-body{display:none;border-top:1px dashed var(--card-border)}
.finding.open .finding-body{display:block}
.ev-table{width:100%;border-collapse:collapse;font:9.5px/1.4 var(--mono)}
.ev-table caption{text-align:left;padding:8px 13px 4px;font:8px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint)}
.ev-table td,.ev-table th{padding:5px 13px;text-align:left;color:var(--text-dim);border-bottom:1px solid var(--frame-border)}
.ev-table th{font:8px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint)}
.ev-table td.num{text-align:right;font-variant-numeric:tabular-nums;color:var(--text-mid)}
.ev-table tr:last-child td{border-bottom:0}
.receipt{display:flex;flex-wrap:wrap;gap:6px 18px;padding:9px 13px;background:var(--frame-bg-3);border-top:1px solid var(--frame-border);font:9px/1.4 var(--mono);color:var(--text-dim)}
.receipt .k{color:var(--text-faint);letter-spacing:.08em;text-transform:uppercase;margin-right:5px}
.receipt .full{flex-basis:100%}
.receipt .vbadge{display:inline-flex;align-items:center;gap:5px;color:var(--good);letter-spacing:.06em}.receipt .vbadge::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--good)}
.receipt.bad .vbadge{color:var(--alarm)}.receipt.bad .vbadge::before{background:var(--alarm)}
.finding-correct{padding:10px 13px;border-top:1px dashed var(--card-border);background:var(--frame-bg-3)}
.fc-toggle{font:8px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);border:1px solid var(--card-border);border-radius:3px;padding:5px 9px;cursor:pointer;background:transparent}
.fc-toggle:hover{color:var(--diligence);border-color:var(--diligence)}
.fc-box{display:none;margin-top:9px}.finding.correcting .fc-box{display:block}
.fc-kinds{display:flex;gap:6px;margin-bottom:8px}
.fc-kind{font:8px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);border:1px solid var(--card-border);border-radius:3px;padding:5px 8px;cursor:pointer;background:transparent}
.fc-kind.on{color:#fff;background:var(--diligence);border-color:var(--diligence)}
.fc-box textarea{width:100%;background:var(--frame-bg);border:1px solid var(--card-border);border-radius:4px;color:var(--text);font:11px/1.5 var(--sans);padding:8px 10px;resize:vertical;min-height:46px}
.fc-box .er{display:flex;gap:8px;align-items:center;margin-top:8px}
.fc-box .save{font:8px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:#fff;background:var(--diligence);border:1px solid var(--diligence);border-radius:3px;padding:7px 12px;cursor:pointer}
.fc-done{display:none;margin-top:8px;font:9px/1.4 var(--mono);color:var(--good)}.finding.corrected .fc-done{display:block}.finding.corrected .fc-box{display:none}
/* chain-integrity badge (stays green through corrections) */
.chain-integ{display:inline-flex;align-items:center;gap:5px;font:8px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--good);margin-left:auto;flex-shrink:0}
.chain-integ::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--good);box-shadow:0 0 6px var(--good)}

/* agent-fit swap */
.swap{display:grid;grid-template-columns:1fr 24px 1fr;align-items:stretch;max-width:480px;margin-top:10px}
.swap .side{padding:11px 13px;border:1px solid var(--card-border);border-radius:5px;background:var(--frame-bg-2)}
.swap .side.cur{border-color:var(--alarm-edge)}.swap .side.sug{border-color:var(--connection);background:linear-gradient(180deg,var(--connection-bg),transparent)}
.swap .ro{font:8px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint)}
.swap .ag{margin:6px 0 0;font:13px/1.2 var(--sans);color:var(--text);font-weight:500}
.swap .co{margin-top:3px;font:9px/1.2 var(--mono);color:var(--text-dim)}
.swap .bd{display:inline-flex;align-items:center;gap:5px;margin-top:9px;font:8px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase}.swap .bd::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.swap .cur .bd{color:var(--alarm)}.swap .sug .bd{color:var(--connection)}

let _orbTimer=null;
function orbitalDemo(){
  if(_orbTimer){clearInterval(_orbTimer);_orbTimer=null;}
  const G={queued:'◯',reading:'◉',complete:'●',refused:'⊘'};
  const STEPS=[
    {a:{spend:'reading',util:'queued',security:'queued',marketplace:'queued',execcomms:'queued',misuse:'queued',adversarial:'queued',okr:'queued',reconcile:'queued'},arr:[],cov:'9 specialists · 1 reading · scanning the fleet spend',conv:false},
    {a:{spend:'complete',util:'reading',security:'reading',marketplace:'queued',execcomms:'queued',misuse:'reading',adversarial:'queued',okr:'reading',reconcile:'queued'},arr:[],cov:'9 specialists · 4 reading · spend + util + OKR + misuse',conv:false},
    {a:{spend:'complete',util:'complete',security:'complete',marketplace:'reading',execcomms:'refused',misuse:'reading',adversarial:'reading',okr:'complete',reconcile:'queued'},arr:['arrow-execcomms'],cov:'exec-comms refused — out of lane, pre-verdict',conv:false},
    {a:{spend:'complete',util:'complete',security:'complete',marketplace:'complete',execcomms:'refused',misuse:'complete',adversarial:'refused',okr:'complete',reconcile:'reading'},arr:['arrow-execcomms','arrow-adversarial'],cov:'adversarial dropped E14 — PR-103 · honesty in the chain',conv:false},
    {a:{spend:'complete',util:'complete',security:'complete',marketplace:'complete',execcomms:'refused',misuse:'complete',adversarial:'refused',okr:'complete',reconcile:'complete'},arr:['arrow-execcomms','arrow-adversarial','arrow-util'],cov:'convergence: route calendar → CalendarOps',conv:true},
    {a:{spend:'complete',util:'complete',security:'complete',marketplace:'complete',execcomms:'refused',misuse:'complete',adversarial:'refused',okr:'complete',reconcile:'complete'},arr:['arrow-execcomms','arrow-adversarial','arrow-util'],cov:'vault committed · the disagreement is the data',conv:true,sealed:true},
  ];
  let i=0;
  function apply(s){
    Object.entries(s.a).forEach(([ag,st])=>{const el=document.querySelector(`[data-agent="${ag}"]`);if(!el)return;el.textContent=G[st];el.classList.remove('queued','reading','complete','refused');el.classList.add(st);});
    document.querySelectorAll('.refusal-arrow').forEach(a=>a.classList.remove('active'));
    s.arr.forEach(id=>{const a=document.getElementById(id);if(a)a.classList.add('active');});
    const c=document.getElementById('coverage-counts');if(c)c.textContent=s.cov;
    const orb=document.getElementById('orbital-center-orb');if(orb){orb.classList.toggle('convergent',!!s.conv&&!s.sealed);orb.classList.toggle('sealed',!!s.sealed);}
  }
  const reduced=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(reduced){apply(STEPS[4]);return;}
  apply(STEPS[0]);i=1;
  _orbTimer=setInterval(()=>{apply(STEPS[i]);i=(i+1)%STEPS.length;},4200);
}

  // FINDING interactions (the hero): expand → evidence+receipt; correct (typed)
  const fx=e.target.closest('[data-fexpand]'); if(fx){fx.closest('.finding').classList.toggle('open');return;}
  const fct=e.target.closest('[data-fcorrect]'); if(fct){fct.closest('.finding').classList.toggle('correcting');return;}
  const fk=e.target.closest('[data-fckind]'); if(fk){const box=fk.closest('.fc-kinds');box.querySelectorAll('.fc-kind').forEach(x=>x.classList.toggle('on',x===fk));return;}
  const fcs=e.target.closest('[data-fcsave]'); if(fcs){signFindingCorrection(fcs.dataset.fcsave,fcs);return;}
  const act=e.target.closest('[data-act]'); if(act){if(act.dataset.act==='sign')mintArtifact();else toast('Deferred 30 days · returns in Today');return;}
  if(e.target.closest('#cmdk-btn')){togglePalette(true);return;}
  if(e.target.id==='palette'){togglePalette(false);return;}
  const pr=e.target.closest('.pal-row'); if(pr){pr.dataset.act?doPalAct(pr.dataset.act):go(pr.dataset.goto);togglePalette(false);return;}
  const rel=e.target.closest('[data-rel]'); if(rel){body.dataset.relationship=rel.dataset.rel;$$('.rel button').forEach(x=>x.classList.toggle('on',x===rel));return;}
});

// ⌘K palette
const PAL=[{goto:'today',label:'Go · Today (re-entry)',k:'1'},{goto:'loop',label:'Go · The loop (sense→ratify)',k:'2'},{goto:'mirror',label:'Go · Mirror (calibration)',k:'3'},{goto:'registry',label:'Go · Agent registry',k:'4'},{goto:'log',label:'Go · Decision log',k:'5'},{act:'correct',label:'Correct the read · amend Synthesis',k:'C'},{act:'sign',label:'Sign & hand off (ratify)',k:'S'}];
function renderPal(q=''){const list=PAL.filter(p=>p.label.toLowerCase().includes(q.toLowerCase()));
  $('#pal-list').innerHTML=list.map((p,i)=>`<div class="pal-row ${i===0?'sel':''}" ${p.goto?`data-goto="${p.goto}"`:`data-act="${p.act}"`}>${p.label}<span class="pk">${p.k}</span></div>`).join('');}
function togglePalette(open){const p=$('#palette');p.classList.toggle('open',open);if(open){$('#pal-input').value='';renderPal();$('#pal-input').focus();}}
function doPalAct(a){ if(a==='correct'){go('loop');setTimeout(()=>openRegEdit('synthesis'),60);} else if(a==='sign'){go('loop');setTimeout(mintArtifact,60);} }
$('#pal-input').addEventListener('input',e=>renderPal(e.target.value));
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();togglePalette(!$('#palette').classList.contains('open'));return;}
  if($('#palette').classList.contains('open')){if(e.key==='Escape')togglePalette(false);
    if(e.key==='Enter'){const sel=$('.pal-row.sel')||$('.pal-row');if(sel){sel.dataset.goto?go(sel.dataset.goto):doPalAct(sel.dataset.act);togglePalette(false);}}return;}
  if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')return;
  const map={'1':'today','2':'loop','3':'mirror','4':'registry','5':'log'}; if(map[e.key])go(map[e.key]);
  if(e.key.toLowerCase()==='c'&&body.dataset.surface==='loop')openRegEdit('synthesis');
  if(e.key.toLowerCase()==='s'&&body.dataset.surface==='loop'&&!signed)mintArtifact();
});

// boot — land on Today (the loop returns)
renderChain(); go('today');
</script>
