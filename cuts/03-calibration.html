<style>
  /* v0.8.5 P3 — initial paint suppression (F5 from cut01 polish pass).
     body opacity 0 → 1 toggle eliminates pre-refresh flash. .ready class
     fires after refresh() completes initial render of vault calibration data. */
  body {
    opacity: 0;
    transition: opacity 240ms ease-out;
  }
  body.ready {
    opacity: 1;
  }

  /* Calibration view · temporal grid · per UI_GAP_SPEC §3.3
     ────────────────────────────────────────────────────────────────
     PER-CUT TOKEN MAP · binds calibration-vocabulary tokens to canon.
     Per cuts/CONTRIBUTING.md rule #1: cuts cannot redefine canon
     tokens. We add new prototype-vocabulary aliases (--paper, --text-soft,
     --border, etc.) that bind into existing canon tokens (--frame-bg,
     --text-mid, --card-border, --diligence, --synthesis etc.). When canon
     changes, this view picks up the change.
     ──────────────────────────────────────────────────────────────── */
  :root {
    /* surface aliases · calibration uses paper-vocabulary */
    --paper:           var(--frame-bg,      #0E0E11);
    --paper-lift:      var(--frame-bg-2,    #0C0C0F);
    --paper-soft:      var(--frame-bg-3,    #15161A);
    --border:          var(--card-border,   #232327);
    --border-soft:     var(--frame-border,  #1F1F23);
    --cell-bg:         var(--frame-bg-2,    #0C0C0F);
    --text-soft:       var(--text-dim,      #7A7A82);
    --easing:          var(--ease-out, cubic-bezier(0.4, 0, 0.2, 1));

    /* signal aliases · per-register ink/paper · bind to canon hue scales */
    --signal-violet-ink:   var(--clarity-500,    #8E66FB);
    --signal-violet-paper: var(--clarity-bg,     rgba(142,102,251,0.06));
    --signal-solar-ink:    var(--agency-500,     #FFD24A);
    --signal-solar-paper:  var(--agency-bg,      rgba(255,210,74,0.06));
    --signal-pink-ink:     var(--wholeness-500,  #E90095);
    --signal-pink-paper:   var(--wholeness-bg,   rgba(233,0,149,0.06));
    --signal-jade-ink:     var(--connection-500, #3EE878);
    --signal-jade-paper:   var(--connection-bg,  rgba(62,232,120,0.06));
  }

  /* Override shell grid to accommodate the temporal view */
  .stage {
    display: flex;
    flex-direction: column;
  }

  .frame {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* Titlebar stays from shell */
  .titlebar {
    flex-shrink: 0;
  }

  /* Main content: the temporal grid */
  .cal-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--paper);
    padding: 2rem;
    gap: 2rem;
  }

  .cal-header {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .cal-eyebrow {
    font-family: Newsreader, serif;
    font-style: italic;
    font-size: 0.875rem;
    color: var(--text-soft);
    line-height: 1.4;
  }

  .cal-title {

    font-size: 1.5rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }

  }

  /* Grid container · grid takes full row · drill panel sits below it
     (was side-by-side, but at desktop viewports the drill below reads
     better and the grid gets full width for 12 columns) */
  .cal-grid-wrapper {
    flex: 1;
    overflow: auto;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    min-height: 0;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: 100px repeat(12, minmax(0, 1fr));
    grid-template-rows: 32px repeat(4, minmax(72px, 1fr));
    gap: 1px;
    background: var(--paper-soft);
    padding: 1px;
    width: 100%;
    flex: 1;
  }

  /* Week headers */
  .cal-week-header {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Geist Mono, monospace;
    font-size: 0.75rem;

    background: var(--paper);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .cal-week-header.corner {
    grid-column: 1;
    grid-row: 1;
  }

  /* Register row labels */
  .cal-register-label {
    display: flex;
    align-items: center;
    padding: 0 1rem;
    font-family: Geist, sans-serif;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text);
    background: var(--paper);
    cursor: pointer;
    user-select: none;
    transition: background 140ms var(--easing);

  }

  .cal-register-label.diligence {
    color: var(--diligence);
  }

  .cal-register-label.synthesis {
    color: var(--synthesis);
  }

  .cal-register-label.judgment {
    color: var(--judgment);
  }

  .cal-register-label.outreach {
    color: var(--outreach);
  }

  /* Cells: correction count + tag · min-width:0 prevents grid blowout
     when long tag names (ASSUMES_FACTS_NOT_IN_EVIDENCE) try to push width */
  .cal-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.25rem;
    padding: 0.5rem 0.4rem;
    background: var(--paper);
    border: 1px solid var(--border-soft);
    cursor: pointer;
    transition: all 140ms var(--easing);
    position: relative;
    min-width: 0;
    min-height: 64px;
    overflow: hidden;
  }

  .cal-cell:hover {
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    border-color: var(--border);
  }

  .cal-cell.diligence {
    --cell-accent: var(--diligence);
    --cell-bg: var(--diligence-bg);
  }

  .cal-cell.synthesis {
    --cell-accent: var(--synthesis);
    --cell-bg: var(--synthesis-bg);
  }

  .cal-cell.judgment {
    --cell-accent: var(--judgment);
    --cell-bg: var(--judgment-bg);
  }

  .cal-cell.outreach {
    --cell-accent: var(--outreach);
    --cell-bg: var(--outreach-bg);
  }

  /* Correction intensity encoding */
  .cal-cell.empty {
    background: var(--paper);
    border: 1px dashed var(--border-soft);
  }

  /* Intensity encoding · F9 contrast fix (2026-06-02)
     ────────────────────────────────────────────────────────────────
     Was: mixed --cell-bg (an already-faint *-bg wash at ~6% alpha)
     with --paper, so filled cells landed ~1.5–4.5% above the near-black
     background and the grid read empty at rest. Now: composite the FULL
     register accent (--cell-accent → --judgment/--diligence/etc.) with
     --paper at deliberate ratios so each filled cell clears the
     background and intensity is legible without interaction. Per-register
     hue is preserved; no canon token is redefined (rule #1) — we only
     change how this cut composites the hue it already binds. */
  .cal-cell.light {
    background: color-mix(in oklch, var(--cell-accent) 14%, var(--paper) 86%);
    border-color: color-mix(in oklch, var(--cell-accent) 22%, var(--border-soft));
  }

  .cal-cell.medium {
    background: color-mix(in oklch, var(--cell-accent) 28%, var(--paper) 72%);
    border-color: color-mix(in oklch, var(--cell-accent) 38%, var(--border-soft));
  }

  .cal-cell.saturated {
    background: color-mix(in oklch, var(--cell-accent) 46%, var(--paper) 54%);
    border-color: color-mix(in oklch, var(--cell-accent) 60%, var(--border-soft));
  }

  .cal-cell-count {
    font-family: Geist Mono, monospace;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text);

  .cal-cell-tag {

    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;

<script type="module">
  /* Cut 03 · Calibration · live data binding
     ────────────────────────────────────────────────────────────────────
     Reads real corrections from lib/vault-store.js (IndexedDB) and
     layers them on top of a seeded mock baseline so the demo is never
     empty but real user activity shows through immediately.

     Data flow:
       1. seed mock baseline (12 weeks × 4 registers · varied densities)
       2. load real corrections from IDB (surface=personal · personal is
          the founder-OS surface that cut 03 belongs to)
       3. bucket each real correction into its week column based on ts
       4. merge into the same {weeks, data} shape mock uses
       5. re-render on `liminal:vault:appended` (same tab) and on
          `storage` event (cross-tab) so the grid stays live

     The 9-tag canon is mirrored from vault-store.js · keep in sync.
     ──────────────────────────────────────────────────────────────── */

  import * as vaultStore from "../lib/vault-store.js";

  const CORRECTION_TAGS = vaultStore.CORRECTION_TAGS;

  /* Registers · 4-pillar canon · agents listed lowercase to match the
     `data-agent` strings slate.js writes into the picker · the display
     name (capitalized) is computed from the lowercase id */
  const REGISTERS = [
    { id: "diligence", label: "Diligence", agents: ["operator", "synthesizer", "witness"] },
    { id: "synthesis", label: "Synthesis", agents: ["strategist", "editor", "cartographer"] },
    { id: "judgment",  label: "Judgment",  agents: ["contrarian", "manager", "mystic"] },
    { id: "outreach",  label: "Outreach",  agents: ["planner", "sdr"] }
  ];

  /* Agent → register lookup · built from REGISTERS · case-insensitive
     · falls back to "diligence" for unmapped agent names so a typo
     in slate doesn't drop the correction off the grid */
  const AGENT_REGISTER = {};
  REGISTERS.forEach(r => r.agents.forEach(a => { AGENT_REGISTER[a] = r.id; }));
  function registerOf(agent) {
    if (!agent) return "diligence";
    return AGENT_REGISTER[agent.toLowerCase()] || "diligence";
  }
  function displayAgent(agent) {
    if (!agent) return "Agent";
    return agent.charAt(0).toUpperCase() + agent.slice(1);
  }

  /* week buckets · w-1 is the most recent 7 days, w-12 the oldest. We
     compute dates dynamically from `now` so the labels track real time. */
  function buildWeeks(now = Date.now()) {
    const ONE_WEEK = 7 * 24 * 60 * 60 * 1000;
    const weeks = [];
    for (let i = 12; i >= 1; i--) {
      const end = now - (i - 1) * ONE_WEEK;
      const start = now - i * ONE_WEEK;
      const d = new Date(start);
      const label = `${String(d.getMonth() + 1).padStart(2, "0")}/${String(d.getDate()).padStart(2, "0")}`;
      weeks.push({ id: `w-${i}`, label, start, end });
    }
    return weeks;
  }

  /* deterministic-feeling pseudo-random for the mock baseline · keeps
     the demo grid visually interesting but stable across refreshes */
  function seededRand(seed) {
    let s = seed;
    return () => {
      s = (s * 1664525 + 1013904223) % 4294967296;
      return s / 4294967296;
    };
  }

  function emptyCell() {
    return { count: 0, dominantTag: null, agentCorrections: {}, entries: [] };
  }

  function buildBaseline(weeks) {
    const data = {};
    const rand = seededRand(0xCAFEFACE);
    weeks.forEach((wk, idx) => {
      data[wk.id] = {};
      REGISTERS.forEach(reg => {
        const seed = Math.floor(rand() * 6) - 1;
        const count = Math.max(0, seed);
        const tag = count > 0 ? CORRECTION_TAGS[Math.floor(rand() * CORRECTION_TAGS.length)] : null;
        const agentCorrections = {};
        reg.agents.forEach(a => {
          const ac = count > 0 ? Math.floor(rand() * 3) : 0;
          agentCorrections[a] = {
            count: ac,
            tag: ac > 0 ? CORRECTION_TAGS[Math.floor(rand() * CORRECTION_TAGS.length)] : null,
            entries: []
          };
        });
        data[wk.id][reg.id] = {
          count,
          dominantTag: tag,
          agentCorrections,
          entries: []
        };
      });
    });
    return data;
  }

  /* Merge a real correction row into the data shape. Mutates `data`. */
  function mergeReal(data, weeks, row) {
    const wk = weeks.find(w => row.ts >= w.start && row.ts < w.end);
    if (!wk) return; // older than the 12-week window · drop
    const regId = registerOf(row.agent);
    const cell = data[wk.id][regId];
    cell.count += 1;

    /* tag tally · whichever tag has the highest count in this cell wins
       as `dominantTag` · reset to null if no tags present */
    cell._tagTally = cell._tagTally || {};
    if (row.tag) {
      cell._tagTally[row.tag] = (cell._tagTally[row.tag] || 0) + 1;
      cell.dominantTag = Object.entries(cell._tagTally)
        .sort((a, b) => b[1] - a[1])[0][0];
    }

    /* per-agent · same shape as baseline */
    const agentKey = (row.agent || "").toLowerCase();
    if (!cell.agentCorrections[agentKey]) {
      cell.agentCorrections[agentKey] = { count: 0, tag: null, entries: [] };
    }
    const ac = cell.agentCorrections[agentKey];
    ac.count += 1;
    if (row.tag) ac.tag = row.tag;
    ac.entries.push({
      date: new Date(row.ts).toISOString().slice(0, 10),
      tag: row.tag,
      note: row.note,
      scenario: row.scenario,
      context: row.note || row.scenario || "personal vault commit",
      isReal: true
    });

    cell.entries.push({
      ts: row.ts,
      agent: agentKey,
      tag: row.tag,
      note: row.note,
      scenario: row.scenario
    });
  }

  /* Top-level state · regenerated on each load() */
  let weeks = buildWeeks();
  let data = buildBaseline(weeks);
  let realCount = 0;

  /* QA seed · ?qa-seed=1 in URL pre-populates IDB with a representative
     mix of corrections so visual QA can exercise the live data path
     without requiring the slate cut. Idempotent · clears first.
     Strip this and the call below before shipping if seed-via-URL is a
     concern · for the prototype it's a useful affordance. */
  async function maybeQASeed() {
    if (!new URLSearchParams(location.search).has("qa-seed")) return;
    if (!vaultStore.isAvailable()) return;
    await vaultStore.init();
    await vaultStore.clear();
    const seeds = [
      { surface: "personal", agent: "contrarian",  tag: "wrong_intensity",         note: "hedging when should commit",     scenario: "founding_close_decision" },
      { surface: "personal", agent: "synthesizer", tag: "right_but_already_known", note: "saw this pattern already",       scenario: "eng_hire_decision" },
      { surface: "personal", agent: "operator",    tag: "too_generic",             note: "could apply to anyone",          scenario: "self_baseline_check" },
      { surface: "personal", agent: "mystic",      tag: "off_by_layer",            note: "right direction wrong layer",    scenario: "field_studio_rebrand" },
      { surface: "personal", agent: "editor",      tag: "wrong_frame",             note: "lens is off",                    scenario: "design_system_migration" },
      { surface: "personal", agent: "contrarian",  tag: "missed_compensation",     note: "you're already balancing",       scenario: "founding_close_decision" },
      { surface: "personal", agent: "synthesizer", tag: "assumes_facts_not_in_evidence", note: "projected context not there", scenario: "eng_hire_decision" },
      { surface: "personal", agent: "witness",     tag: "wrong_theory",            note: "causal story is wrong",          scenario: "self_baseline_check" },
    ];
    for (const s of seeds) await vaultStore.appendCorrection(s);
  }

  async function load() {
    await maybeQASeed();
    weeks = buildWeeks();
    data = buildBaseline(weeks);
    realCount = 0;
    if (vaultStore.isAvailable()) {
      try {
        await vaultStore.init();
        const rows = await vaultStore.read({ surface: "personal" });
        rows.forEach(r => {
          mergeReal(data, weeks, r);
          realCount += 1;
        });
      } catch (err) {
        console.warn("[cut03] vault read failed · falling back to mock", err);
      }
    }
  }

  /* exposed for the rest of the script · matches old `mockData` shape
     so render code below keeps working unchanged */
  const view = {
    get weeks() { return weeks.map(w => w.id); },
    get weekLabels() { return weeks; },
    get data() { return data; },
    get realCount() { return realCount; }
  };

  // Back-compat alias · the render code below was written against `mockData`
  const mockData = view;

  // Render grid
  function renderGrid() {
    const grid = document.getElementById("cal-grid");
    grid.innerHTML = ""; // re-render replaces · live updates need this
    const weeks = mockData.weeks;

    // Corner cell
    const corner = document.createElement("div");
    corner.className = "cal-week-header corner";
    grid.appendChild(corner);

    // Week headers · use computed labels (mm/dd) when available
    weeks.forEach((week, idx) => {
      const header = document.createElement("div");
      header.className = "cal-week-header";
      header.textContent = mockData.weekLabels[idx]?.label || week;
      header.title = `${week} · starting ${new Date(mockData.weekLabels[idx].start).toISOString().slice(0,10)}`;
      grid.appendChild(header);
    });

    // Register rows
    REGISTERS.forEach((register) => {
      // Register label
      const label = document.createElement("div");
      label.className = `cal-register-label ${register.id}`;
      label.textContent = register.label;
      label.role = "button";
      label.tabIndex = 0;
      label.addEventListener("click", () => showDrill(register, null));
      label.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") showDrill(register, null);
      });
      grid.appendChild(label);

      // Cells for each week
      weeks.forEach(week => {
        const cellData = mockData.data[week][register.id];
        const cell = document.createElement("div");
        cell.className = `cal-cell ${register.id}`;

        // Intensity encoding
        if (cellData.count === 0) {
          cell.classList.add("empty");
        } else if (cellData.count <= 2) {
          cell.classList.add("light");
        } else if (cellData.count <= 4) {
          cell.classList.add("medium");
        } else {
          cell.classList.add("saturated");
        }

        // Count
        const count = document.createElement("div");
        count.className = "cal-cell-count";
        count.textContent = cellData.count || "·";
        cell.appendChild(count);

        // Tag · abbreviate long names so cells stay grid-aligned · full name in title attr
        if (cellData.dominantTag) {
          const tag = document.createElement("div");
          tag.className = "cal-cell-tag";
          const fullTag = cellData.dominantTag.replace(/_/g, "·");
          /* short display · long tags shown as first 2 segments + ellipsis · ellipsis-aware
             so cell width never blows out, full tag accessible via title hover */
          const segments = fullTag.split("·");
          tag.textContent = segments.length > 2
            ? segments.slice(0, 2).join("·")
            : fullTag;
          tag.title = fullTag;
          cell.appendChild(tag);
          cell.title = `${cellData.count} corrections · ${fullTag}`;
        } else if (cellData.count > 0) {
          cell.title = `${cellData.count} corrections`;
        }

        cell.role = "button";
        cell.tabIndex = 0;
        cell.addEventListener("click", () => showDrill(register, week));
        cell.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") showDrill(register, week);
        });

        grid.appendChild(cell);
      });
    });
  }

  // Show drill panel
  function showDrill(register, week) {
    const drill = document.getElementById("cal-drill");

    if (!week) {
      // Show register summary (all agents in that register, total over all weeks)
      const totalByAgent = {};
      register.agents.forEach(agentName => {
        totalByAgent[agentName] = 0;
        mockData.weeks.forEach(w => {
          const ac = mockData.data[w][register.id].agentCorrections[agentName];
          if (ac) totalByAgent[agentName] += ac.count;
        });
      });

      /* primary = highest-count agent · falls back to first listed if all
         counts equal. Switching from "first listed" to "highest count"
         makes the drill responsive to live data: when contrarian gets
         corrected most, contrarian becomes the headline · not operator. */
      const sortedAgents = Object.entries(totalByAgent).sort((a, b) => b[1] - a[1]);
      const primaryAgent = sortedAgents[0]?.[0] || register.agents[0];
      const primaryTotal = totalByAgent[primaryAgent] || 0;
      const primaryTag = getPrimaryTag(primaryAgent);

      drill.innerHTML = `
        <div class="cal-drill-header">
          <button class="cal-drill-close" id="drill-close">Esc · close</button>
          <div class="cal-drill-agent">${displayAgent(primaryAgent)}</div>
          <div class="cal-drill-agent-register">${register.label}</div>
        </div>
        <div class="cal-drill-stats">
          <div class="cal-stat">
            <div class="cal-stat-label">Corrections (12 weeks)</div>
            <div class="cal-stat-value">${primaryTotal}</div>
          </div>
          <div class="cal-stat">
            <div class="cal-stat-label">Most common</div>
            <div class="cal-stat-value">${primaryTag.replace(/_/g, "·")}</div>
          </div>
        </div>
        <div class="cal-drill-history">
          <div class="cal-history-label">Recent</div>
          ${generateHistoryItems(primaryAgent, 4).map(item => `
            <div class="cal-history-item">
              <div>${item.isReal ? '<span style="color: var(--signal-violet-ink); font-family: Geist Mono, monospace; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em; margin-right: 0.5rem;">live</span>' : ""}Corrected for <strong>${(item.tag || "untagged").replace(/_/g, "·")}</strong> ${item.context}</div>
              <div class="cal-history-time">${item.date}</div>
            </div>
          `).join("") || '<div style="font-family: Newsreader, serif; font-style: italic; color: var(--text-soft); font-size: 0.875rem;">No history for this agent yet.</div>'}
        </div>
      `;
    } else {
      // Show week details for that register
      const weekData = mockData.data[week][register.id];
      drill.innerHTML = `
        <div class="cal-drill-header">
          <button class="cal-drill-close" id="drill-close">Esc · close</button>
          <div class="cal-drill-agent">${register.label}</div>
          <div class="cal-drill-agent-register">${week}</div>
        </div>
        <div class="cal-drill-stats">
          <div class="cal-stat">
            <div class="cal-stat-label">Corrections</div>
            <div class="cal-stat-value">${weekData.count}</div>
          </div>
          <div class="cal-stat">
            <div class="cal-stat-label">Dominant tag</div>
            <div class="cal-stat-value">${weekData.dominantTag ? weekData.dominantTag.replace(/_/g, "·") : "·"}</div>
          </div>
        </div>
        <div class="cal-drill-history">
          <div class="cal-history-label">By agent</div>
          ${register.agents.map(agent => {
            const ac = weekData.agentCorrections[agent];
            const cnt = ac?.count || 0;
            return `
              <div style="font-family: Geist, sans-serif; font-size: 0.8125rem; color: var(--text-soft); margin: 0.5rem 0;">
                ${displayAgent(agent)}: <strong>${cnt}</strong>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    drill.classList.remove("empty");
    document.getElementById("drill-close").addEventListener("click", closeDrill);
    document.addEventListener("keydown", handleDrillKeydown);
  }

  function closeDrill() {
    const drill = document.getElementById("cal-drill");
    drill.classList.add("empty");
    document.removeEventListener("keydown", handleDrillKeydown);
  }

  function handleDrillKeydown(e) {
    if (e.key === "Escape") {
      closeDrill();
    }
  }

  function getPrimaryTag(agentName) {
    let tagCount = {};
    mockData.weeks.forEach(week => {
      REGISTERS.forEach(reg => {
        const ac = mockData.data[week][reg.id].agentCorrections[agentName];
        if (ac && ac.tag) {
          tagCount[ac.tag] = (tagCount[ac.tag] || 0) + ac.count;
        }
      });
    });
    return Object.entries(tagCount).sort((a, b) => b[1] - a[1])[0]?.[0] || "no_data";
  }

  function generateHistoryItems(agentName, limit) {
    /* Real entries always come first · sorted newest-first · then mock
       entries fill the rest if needed. The "live" badge in the drill
       UI marks real entries so the founder can see persisted corrections
       immediately rise to the top. */
    const real = [];
    const mock = [];
    mockData.weeks.forEach(week => {
      REGISTERS.forEach(reg => {
        const ac = mockData.data[week][reg.id].agentCorrections[agentName];
        if (!ac) return;
        ac.entries.forEach(e => {
          const item = { ...e, week };
          if (e.isReal) real.push(item); else mock.push(item);
        });
      });
    });
    real.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
    return [...real, ...mock].slice(0, limit);
  }

  /* live indicator · small pill that says "live · N real" when real
     corrections have been merged in. Sits in the cal-header so it
     doesn't compete with grid real estate. */
  function renderLiveIndicator() {
    const header = document.querySelector(".cal-header");
    if (!header) return;
    let pill = document.getElementById("cal-live-pill");
    if (!pill) {
      pill = document.createElement("div");
      pill.id = "cal-live-pill";
      pill.style.cssText = `
        font-family: Geist Mono, monospace;
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--signal-violet-ink, #8E66FB);
        margin-top: 0.25rem;
        opacity: 0;
        transition: opacity 200ms var(--easing);
      `;
      header.appendChild(pill);
    }
    if (mockData.realCount > 0) {
      pill.textContent = `live · ${mockData.realCount} real correction${mockData.realCount === 1 ? "" : "s"} from vault · ${mockData.realCount + " merged onto seeded baseline"}`;
      pill.style.opacity = "1";
    } else {
      pill.textContent = "seed only · commit a correction in the slate to see it here";
      pill.style.opacity = "0.6";
    }
  }

  /* full re-render · called on init and on any vault append */
  async function refresh() {
    await load();
    renderGrid();
    renderLiveIndicator();
  }

  /* live updates · same-tab via CustomEvent, cross-tab via storage event.
     Both fire when slate.js commits a correction · refresh redraws the
     grid + indicator. The drill panel stays open if it was open: the
     user might be looking at one register while another fires. */
  window.addEventListener("liminal:vault:appended", refresh);
  window.addEventListener("storage", (e) => {
    if (e.key === "liminal:vault:pulse") refresh();
  });
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) refresh();
  });

  // Initialize
  refresh();
  // v0.8.5 F5 — fade body in after initial refresh() completes
  requestAnimationFrame(() => document.body.classList.add("ready"));
</script>

<!-- v0.9.3 · cut 03 thin packet-receipt strip below the prose footer -->
<script>
(function cut03Receipt() {
  function inject() {
    const frame = document.querySelector('.frame');
    if (!frame || frame.querySelector('.frame-receipt')) return;
    const receipt = document.createElement('div');
    receipt.className = 'frame-receipt';
    receipt.innerHTML = `
      <span class="fr-glyph">◇</span>
      <span class="fr-strong">read · vault-calibration-12wk</span>
      <span>23 corrections · 4 registers · personal</span>
      <span class="fr-right">device-local · pattern is the signal</span>
    `;
    frame.appendChild(receipt);
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', () => setTimeout(inject, 50));
  else setTimeout(inject, 50);
})();
</script>

<script src="../lib/surface-nav.js"></script>
