<link rel="stylesheet" href="onboarding/onboarding.css?v=3">

<style>
  /* design-canvas needs to host dark frames; canvas chrome itself is light */
  body { padding: 0 !important; }
  /* tokens file uses Newsreader-equivalent (Perfectly Nineties) which we don't have;
     remap display + serif to Newsreader (the cut's actual deployed face). */
  :root {
    --display: "Newsreader", Georgia, serif;
    --serif:   "Newsreader", Georgia, serif;
  }
  /* artboard backdrop matches dark canvas */
  [data-dc-artboard] { background: var(--bg) !important; }

  /* v0.8.5 F5 — initial paint suppression (mirroring cut01-cut03 polish). */
  body {
    opacity: 0;
    transition: opacity 240ms ease-out;
  }
  body.ready {
    opacity: 1;
  }

  /* ui-skills polish: tabular figures + even heading wrap / orphan-free body */
  body { font-variant-numeric: tabular-nums; }
  h1, h2, h3 { text-wrap: balance; }
  p { text-wrap: pretty; }
</style>

<link rel="stylesheet" href="../lib/surface-nav.css">
</head>
<body data-product="personal">

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="onboarding/design-canvas.jsx"></script>
<script type="text/babel" src="onboarding/parts.jsx"></script>
<script type="text/babel" src="onboarding/screens.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const S = window.Screens;

  const W = 1240; // matches frame max-width (stage)
  const H = 880;  // tall enough for content

  function App() {
    return (
      <DesignCanvas title="Liminal · Onboarding · v0.1 pilot first run" subtitle="Personal surface · invite-only pilot · vault, daemon, three reads">

        <DCSection id="setup" title="Pilot · vault · key">
          <DCArtboard id="s01" label="01 · Pilot key" width={W} height={H}><S.S01_Welcome /></DCArtboard>
          <DCArtboard id="s02" label="02 · Vault" width={W} height={H}><S.S02_Verify /></DCArtboard>
          <DCArtboard id="s03" label="03 · Identity key" width={W} height={H}><S.S03_Passphrase /></DCArtboard>
        </DCSection>

        <DCSection id="runtime" title="Daemon · sources · instrument · day 1">
          <DCArtboard id="s04" label="04 · Daemon" width={W} height={H}><S.S04_Keys /></DCArtboard>
          <DCArtboard id="s05" label="05 · Connect a source" width={W} height={H}><S.S05_Anchor /></DCArtboard>
          <DCArtboard id="s06" label="06 · The three reads" width={W} height={H}><S.S06_Primer /></DCArtboard>
          <DCArtboard id="s07" label="07 · Day 1" width={W} height={H}><S.S07_Day1 /></DCArtboard>
        </DCSection>

      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  // v0.8.5 F5 — fade body in after React mounts
  requestAnimationFrame(() => document.body.classList.add("ready"));
</script>

<script src="../lib/surface-nav.js"></script>
</body>
</html>
