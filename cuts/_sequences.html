<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sequences · the product as one system · Liminal</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230b0b0d'/%3E%3Cpath d='M16 5 27 16 16 27 5 16Z' fill='none' stroke='%23c9c4bc' stroke-width='1.6'/%3E%3C/svg%3E">

<!--
  cuts/_sequences.html · the sequence player (2026-07-17)
  ──────────────────────────────────────────────────────────────────────
  Compresses the disparate cuts into three played sequences of product
  experience, so the catalog reads as ONE system instead of twelve
  destinations. Generalizes the _demo-lan-stitch mechanic (iframe beats
  with ?embed=1, master rail, presenter note) and adds SYSTEM FRAMES:
  full-bleed interstitials that name the loop stage, ground the sequence
  in the July 2026 signal, and carry the DEMO_MANIFEST claim vocabulary.

  Spec: docs/DEMO_SEQUENCES_SPEC_2026-07-17.md
  Beats reuse canonical cut URLs (DEMO_MANIFEST P0/P1, consolidation-map
  rows B2/C1/D5/D6). This shell adds no product claims of its own.
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Caveat:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../design-system/tokens/design-tokens.css">

<style>
  @font-face { font-family:'NinetiesHeadliner'; src:url('../fonts/nineties-headliner.otf') format('opentype'); font-weight:700; font-display:swap; }
  @font-face { font-family:'PerfectlyNineties'; src:url('../fonts/perfectly-nineties-light.otf') format('opentype'); font-weight:300; font-display:swap; }
  @font-face { font-family:'PerfectlyNineties'; src:url('../fonts/perfectly-nineties-regular.otf') format('opentype'); font-weight:400; font-display:swap; }

  :root{
    --sq-bg:#08080A; --sq-panel:#0E0E11; --sq-hair:#1C1C22; --sq-hair-2:#2A2A30;
    --sq-text:#EDEDEF; --sq-mid:#B0B0B6; --sq-dim:#7C7A74; --sq-faint:#56544E;
    --display:"NinetiesHeadliner",Georgia,serif; --serif:"PerfectlyNineties",Georgia,serif;
    --mono:"Geist Mono","SF Mono",monospace;
    --accent:var(--clarity,#197EEB);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--sq-bg);color:var(--sq-text);overflow:hidden}
  body{font-family:var(--serif);-webkit-font-smoothing:antialiased}

  /* ── master rail ── */
  #rail{position:fixed;top:0;left:0;right:0;z-index:40;display:flex;justify-content:center;pointer-events:none}
  #rail .inner{pointer-events:auto;display:flex;align-items:center;gap:2px;margin-top:8px;padding:4px;
    border:1px solid var(--sq-hair-2);border-radius:999px;background:rgba(10,10,11,0.88);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 4px 20px rgba(0,0,0,0.45)}
  #rail .home{display:flex;align-items:center;justify-content:center;width:26px;height:26px;color:var(--accent);
    background:transparent;border:0;cursor:pointer;font-size:13px;border-radius:999px;font-family:var(--mono)}
  #rail .home:hover{background:rgba(255,255,255,0.06)}
  #rail button.seq{display:flex;align-items:center;gap:7px;padding:5px 13px;border-radius:999px;border:0;background:transparent;
    cursor:pointer;color:var(--sq-faint);font-family:var(--mono);font-size:11px;letter-spacing:.08em;
    transition:color 180ms,background 180ms;white-space:nowrap}
  #rail button.seq .num{font-weight:600;opacity:.8}
  #rail button.seq:hover{color:var(--sq-dim);background:rgba(255,255,255,0.05)}
  #rail button.seq.on{color:var(--sq-bg);background:var(--accent)}
  #rail .dots{display:flex;align-items:center;gap:5px;padding:0 10px}
  #rail .dots i{width:6px;height:6px;border-radius:50%;background:var(--sq-hair-2);transition:background 180ms;cursor:pointer}
  #rail .dots i.on{background:var(--accent)}
  #rail .dots i.frame{border-radius:1px;transform:rotate(45deg);width:5px;height:5px}

  /* ── stage ── */
  #stage{position:absolute;inset:0}
  .step{position:absolute;inset:0;opacity:0;visibility:hidden;transition:opacity 320ms ease;background:var(--sq-bg)}
  .step.on{opacity:1;visibility:visible;z-index:2}
  .step iframe{width:100%;height:100%;border:0;display:block;background:var(--sq-bg)}
  .step .loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:var(--sq-faint);font-family:var(--mono);font-size:12px;letter-spacing:.1em;z-index:-1}

  /* ── system frames ── */
  .frame-body{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:80px 32px 64px;gap:0}
  .frame-body .kick{font-family:var(--mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--accent)}
  .frame-body h1{font-family:var(--display);font-weight:400;font-size:clamp(30px,4.6vw,56px);line-height:1.03;
    letter-spacing:-.02em;margin-top:20px;max-width:20ch}
  .frame-body .ground{font-family:var(--serif);font-size:clamp(14px,1.5vw,16.5px);line-height:1.62;color:var(--sq-dim);
    margin-top:22px;max-width:62ch}
  .frame-body .ground b{color:var(--sq-mid);font-weight:400}
  .frame-body .flow{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;color:var(--sq-mid);margin-top:18px}
  .frame-body .flow .a{color:var(--accent)}

  /* the invariant loop strip: identical on every frame, only the subject line changes */
  .loop-strip{display:flex;align-items:center;gap:0;margin-top:34px}
  .loop-strip .st{font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;color:var(--sq-dim);
    padding:8px 14px;border:1px solid var(--sq-hair-2);border-left:0}
  .loop-strip .st:first-child{border-left:1px solid var(--sq-hair-2);border-radius:4px 0 0 4px}
  .loop-strip .st:last-child{border-radius:0 4px 4px 0}
  .loop-strip .st.hot{color:var(--sq-text);background:color-mix(in oklch,var(--accent) 14%,transparent)}
  .subject-line{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--sq-faint);margin-top:12px}
  .subject-line b{color:var(--accent);font-weight:500}

  .chips{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:26px}
  .chip{font-family:var(--mono);font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--sq-dim);
    border:1px solid var(--sq-hair-2);border-radius:3px;padding:4px 8px}
  .frame-body .hint{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--sq-faint);margin-top:40px}
  .frame-body .hint .k{color:var(--sq-mid);border:1px solid var(--sq-hair-2);border-radius:3px;padding:2px 6px;margin:0 2px}
  .frame-body .links{display:flex;gap:22px;margin-top:34px}
  .frame-body .links a,.frame-body .links button{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--sq-text);text-decoration:none;border:1px solid var(--sq-hair-2);border-radius:100px;padding:11px 18px;
    background:transparent;cursor:pointer;transition:border-color .18s,background .18s}
  .frame-body .links a:hover,.frame-body .links button:hover{border-color:var(--accent);
    background:color-mix(in oklch,var(--accent) 12%,transparent)}
  .frame-body .side{font-family:var(--serif);font-size:13px;color:var(--sq-faint);margin-top:18px}
  .frame-body .side a{color:var(--sq-dim)}

  /* ── cover ── */
  #cover .frame-body{justify-content:center}
  .seq-cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-top:38px;max-width:980px;width:100%}
  .seq-card{text-align:left;border:1px solid var(--sq-hair-2);border-radius:9px;background:var(--sq-panel);
    padding:20px 22px;cursor:pointer;transition:border-color .18s,transform .18s;color:inherit;font:inherit}
  .seq-card:hover{border-color:color-mix(in oklch,var(--accent) 55%,var(--sq-hair-2));transform:translateY(-1px)}
  .seq-card .tag{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent)}
  .seq-card .t{font-family:var(--display);font-size:20px;letter-spacing:-.01em;margin:9px 0 7px}
  .seq-card .d{font-family:var(--serif);font-size:13px;line-height:1.5;color:var(--sq-dim)}
  .seq-card .b{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--sq-faint);margin-top:12px}

  /* ── beat chrome (over iframes) ── */
  #beat-chrome{position:fixed;right:18px;bottom:18px;z-index:41;display:none;flex-direction:column;align-items:flex-end;gap:7px;pointer-events:none}
  body.beat-on #beat-chrome{display:flex}
  #beat-title{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--sq-mid);
    background:rgba(10,10,11,0.88);border:1px solid var(--sq-hair-2);border-radius:999px;padding:6px 13px}
  #beat-title .stg{color:var(--accent)}
  #beat-claims{display:flex;gap:5px}
  #beat-claims .chip{background:rgba(10,10,11,0.88)}

  /* ── presenter note ── */
  #note{position:fixed;left:18px;bottom:64px;z-index:41;max-width:270px;
    font-family:"Caveat",cursive;font-size:21px;line-height:1.25;color:var(--accent);
    background:rgba(10,10,11,0.92);border-left:2px solid var(--accent);border-radius:0 8px 8px 0;
    padding:11px 15px;box-shadow:0 6px 22px rgba(0,0,0,0.5);
    opacity:0;transform:translateY(6px);transition:opacity 260ms,transform 260ms;pointer-events:none}
  body.note-on.beat-on #note{opacity:1;transform:none}
  #note .sig{display:block;margin-top:5px;font-family:var(--mono);font-size:11px;color:var(--sq-faint)}
  #note-toggle{position:fixed;left:18px;bottom:18px;z-index:42;font-size:12px;display:none;align-items:center;gap:7px;
    cursor:pointer;color:var(--sq-faint);background:rgba(10,10,11,0.88);border:1px solid var(--sq-hair-2);
    border-radius:999px;padding:6px 13px;font-family:var(--mono)}
  body.beat-on #note-toggle{display:flex}
  #note-toggle:hover{color:var(--sq-dim)}
  body.note-on #note-toggle{color:var(--accent);border-color:var(--accent)}

  @media (prefers-reduced-motion:reduce){
    .step{transition:none}
    #note{transition:none}
    .seq-card{transition:none}
  }
  @media (max-width:860px){
    .seq-cards{grid-template-columns:1fr;max-width:420px}
    #rail .dots{display:none}
    .loop-strip .st{padding:7px 8px;letter-spacing:.08em}
  }
</style>
</head>
<body>

<nav id="rail" aria-label="Sequences">
  <div class="inner">
    <button class="home" id="home-btn" title="Cover (Esc)" aria-label="Back to cover">◇</button>
    <button class="seq" data-seq="0"><span class="num">1</span><span>ONE DAY</span></button>
    <button class="seq" data-seq="1"><span class="num">2</span><span>THE FLEET</span></button>
    <button class="seq" data-seq="2"><span class="num">3</span><span>IT TRAVELS</span></button>
    <div class="dots" id="dots" aria-hidden="true"></div>
  </div>
</nav>

<div id="stage" aria-live="polite" tabindex="-1"></div>

<div id="beat-chrome">
  <div id="beat-title"><span id="bt-label"></span> · <span class="stg" id="bt-stage"></span></div>
  <div id="beat-claims"></div>
</div>

<div id="note"><span id="note-text"></span><span class="sig">· sr</span></div>
<button id="note-toggle" aria-label="Toggle presenter note"><span>✎</span><span>note</span><span>⌘N</span></button>

<script>
(function () {
  "use strict";

  var LOOP = ['CAPTURE','READ','DECIDE','RECORD','RE-ENTER'];

  function loopStrip(){
    return '<div class="loop-strip" role="img" aria-label="The loop: capture, read, decide, record, re-enter">' +
      LOOP.map(function(s){ return '<span class="st hot">'+s+'</span>'; }).join('') + '</div>';
  }
  function chips(list){
    return '<div class="chips">' + list.map(function(c){ return '<span class="chip">'+c+'</span>'; }).join('') + '</div>';
  }

  // ── the three sequences ──
  // Beats reuse canonical URLs (DEMO_MANIFEST P0/P1; consolidation map rows
  // B2 / C1 / D5 / D6). Claims per beat use the manifest vocabulary.
  var SEQS = [
    {
      key:'one-day', tab:'ONE DAY',
      frame:{
        kick:'Sequence 1 · the wedge · L1 founder',
        title:'One decision, end to end.',
        ground:'July 2026: a study of tens of thousands of engineers found AI adopters merged <b>24% more pull requests</b> — and its authors caution that merged PRs are an output proxy, not proof of value. Generation is abundant. <b>Accountable acceptance is the bottleneck.</b> Watch one real decision cross the loop: it lands on the slate, bounded agents read it, one refuses out-of-lane, you decide — and the record returns tomorrow.',
        subject:'pointed at · <b>one founder decision</b>',
        chips:['PROTOTYPE','DETERMINISTIC FIXTURE NARRATIVE','VAULT WRITES REAL · DEVICE-LOCAL']
      },
      beats:[
        { src:'01-slate-tray.html?embed=1', label:'The slate & tray', stage:'CAPTURE → READ → DECIDE',
          claims:['PROTOTYPE','FIXTURE NARRATIVE','VAULT REAL · DEVICE-LOCAL'],
          note:'a funding-round close lands on the slate. the registers disagree. that disagreement is the signal, not noise.' },
        { src:'02-forensic-agent.html?embed=1', label:'The forensic read', stage:'READ · CONTRADICTION',
          claims:['PROTOTYPE'],
          note:'the agent that disagrees with the notification. it cites its sources and refuses to smooth it over.' },
        { src:'10-today.html?embed=1', label:'Today · re-entry', stage:'RE-ENTER',
          claims:['PROTOTYPE'],
          note:'the loop returns each morning. you say how it landed. that answer is what makes calibration real.' }
      ]
    },
    {
      key:'fleet', tab:'THE FLEET',
      frame:{
        kick:'Sequence 2 · wedge to infrastructure · L1 → L2',
        title:'Did the work deserve the money?',
        ground:'July 2026: Meta’s Adam Mosseri calls per-engineer AI-token caps a reasonable expectation; IBM warns customers are redirecting capital toward AI infrastructure and security. A cost dashboard shows the spend. It cannot show <b>what the spend produced and whether a human accepted it.</b> That record is this sequence.',
        flow:'budget <span class="a">→</span> consumption <span class="a">→</span> work <span class="a">→</span> corrections <span class="a">→</span> accepted output <span class="a">→</span> outcome',
        subject:'pointed at · <b>the agent fleet itself</b>',
        chips:['PROTOTYPE CHOREOGRAPHY','DETERMINISTIC FIXTURE','RECEIPT · TESTNET ATTESTATION']
      },
      beats:[
        { src:'11-govern.html?subject=spend&beat=loop&run=govern-run.json&embed=1', label:'Govern · the recorded run', stage:'FULL LOOP · AGENT FLEET',
          claims:['PROTOTYPE','DETERMINISTIC FIXTURE','RECEIPT · TESTNET'],
          note:'a recorded governance run: agent spend read against okrs. the reviewer drops $162 of claimed savings; naive $486 becomes verified $324. correct a finding, sign, ratify.' },
        { src:'../team-drift/index.html?embed=1', label:'Team drift', stage:'RECORD · CORRECT · L2',
          claims:['PROTOTYPE'],
          note:'the same correction-stream substrate, turned on the team. governance as a pipe, not a flag.' },
        { src:'03-calibration.html?embed=1', label:'Calibration', stage:'RECORD · OVER TIME',
          claims:['ILLUSTRATIVE BASELINE','REAL CORRECTIONS MERGED'],
          note:'twelve weeks by four registers. corrections compound into a record that reads as pattern. the moat, made visible.' }
      ]
    },
    {
      key:'travels', tab:'IT TRAVELS',
      frame:{
        kick:'Sequence 3 · the depth proof · L3 high-stakes',
        title:'Providers churn. The record has to travel.',
        ground:'July 2026: GitHub retires its Models platform on July 30; open-weight frontier models multiply; the enterprise default becomes a <b>portfolio of models, not one vendor</b>. The judgment record is the asset that must survive the churn — model-independent, customer-owned. Same loop, harder ground.',
        subject:'pointed at · <b>an incident · a strait · a fleet of claims</b>',
        chips:['PROTOTYPE · DESIGN INTENT','FROZEN KERNEL · RECOMPUTED IN-BROWSER','RECEIPT · LOCALNET SNAPSHOT']
      },
      beats:[
        { src:'08-liminal-custody.html?embed=1', label:'Custody · major incident', stage:'FULL LOOP · UNDER CONSTRAINT',
          claims:['PROTOTYPE','DESIGN INTENT'],
          note:'an ai triage agent auto-escalates off a single signal. the system preserves the competing reads and refuses to confirm severity until a human validates the claim.' },
        { src:'09-osint-custody.html?embed=1', label:'OSINT · the frozen kernel', stage:'INGEST → READ → GUARD → REVIEW → VAULT',
          claims:['FROZEN KERNEL · IN-BROWSER','RECEIPT · LOCALNET'],
          note:'a frozen kernel recomputes the loop in this browser each load. the guard refuses the intent claim.' }
      ],
      close:{
        kick:'The system',
        title:'Same loop, every subject.',
        ground:'Spend, custody, OSINT, a contradiction, a team — <b>the subject is a parameter; the loop is the product.</b> Spend is the wedge. The judgment record is the company.',
        subject:'pointed at · <b>everything above</b>'
      }
    }
  ];

  // ── flatten into steps ──
  // step := {seq, idx, type:'frame'|'beat'|'close', ...}
  var STEPS = [];
  SEQS.forEach(function(sq, si){
    STEPS.push({seq:si, type:'frame', data:sq.frame});
    sq.beats.forEach(function(b){ STEPS.push({seq:si, type:'beat', data:b}); });
    if (sq.close) STEPS.push({seq:si, type:'close', data:sq.close});
  });

  var stage = document.getElementById('stage');
  var els = [];         // one .step element per STEPS entry, plus cover at index -1
  var loadedFrames = {};

  // ── cover ──
  var cover = document.createElement('section');
  cover.className = 'step';
  cover.id = 'cover';
  cover.innerHTML =
    '<div class="frame-body">' +
      '<div class="kick">Liminal · the catalog, played</div>' +
      '<h1>Three sequences.<br>One system.</h1>' +
      '<div class="ground">The cuts are projections of one product. Played in order, they stop being a catalog ' +
      'and become the product experience: a decision crosses the loop, the loop turns on the agent fleet, ' +
      'and the record proves it travels.</div>' +
      loopStrip() +
      '<div class="subject-line">the loop is invariant · <b>the subject is a parameter</b></div>' +
      '<div class="seq-cards">' +
      SEQS.map(function(sq, si){
        return '<button class="seq-card" data-go="' + si + '">' +
          '<span class="tag">Sequence ' + (si+1) + '</span>' +
          '<div class="t">' + sq.frame.title + '</div>' +
          '<div class="d">' + sq.frame.subject.replace(/<[^>]+>/g,'').replace('pointed at · ','Pointed at ') + '.</div>' +
          '<div class="b">' + sq.beats.length + ' beats · ' + sq.frame.kick.split('·')[1].trim() + '</div>' +
        '</button>';
      }).join('') +
      '</div>' +
      '<div class="hint"><span class="k">→</span> play from the top · <span class="k">1 2 3</span> jump · <span class="k">esc</span> cover</div>' +
    '</div>';
  stage.appendChild(cover);

  // ── build steps ──
  STEPS.forEach(function(st, i){
    var el = document.createElement('section');
    el.className = 'step';
    el.setAttribute('data-i', i);
    if (st.type === 'frame' || st.type === 'close') {
      var d = st.data;
      el.innerHTML =
        '<div class="frame-body">' +
          '<div class="kick">' + d.kick + '</div>' +
          '<h1>' + d.title + '</h1>' +
          '<div class="ground">' + d.ground + '</div>' +
          (d.flow ? '<div class="flow">' + d.flow + '</div>' : '') +
          loopStrip() +
          '<div class="subject-line">' + d.subject + '</div>' +
          (d.chips ? chips(d.chips) : '') +
          (st.type === 'close'
            ? '<div class="links">' +
                '<button data-restart>Play again ↺</button>' +
                '<a href="../index.html">Explore the catalog →</a>' +
              '</div>' +
              '<div class="side">also traveling: <a href="../molehunt/index.html">the counterintelligence console →</a></div>'
            : '<div class="hint"><span class="k">→</span> begin</div>') +
        '</div>';
    } else {
      el.innerHTML = '<div class="loading">loading · ' + st.data.label.toLowerCase() + '</div>';
    }
    stage.appendChild(el);
    els.push(el);
  });

  // ── rail ──
  var seqBtns = Array.prototype.slice.call(document.querySelectorAll('#rail .seq'));
  var dots = document.getElementById('dots');
  var btLabel = document.getElementById('bt-label');
  var btStage = document.getElementById('bt-stage');
  var btClaims = document.getElementById('beat-claims');
  var noteText = document.getElementById('note-text');

  var cur = -1; // -1 = cover

  function ensureFrame(i){
    var st = STEPS[i];
    if (!st || st.type === 'frame' || st.type === 'close' || loadedFrames[i]) return;
    var f = document.createElement('iframe');
    f.setAttribute('title', st.data.label);
    f.src = st.data.src;
    f.addEventListener('load', function(){
      // same-origin: forward the player's nav keys out of the cut, so arrows
      // keep advancing even after a cut takes focus. No beat cut binds arrows
      // itself (verified 2026-07-17); text fields are left alone.
      try {
        f.contentDocument.addEventListener('keydown', function(e){
          if (e.defaultPrevented || e.metaKey || e.ctrlKey || e.altKey) return;
          var t = e.target || {};
          var tag = (t.tagName || '').toUpperCase();
          if (tag === 'INPUT' || tag === 'TEXTAREA' || t.isContentEditable) return;
          if (e.key === 'ArrowRight' || e.key === 'ArrowLeft' || e.key === 'Escape') {
            e.preventDefault();
            navKey(e.key);
          }
        });
      } catch (err) { /* cross-origin or sandboxed frame: nav via the rail */ }
    });
    els[i].appendChild(f);
    loadedFrames[i] = true;
  }

  function navKey(key){
    if (key === 'ArrowRight') { if (cur < STEPS.length - 1) show(cur + 1); }
    else if (key === 'ArrowLeft') { if (cur > -1) show(cur - 1); }
    else if (key === 'Escape') { show(-1); }
  }

  function renderDots(si){
    var steps = STEPS.map(function(s,i){ return {s:s,i:i}; }).filter(function(x){ return x.s.seq === si; });
    dots.innerHTML = steps.map(function(x){
      var cls = (x.s.type !== 'beat' ? 'frame' : '') + (x.i === cur ? ' on' : '');
      return '<i class="' + cls.trim() + '" data-jump="' + x.i + '"></i>';
    }).join('');
  }

  function show(i){
    cur = i;
    cover.classList.toggle('on', i === -1);
    els.forEach(function(el, j){ el.classList.toggle('on', j === i); });
    var st = STEPS[i];
    var isBeat = !!st && st.type === 'beat';
    document.body.classList.toggle('beat-on', isBeat);
    seqBtns.forEach(function(b, si){ b.classList.toggle('on', !!st && st.seq === si); });
    if (st) {
      renderDots(st.seq);
      if (isBeat) {
        ensureFrame(i);
        ensureFrame(i + 1);
        btLabel.textContent = st.data.label;
        btStage.textContent = st.data.stage;
        btClaims.innerHTML = st.data.claims.map(function(c){ return '<span class="chip">'+c+'</span>'; }).join('');
        noteText.textContent = st.data.note || '';
      } else {
        ensureFrame(i + 1); // preload the first beat behind a frame
      }
    } else {
      dots.innerHTML = '';
    }
    var p = new URLSearchParams(location.search);
    if (st) { p.set('seq', st.seq + 1); p.set('step', i - firstStepOf(st.seq)); }
    else { p.delete('seq'); p.delete('step'); }
    history.replaceState(null, '', location.pathname + (p.toString() ? '?' + p.toString() : ''));
    // reclaim keyboard focus from a beat iframe (cuts may focus themselves on
    // boot); arrows keep driving the player until the viewer clicks into a cut.
    stage.focus({ preventScroll: true });
  }

  function firstStepOf(si){
    for (var i = 0; i < STEPS.length; i++) if (STEPS[i].seq === si) return i;
    return 0;
  }

  // ── wiring ──
  document.getElementById('home-btn').addEventListener('click', function(){ show(-1); });
  seqBtns.forEach(function(b, si){ b.addEventListener('click', function(){ show(firstStepOf(si)); }); });
  dots.addEventListener('click', function(e){
    var t = e.target.closest('[data-jump]');
    if (t) show(parseInt(t.getAttribute('data-jump'), 10));
  });
  cover.addEventListener('click', function(e){
    var t = e.target.closest('[data-go]');
    if (t) show(firstStepOf(parseInt(t.getAttribute('data-go'), 10)));
  });
  stage.addEventListener('click', function(e){
    if (e.target.closest('[data-restart]')) show(-1);
  });

  document.addEventListener('keydown', function(e){
    if (e.metaKey || e.ctrlKey) {
      if (e.key === 'n' || e.key === 'N') { e.preventDefault(); document.body.classList.toggle('note-on'); }
      return;
    }
    if (e.key === 'ArrowRight' || e.key === 'ArrowLeft' || e.key === 'Escape') { navKey(e.key); }
    else if (e.key === '1' || e.key === '2' || e.key === '3') { show(firstStepOf(parseInt(e.key,10) - 1)); }
  });
  document.getElementById('note-toggle').addEventListener('click', function(){
    document.body.classList.toggle('note-on');
  });

  // ── deep link ── ?seq=2&step=1 (step within sequence; 0 = its frame)
  var q = new URLSearchParams(location.search);
  var qs = parseInt(q.get('seq'), 10), qp = parseInt(q.get('step'), 10);
  if (qs >= 1 && qs <= SEQS.length) {
    var base = firstStepOf(qs - 1);
    var span = STEPS.filter(function(s){ return s.seq === qs - 1; }).length;
    show(base + (qp >= 0 && qp < span ? qp : 0));
  } else {
    show(-1);
  }
})();
</script>
</body>
</html>
