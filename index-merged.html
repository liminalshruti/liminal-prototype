<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Liminal · Agents · merged</title>
<meta name="description" content="Liminal merged prototype: Sentinel (Liminal Business institutional-read feature) + Personal/Team self-read and peer-read surfaces, on one substrate.">
<style>
  /* ════════════════════════════════════════════════════════════════
     Liminal · merged Pass 1
     Substrate: Shayaun's Sentinel chrome (institutional analyst console).
     Layered: v0.3.7 three-product fork (Personal/Team/Business).
     Sentinel = a feature OF Liminal Business · 4 institutional subjects
       (Hanssen, Manning, Snowden, Vahidi) live inside Business catalog.
     Non-institutional scenarios (Personal, Team, vendor-coherence,
       audit-chain) render with doc-as-document fallback.
     ════════════════════════════════════════════════════════════════ */
  @font-face {
    font-family: "Nineties Headliner";
    src: url("/fonts/nineties-headliner.otf") format("opentype");
    font-display: swap;
  }
  @font-face {
    font-family: "Perfectly Nineties";
    src: url("/fonts/perfectly-nineties-regular.otf") format("opentype");
    font-display: swap;
  }
  :root {
    --bg: #09090b;
    --frame: #0f0f14;
    --rail: #08080a;
    --panel: #111118;
    --panel-2: #15151d;
    --line: #20202a;
    --line-2: #2c2d36;
    --text: #f4f2ee;
    --mid: #c9c5bd;
    --dim: #8a8780;
    --faint: #56534e;
    --mute: #3a3833;
    --diligence: #8e66fb;
    --diligence-bg: rgba(142,102,251,.10);
    --diligence-edge: rgba(142,102,251,.34);
    --synthesis: #FFD24A;
    --synthesis-bg: rgba(255,210,74,.10);
    --synthesis-edge: rgba(255,210,74,.34);
    --outreach: #3EE878;
    --outreach-bg: rgba(62,232,120,.10);
    --outreach-edge: rgba(62,232,120,.34);
    --judgment: #E90095;
    --judgment-bg: rgba(233,0,149,.06);
    --judgment-edge: rgba(233,0,149,.34);
    --green: #45c9a3;
    --amber: #f5a524;
    --red: #f05252;
    --display: "Nineties Headliner", "Perfectly Nineties", Georgia, serif;
    --serif: "Perfectly Nineties", Georgia, serif;
    --sans: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;

    --p-accent: var(--diligence);
    --p-accent-bg: var(--diligence-bg);
    --p-accent-edge: var(--diligence-edge);
  }
  body[data-product="personal"] { --p-accent: var(--diligence); --p-accent-bg: var(--diligence-bg); --p-accent-edge: var(--diligence-edge); }
  body[data-product="team"]     { --p-accent: var(--synthesis);  --p-accent-bg: var(--synthesis-bg);  --p-accent-edge: var(--synthesis-edge); }
  body[data-product="business"] { --p-accent: var(--outreach);   --p-accent-bg: var(--outreach-bg);   --p-accent-edge: var(--outreach-edge); }

  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); }
  body {
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    background:
      radial-gradient(900px 600px at 78% 18%, var(--p-accent-bg), transparent 72%),
      var(--bg);
    transition: background 280ms ease;
  }
  body::before {
    content: "";
    position: fixed; inset: 0; pointer-events: none; opacity: .30;
    background-image:
      linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
    background-size: 56px 56px;
  }
  button { font: inherit; color: inherit; cursor: pointer; }

  /* ─── stage · framed window ─── */
  .stage {
    position: relative; z-index: 1;
    width: min(1320px, calc(100vw - 28px));
    min-height: 860px;
    margin: 18px auto;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--frame);
    box-shadow: 0 20px 50px rgba(0,0,0,.45);
    overflow: hidden;
    display: grid;
    grid-template-rows: 46px 38px 1fr 58px;
  }

  /* ─── titlebar ─── */
  .titlebar {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    border-bottom: 1px solid var(--line);
    padding: 0 16px;
    background: rgba(255,255,255,.012);
  }
  .lights { display: flex; gap: 8px; }
  .light { width: 12px; height: 12px; border-radius: 50%; }
  .r { background: #ff5f57; } .y { background: #febc2e; } .g { background: #28c840; }
  .title { font: 11px var(--mono); letter-spacing: .18em; text-transform: uppercase; color: var(--dim); text-align: center; }
  .title b { color: var(--text); font-weight: 500; letter-spacing: .08em; }
  .title .crumb-sep { color: var(--mute); margin: 0 8px; }
  .title .crumb { color: var(--mid); text-transform: none; letter-spacing: .04em; }
  .top-actions { justify-self: end; display: flex; gap: 8px; align-items: center; }
  .pill {
    border: 1px solid var(--line-2);
    border-radius: 6px;
    padding: 7px 10px;
    color: var(--dim);
    font: 10px var(--mono);
    letter-spacing: .12em;
    text-transform: uppercase;
    background: rgba(255,255,255,.025);
    text-decoration: none;
  }
  .pill.hot { color: var(--green); border-color: rgba(69,201,163,.34); background: rgba(69,201,163,.07); }

  /* ─── product switcher row ─── */
  .product-row {
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--line);
    padding: 0 16px;
    background: rgba(0,0,0,.18);
  }
  .product-tab {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px;
    border: 1px solid var(--line-2);
    background: transparent;
    color: var(--dim);
    font: 10px var(--mono);
    letter-spacing: .14em;
    text-transform: uppercase;
    border-radius: 6px;
    transition: color .18s ease, border-color .18s ease, background .18s ease;
  }
  .product-tab:hover { color: var(--text); border-color: var(--line); background: rgba(255,255,255,.04); }
  .product-tab.is-active {
    color: var(--p-accent);
    border-color: var(--p-accent-edge);
    background: var(--p-accent-bg);
  }
  .product-tab .pt-glyph { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .9; }
  .product-meta {
    margin-left: auto;
    color: var(--faint);
    font: 10px var(--mono);
    letter-spacing: .14em;
    text-transform: uppercase;
  }

  /* ─── console grid · 3-rail ─── */
  .console {
    display: grid;
    grid-template-columns: 238px minmax(0,1fr) 286px;
    min-height: 760px;
    overflow: hidden;
  }
  .rail-left, .rail-right { background: var(--rail); overflow: hidden; }
  .rail-left { border-right: 1px solid var(--line); display: flex; flex-direction: column; }
  .rail-right { border-left: 1px solid var(--line); display: flex; flex-direction: column; }
  .rail-head {
    display: flex; justify-content: space-between; align-items: center;
    gap: 10px;
    padding: 18px 18px 14px;
    border-bottom: 1px solid var(--line);
  }
  .rail-head span:first-child { color: var(--dim); font: 10px var(--mono); letter-spacing: .20em; text-transform: uppercase; }
  .count { color: var(--dim); font: 11px var(--mono); }

  /* signal / queue list (Sentinel chrome) */
  .scroll-list { padding: 12px; display: grid; gap: 8px; max-height: 700px; overflow: auto; }
  .signal, .queue-item, .case-item {
    width: 100%; text-align: left;
    border: 1px solid transparent;
    border-radius: 9px;
    background: rgba(255,255,255,.018);
    padding: 10px;
  }
  .signal:hover, .signal.is-active,
  .queue-item:hover, .queue-item.is-active,
  .case-item:hover, .case-item.is-active {
    border-color: var(--p-accent-edge);
    background: var(--p-accent-bg);
  }
  .sig-top, .queue-top { display: flex; justify-content: space-between; gap: 10px; align-items: center; margin-bottom: 8px; }
  .sig-source { color: var(--dim); font: 10px var(--mono); letter-spacing: .14em; text-transform: uppercase; }
  .sig-date, .queue-subj { color: var(--faint); font: 10px var(--mono); text-transform: uppercase; }
  .sig-date.live { color: var(--green); display: inline-flex; align-items: center; gap: 6px; }
  .risk-label { font: 10px var(--mono); letter-spacing: .14em; text-transform: uppercase; color: var(--dim); }
  .signal b, .queue-item b, .case-item b { display: block; color: var(--text); font-size: 13px; line-height: 1.3; font-weight: 500; }
  .signal p, .queue-item p, .case-item p { margin: 7px 0 0; color: var(--dim); font: 11px/1.5 var(--mono); }
  .sig-meta {
    margin-top: 8px;
    padding-top: 7px;
    border-top: 1px solid rgba(255,255,255,.045);
    color: var(--faint);
    font: 10px/1.5 var(--mono);
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .sig-meta .tag { color: var(--dim); }
  .sig-meta .tag.osint { color: var(--diligence); }
  .sig-meta .tag.endpoint { color: var(--amber); }
  .sig-meta .tag.persona { color: var(--p-accent); }
  .case-item .ci-meta {
    color: var(--faint);
    font: 9px var(--mono);
    letter-spacing: .14em;
    text-transform: uppercase;
    margin-bottom: 4px;
    display: block;
  }
  .case-item.is-personal-close .ci-meta { color: var(--diligence); }

  .rail-section-label {
    color: var(--faint);
    font: 9px var(--mono);
    letter-spacing: .18em;
    text-transform: uppercase;
    padding: 14px 18px 6px;
    border-top: 1px solid var(--line);
    margin-top: 8px;
  }
  .rail-section-label:first-child { border-top: 0; margin-top: 0; padding-top: 14px; }
  .rail-note {
    margin: 16px 18px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
    color: var(--dim);
    font: 10px/1.7 var(--mono);
    letter-spacing: .05em;
  }

  /* workbench */
  .workbench { overflow: auto; background: linear-gradient(180deg, rgba(15,15,20,.98), rgba(10,10,13,.98)); }
  .screen-pad { padding: 30px 38px 36px; }
  .empty { padding: 30px; color: var(--red); font: 13px var(--mono); }

  /* ─── Sentinel-mode rendering (when scenario is institutional) ─── */
  .nav-row {
    display: flex; justify-content: space-between; align-items: center;
    gap: 16px; flex-wrap: wrap;
    padding-bottom: 22px;
    margin-bottom: 22px;
    border-bottom: 1px solid var(--line);
  }
  .nav-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .tab {
    border: 1px solid var(--line-2);
    background: rgba(255,255,255,.025);
    color: var(--dim);
    border-radius: 5px;
    padding: 7px 10px;
    font: 10px var(--mono);
    letter-spacing: .12em;
    text-transform: uppercase;
  }
  .tab.is-active, .tab:hover {
    color: var(--text);
    border-color: var(--p-accent-edge);
    background: var(--p-accent-bg);
  }

  .view-heading {
    margin: 0 0 8px;
    font-family: var(--display);
    font-size: 30px;
    line-height: 1.1;
    letter-spacing: -.025em;
    font-weight: 400;
  }
  .lead-line {
    margin: 0 0 22px;
    color: var(--mid);
    font: 14px/1.6 var(--serif);
    max-width: 70ch;
  }
  .subject-bar {
    margin: 0 0 22px;
    border: 1px solid var(--line);
    border-radius: 11px;
    background: rgba(255,255,255,.018);
    padding: 18px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 18px; flex-wrap: wrap;
  }
  .subject-id h2 {
    margin: 0;
    font-family: var(--display);
    font-size: 30px;
    line-height: 1.1;
    letter-spacing: -.025em;
    font-weight: 400;
  }
  .subject-id p { margin: 8px 0 0; color: var(--mid); font: 14px/1.55 var(--sans); max-width: 60ch; }
  .fusion-line {
    margin: 12px 0 0;
    color: var(--dim); font: 10px/1.5 var(--mono);
    letter-spacing: .10em; text-transform: uppercase;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .fusion-line .age { color: var(--faint); text-transform: none; letter-spacing: .04em; }
  .subject-risk {
    font: 11px var(--mono);
    letter-spacing: .14em; text-transform: uppercase;
    padding: 9px 12px;
    border: 1px solid var(--line-2);
    border-radius: 6px;
    color: var(--dim);
    background: rgba(255,255,255,.025);
    white-space: nowrap;
  }
  .subject-risk.risk-high { color: var(--red); border-color: rgba(240,82,82,.35); background: rgba(240,82,82,.06); }
  .subject-risk.risk-watch { color: var(--amber); border-color: rgba(245,165,36,.32); background: rgba(245,165,36,.06); }
  .subject-risk.risk-good { color: var(--green); border-color: rgba(69,201,163,.32); background: rgba(69,201,163,.06); }

  .card, .timeline-row, .claim-block, .alias-strip {
    border: 1px solid var(--line);
    border-radius: 10px;
    background: rgba(255,255,255,.018);
    padding: 16px;
  }
  .card h3, .claim-block h3, .alias-strip h3 {
    margin: 0 0 10px; color: var(--text);
    font: 11px var(--mono); letter-spacing: .18em;
    text-transform: uppercase; font-weight: 500;
  }
  .card p, .claim-block p { margin: 0; color: var(--mid); font: 14px/1.55 var(--sans); }
  .meta { color: var(--faint); font: 10px/1.5 var(--mono); letter-spacing: .10em; text-transform: uppercase; margin-top: 11px; }
  .alias-strip { margin-top: 14px; }
  .alias-strip ul { margin: 0; padding: 0; list-style: none; display: grid; gap: 8px; }
  .alias-strip li { color: var(--mid); font: 13px/1.55 var(--sans); }
  .alias-strip li b { color: var(--text); font-weight: 500; margin-right: 6px; }
  .alias-strip li span { color: var(--faint); font: 10px var(--mono); letter-spacing: .10em; text-transform: uppercase; margin-left: 8px; }

  .graph-toggle {
    margin-top: 14px;
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    background: rgba(255,255,255,.012);
  }
  .graph-toggle summary {
    padding: 14px 16px; cursor: pointer;
    color: var(--dim); font: 11px var(--mono);
    letter-spacing: .14em; text-transform: uppercase;
    list-style: none; user-select: none;
  }
  .graph-toggle summary::-webkit-details-marker { display: none; }
  .graph-toggle summary::before { content: "▸"; color: var(--faint); margin-right: 10px; display: inline-block; transition: transform .15s ease; }
  .graph-toggle[open] summary::before { transform: rotate(90deg); }
  .graph-toggle .graph { border: 0; border-top: 1px solid var(--line); border-radius: 0; min-height: 280px; }

  .timeline { display: grid; gap: 14px; margin-top: 4px; }
  .timeline-row { display: grid; grid-template-columns: 140px 1fr; gap: 18px; align-items: start; }
  .timeline-row.is-active { border-color: var(--p-accent-edge); background: var(--p-accent-bg); }
  .t-when { display: flex; flex-direction: column; gap: 6px; }
  .t-when .value { color: var(--text); font: 11px/1.4 var(--mono); letter-spacing: .02em; }
  .t-when .key { color: var(--faint); font: 10px/1.4 var(--mono); letter-spacing: .12em; text-transform: uppercase; }
  .timeline-row h3 { margin: 0 0 6px; font-size: 14px; font-weight: 600; line-height: 1.3; color: var(--text); }
  .timeline-row p { margin: 0; color: var(--mid); font: 13px/1.6 var(--sans); }
  .timeline-row .meta { margin-top: 10px; }
  .risk-high { color: var(--red); }
  .risk-watch { color: var(--amber); }
  .risk-good { color: var(--green); }

  .graph {
    position: relative; min-height: 300px; overflow: hidden;
    background:
      radial-gradient(circle at 50% 45%, var(--p-accent-bg), transparent 58%),
      rgba(255,255,255,.012);
  }
  .graph::before, .graph::after {
    content: ""; position: absolute;
    left: 10%; right: 10%; top: 50%;
    height: 1px; background: rgba(255,255,255,.10);
    transform: rotate(18deg);
  }
  .graph::after { transform: rotate(-20deg); }
  .node {
    position: absolute; z-index: 1;
    transform: translate(-50%, -50%);
    border: 1px solid var(--p-accent-edge);
    background: var(--panel);
    border-radius: 999px;
    padding: 9px 11px;
    color: var(--mid);
    font: 10px var(--mono);
    letter-spacing: .08em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .node.main {
    color: var(--text);
    border-color: var(--line-2);
    background: var(--p-accent-bg);
    padding: 12px 14px;
  }

  .packet-list { display: grid; gap: 10px; margin-top: 4px; }
  .packet-line {
    display: grid; grid-template-columns: 60px 1fr 140px;
    gap: 14px; align-items: start;
    border: 1px solid var(--line);
    background: rgba(255,255,255,.018);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .packet-line b { color: var(--dim); font: 13px var(--mono); }
  .packet-line p { margin: 0; color: var(--mid); font: 13px/1.55 var(--sans); }
  .packet-line .value { color: var(--faint); font: 10px var(--mono); letter-spacing: .12em; text-transform: uppercase; text-align: right; }

  .rec-panel { padding: 12px; display: grid; gap: 10px; }
  .rec-card {
    border: 1px solid var(--line);
    border-radius: 10px;
    background: rgba(255,255,255,.018);
    padding: 13px 14px;
  }
  .rec-card h3 {
    margin: 0 0 8px; color: var(--dim);
    font: 10px var(--mono); letter-spacing: .18em;
    text-transform: uppercase; font-weight: 500;
  }
  .rec-card p { margin: 0; color: var(--mid); font: 12px/1.55 var(--sans); }
  .rec-card p b { color: var(--text); font-weight: 500; }
  .big-risk { font: 18px/1.1 var(--mono); letter-spacing: -.01em; color: var(--text); }
  .rail-foot { margin: 6px 14px 18px; color: var(--dim); font: 10px/1.65 var(--mono); letter-spacing: .04em; }

  /* ─── doc-as-document fallback (Personal/Team and non-institutional Business) ─── */
  .doc-area { max-width: 880px; }
  .doc-banner {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    margin-bottom: 24px;
    border: 1px solid var(--p-accent-edge);
    background: var(--p-accent-bg);
    border-radius: 8px;
    font: 11px var(--mono);
    letter-spacing: .04em;
    color: var(--mid);
  }
  .doc-banner .glyph { color: var(--p-accent); font-size: 14px; }
  .doc-banner strong { color: var(--text); font-weight: 500; margin-right: 8px; }
  .doc-banner .attr { margin-left: auto; color: var(--p-accent); font-size: 9.5px; letter-spacing: .16em; text-transform: uppercase; }

  .doc-meta {
    color: var(--faint);
    font: 10px var(--mono);
    letter-spacing: .16em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .doc-meta .dot { color: var(--mute); margin: 0 8px; }
  .doc-title {
    font-family: var(--display);
    font-size: 44px; line-height: 1.05;
    color: var(--text);
    margin: 0 0 12px;
    font-weight: 400;
    letter-spacing: -.01em;
  }
  .doc-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 28px; }
  .doc-tag {
    font: 9.5px var(--mono);
    letter-spacing: .08em;
    color: var(--dim);
    padding: 3px 9px;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: rgba(255,255,255,.025);
  }
  .doc-tag.is-pillar { color: var(--p-accent); border-color: var(--p-accent-edge); background: var(--p-accent-bg); }

  .rough-label {
    font: 9.5px var(--mono);
    color: var(--faint);
    letter-spacing: .16em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .rough-list {
    margin: 0 0 28px;
    padding: 12px 16px;
    border-left: 2px solid var(--line);
    color: var(--mid);
    font: 14px/1.6 var(--serif);
    font-style: italic;
    list-style: none;
  }
  .rough-list li { padding: 2px 0; }

  .invocation-divider {
    display: flex; align-items: center; gap: 14px;
    margin: 0 0 26px;
  }
  .invocation-divider::before,
  .invocation-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--line);
  }
  .invocation-divider span {
    font: 10px var(--mono);
    color: var(--p-accent);
    letter-spacing: .18em;
    text-transform: uppercase;
  }

  .doc-section {
    margin-bottom: 30px;
    padding-left: 16px;
    border-left: 2px solid transparent;
  }
  .doc-section[data-register="diligence"] { border-left-color: var(--diligence-edge); }
  .doc-section[data-register="synthesis"] { border-left-color: var(--synthesis-edge); }
  .doc-section[data-register="judgment"]  { border-left-color: var(--judgment-edge); }

  .doc-section-label {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 12px;
    font: 10px var(--mono);
    letter-spacing: .18em;
    text-transform: uppercase;
  }
  .doc-section-label .glyph { font-size: 12px; }
  .doc-section[data-register="diligence"] .glyph,
  .doc-section[data-register="diligence"] .reg-name { color: var(--diligence); }
  .doc-section[data-register="synthesis"] .glyph,
  .doc-section[data-register="synthesis"] .reg-name { color: var(--synthesis); }
  .doc-section[data-register="judgment"] .glyph,
  .doc-section[data-register="judgment"] .reg-name { color: var(--judgment); }
  .doc-section-label .reg-name { font-weight: 500; }
  .doc-section-label .sec-title {
    color: var(--mid);
    font: italic 13px/1.4 var(--serif);
    letter-spacing: 0;
    text-transform: none;
  }
  .doc-section-label .sec-time { margin-left: auto; color: var(--faint); font-size: 10px; }

  .persona { margin-bottom: 14px; }
  .persona:last-child { margin-bottom: 0; }
  .persona-name {
    font: 9.5px var(--mono);
    color: var(--faint);
    letter-spacing: .16em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .persona-body {
    font: 16px/1.55 var(--serif);
    color: var(--text);
    font-weight: 300;
  }

  .mystic-margin {
    margin: 16px 0 16px auto;
    max-width: 320px;
    padding: 12px 14px;
    border-left: 2px solid var(--judgment);
    background: rgba(233,0,149,.04);
    font: italic 14px/1.55 var(--serif);
    color: var(--mid);
  }
  .mystic-attr {
    font: 9px var(--mono);
    color: var(--judgment);
    letter-spacing: .18em;
    margin-bottom: 6px;
    font-style: normal;
  }
  .mystic-attr .glyph { color: var(--judgment); margin-right: 4px; }

  .verdict-card {
    margin-top: 14px;
    padding: 16px 18px;
    border: 1px solid var(--judgment-edge);
    background: rgba(233,0,149,.06);
    border-radius: 6px;
  }
  .verdict-head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .verdict-badge {
    font: 9.5px var(--mono);
    color: var(--judgment);
    letter-spacing: .16em;
    padding: 3px 8px;
    border: 1px solid var(--judgment-edge);
    border-radius: 3px;
    background: rgba(233,0,149,.06);
    text-transform: uppercase;
  }
  .verdict-title {
    font: italic 14px/1.4 var(--serif);
    color: var(--text);
    font-weight: 400;
  }
  .verdict-body {
    font: 13px/1.55 var(--serif);
    color: var(--mid);
  }

  .disagreements {
    margin-top: 24px;
    padding: 14px 16px;
    border: 1px dashed var(--judgment-edge);
    border-radius: 4px;
    background: rgba(233,0,149,.02);
  }
  .disagreements-label {
    font: 9.5px var(--mono);
    color: var(--judgment);
    letter-spacing: .16em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .disagreements ul { list-style: none; margin: 0; padding: 0; font: 13px/1.55 var(--serif); color: var(--mid); }
  .disagreements li { margin-bottom: 5px; }
  .disagreements li:last-child { margin-bottom: 0; }
  .disagreements li strong { color: var(--text); font-weight: 500; }

  /* command bar */
  .commandbar {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px; align-items: center;
    border-top: 1px solid var(--line);
    padding: 0 18px;
    background: rgba(0,0,0,.18);
  }
  .cmd-prefix { color: var(--faint); font: 16px var(--mono); }
  .cmd { color: var(--dim); font: 12px var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cmd-actions { color: var(--faint); font: 10px var(--mono); letter-spacing: .12em; text-transform: uppercase; }

  .gate-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 9px;
    margin-left: 10px;
    border: 1px solid rgba(69,201,163,.32);
    background: rgba(69,201,163,.07);
    color: var(--green);
    border-radius: 999px;
    font: 9px var(--mono);
    letter-spacing: .14em;
    text-transform: uppercase;
    vertical-align: middle;
  }
  .gate-pill .live-dot { width: 5px; height: 5px; }

  .section { margin-top: 32px; }
  .section:first-of-type { margin-top: 26px; }
  .section-head {
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
    color: var(--dim); font: 10px var(--mono);
    letter-spacing: .22em; text-transform: uppercase;
    padding-bottom: 10px; margin-bottom: 14px;
    border-bottom: 1px solid var(--line);
  }
  .section-head .head-title { color: var(--text); font-weight: 500; }
  .section-head .head-aux { color: var(--faint); margin-left: auto; letter-spacing: .12em; }

  .action-card {
    border: 1px solid var(--line);
    border-radius: 10px;
    background: rgba(255,255,255,.018);
    padding: 18px 20px;
    display: grid; gap: 12px;
  }
  .action-row { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
  .action-card .big-risk { font: 22px/1 var(--mono); letter-spacing: -.02em; }
  .action-card .action-meta { color: var(--faint); font: 10px var(--mono); letter-spacing: .12em; text-transform: uppercase; }
  .action-card h3 { margin: 0; color: var(--text); font: 14px/1.3 var(--sans); font-weight: 600; }
  .action-card p { margin: 0; color: var(--mid); font: 14px/1.6 var(--sans); }
  .action-card .caveat {
    color: var(--dim); font: 11px/1.6 var(--mono);
    letter-spacing: .04em;
    padding-top: 10px;
    border-top: 1px solid var(--line);
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .55; transform: scale(.78); }
  }
  .live-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px rgba(69,201,163,.7);
    animation: pulse-dot 1.6s ease-in-out infinite;
    flex-shrink: 0;
  }

  /* version pin */
  .v-pin {
    position: fixed; bottom: 10px; right: 18px;
    z-index: 90;
    font: 10px var(--mono);
    color: var(--mute);
    letter-spacing: .06em;
    pointer-events: none;
    user-select: none;
    text-align: right;
  }
  .v-pin strong { color: var(--faint); font-weight: 500; }

  @media (max-width: 1100px) {
    .stage { width: calc(100vw - 16px); margin: 8px auto; }
    .titlebar, .console, .timeline-row, .packet-line, .commandbar, .product-row { grid-template-columns: 1fr; }
    .top-actions { justify-self: start; padding-bottom: 10px; }
    .rail-left, .rail-right { border: 0; border-bottom: 1px solid var(--line); }
    .scroll-list { max-height: none; }
    .subject-bar { flex-direction: column; align-items: flex-start; }
    .packet-line .value { text-align: left; }
  }
</style>
</head>
<body data-product="business">

<div class="stage">
  <header class="titlebar">
    <div class="lights" aria-hidden="true">
      <span class="light r"></span>
      <span class="light y"></span>
      <span class="light g"></span>
    </div>
    <div class="title">
      <b>Liminal</b>
      <span class="crumb-sep">·</span>
      <span class="crumb" id="crumbProduct">Business</span>
      <span class="crumb-sep">·</span>
      <span class="crumb" id="crumbScenario">Sentinel</span>
    </div>
    <div class="top-actions">
      <span class="pill hot">human in the loop</span>
      <a class="pill" href="data/sentinel-demo.json" target="_blank" rel="noopener">fixture</a>
    </div>
  </header>

  <nav class="product-row" id="productRow">
    <!-- product tabs injected -->
  </nav>

  <main class="console">
    <aside class="rail-left">
      <div class="rail-head">
        <span id="leftRailLabel">cases</span>
        <span class="count" id="leftRailCount">--</span>
      </div>
      <div class="scroll-list" id="leftRail"></div>
      <div class="rail-note">daemon · running<br>fixture · synthetic<br>no live local collection<br>no real surveillance</div>
    </aside>

    <section class="workbench">
      <div class="screen-pad" id="workbench"><div class="empty">loading…</div></div>
    </section>

    <aside class="rail-right">
      <div class="rail-head">
        <span id="rightRailLabel">analyst queue</span>
        <span class="count" id="rightRailCount">--</span>
      </div>
      <div class="scroll-list" id="rightRail"></div>
    </aside>
  </main>

  <footer class="commandbar">
    <span class="cmd-prefix">/</span>
    <div class="cmd" id="commandText">liminal · loading</div>
    <div class="cmd-actions">click signal · queue · subject</div>
  </footer>
</div>

<div class="v-pin" id="vPin" aria-hidden="true">
  <strong id="vPinSpec">spec ·</strong> · <span id="vPinProto">proto ·</span>
</div>

<script type="module">
  // ════════════════════════════════════════════════════════════════
  //   Liminal merged Pass 1 · controller
  //   Two data sources:
  //     - data/sentinel-demo.json  (institutional subjects + events)
  //     - v0_3_config.js           (v0.3.7 spec · Personal/Team scenarios)
  //   One unified routing model:
  //     activeProduct ∈ {personal, team, business}
  //     activeScenarioId  → { kind: "sentinel-subject" | "config-scenario", id }
  //   Render path branches on scenario kind:
  //     sentinel-subject → Shayaun's chrome (signals/timeline/packet/graph)
  //     config-scenario  → doc-as-document chrome (DILIGENCE/SYNTHESIS/JUDGMENT)
  // ════════════════════════════════════════════════════════════════

  const cfg = await import('./v0_3_config.js');
  const sentinelData = await fetch('data/sentinel-demo.json').then(r => r.json());

  const ESC_MAP = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
  const esc = v => String(v ?? '').replace(/[&<>"']/g, ch => ESC_MAP[ch]);
  const pct = n => `${Math.round(Number(n || 0) * 100)}%`;
  const byId = (list, id) => list.find(x => x.id === id);
  const $ = sel => document.querySelector(sel);
  const riskClass = v => /HIGH/.test(v || '') ? 'risk-high' : /WATCH|REVIEW|ELEVATED|HOLD/.test(v || '') ? 'risk-watch' : 'risk-good';
  const relTime = ts => {
    const diff = Math.max(0, Date.now() - new Date(ts).getTime());
    const m = Math.floor(diff / 60000), h = Math.floor(m / 60), d = Math.floor(h / 24);
    if (m < 1) return 'just now';
    if (h < 1) return `${m}m ago`;
    if (d < 1) return `${h}h ago`;
    return `${d}d ago`;
  };
  const nowTime = () => {
    const d = new Date();
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
  };

  // ─── unified scenario index ──────────────────────────────────────
  // Builds a flat list of all scenarios across products with kind tags.
  //
  // SENTINEL_AS_BUSINESS_FEATURE: Hanssen, Manning, Snowden, Vahidi
  // are surfaced under Business (per Q3: Sentinel is a Business product
  // feature, not a sub-mode). Other Business scenarios from config (vendor
  // coherence, audit-chain) keep their config-scenario rendering.
  const SENTINEL_SUBJECTS = sentinelData.subjects;
  const PERSONAS = Object.fromEntries(cfg.WORKER_PERSONAS.map(p => [p.id, p]));

  function scenariosForProduct(productId) {
    if (productId === 'personal') {
      return cfg.PERSONAL_SCENARIOS.map(s => ({ kind: 'config', id: s.id, label: s.label, meta: s.date ?? 'today', data: s }));
    }
    if (productId === 'team') {
      return cfg.TEAM_SCENARIOS.map(s => ({ kind: 'config', id: s.id, label: s.label, meta: s.read_shape ?? 'peer', data: s }));
    }
    // business: Sentinel subjects + config Business scenarios
    const sentinelEntries = SENTINEL_SUBJECTS.map(s => ({
      kind: 'sentinel',
      id: s.id,
      label: `${s.shortName} · ${s.mode === 'target_watchboard' ? 'watchboard' : 'insider replay'}`,
      meta: s.riskBand,
      data: s,
    }));
    const configEntries = cfg.BUSINESS_SCENARIOS.map(s => ({
      kind: 'config',
      id: s.id,
      label: s.label,
      meta: s.in_lane ? 'in-lane' : (s.featured_pillar ?? ''),
      data: s,
    }));
    return [...sentinelEntries, ...configEntries];
  }

  // ─── state ───────────────────────────────────────────────────────
  const state = {
    product: 'business',
    scenarioId: 'snowden-2013',  // sentinel default · matches Shayaun's boot
    view: 'insider',  // sentinel-mode sub-view: insider | target | timeline | packet
  };

  function activeScenarios() { return scenariosForProduct(state.product); }
  function activeScenario() { return activeScenarios().find(s => s.id === state.scenarioId); }

  // ─── product switcher ────────────────────────────────────────────
  const productRow = $('#productRow');
  for (const p of cfg.PRODUCTS) {
    const btn = document.createElement('button');
    btn.className = 'product-tab';
    btn.dataset.product = p.id;
    btn.innerHTML = `<span class="pt-glyph"></span>${p.short.toLowerCase()}`;
    btn.title = `${p.label} · ${p.read_shape}`;
    btn.addEventListener('click', () => setProduct(p.id));
    productRow.appendChild(btn);
  }
  const productMeta = document.createElement('span');
  productMeta.className = 'product-meta';
  productMeta.id = 'productMeta';
  productRow.appendChild(productMeta);

  function setProduct(productId) {
    state.product = productId;
    document.body.dataset.product = productId;
    const list = scenariosForProduct(productId);
    state.scenarioId = list[0]?.id ?? null;
    if (productId === 'business' && list.find(s => s.id === 'snowden-2013')) state.scenarioId = 'snowden-2013';
    state.view = 'insider';
    render();
  }

  // ─── routing ─────────────────────────────────────────────────────
  function setScenario(id) {
    state.scenarioId = id;
    const sc = activeScenario();
    if (sc?.kind === 'sentinel') {
      state.view = sc.data.mode === 'target_watchboard' ? 'target' : 'insider';
    } else {
      state.view = 'config';
    }
    render();
  }
  function setView(v) {
    state.view = v;
    render();
  }

  // ─── render top ──────────────────────────────────────────────────
  function render() {
    // product tabs
    document.querySelectorAll('.product-tab').forEach(el => {
      el.classList.toggle('is-active', el.dataset.product === state.product);
    });

    // product meta line
    const product = cfg.PRODUCTS.find(p => p.id === state.product);
    productMeta.textContent = `${product.read_shape} · ${product.consent_default}`;

    // crumbs
    const sc = activeScenario();
    $('#crumbProduct').textContent = product.short;
    $('#crumbScenario').textContent = sc?.label ?? '·';

    renderLeftRail();
    renderRightRail();
    renderWorkbench();
    renderCommand();
    setVersionPin();
  }

  // ─── left rail ───────────────────────────────────────────────────
  function renderLeftRail() {
    const list = activeScenarios();
    $('#leftRailLabel').textContent = state.product === 'business' ? 'cases · queue' :
                                       state.product === 'team'     ? 'team reads' :
                                                                       'open decisions';
    $('#leftRailCount').textContent = list.length;
    const wrap = $('#leftRail');
    wrap.innerHTML = '';

    let lastKind = null;
    for (const s of list) {
      if (state.product === 'business' && s.kind !== lastKind) {
        const lbl = document.createElement('div');
        lbl.className = 'rail-section-label';
        lbl.textContent = s.kind === 'sentinel' ? 'Sentinel · institutional' : 'Business · scenarios';
        wrap.appendChild(lbl);
        lastKind = s.kind;
      }
      const btn = document.createElement('button');
      btn.className = 'case-item' + (s.id === state.scenarioId ? ' is-active' : '');
      if (s.kind === 'config' && s.data.is_liminal_close) btn.classList.add('is-personal-close');
      btn.dataset.scenarioId = s.id;
      btn.innerHTML = `
        <span class="ci-meta">${esc(s.meta)}</span>
        <b>${esc(s.label)}</b>
      `;
      btn.addEventListener('click', () => setScenario(s.id));
      wrap.appendChild(btn);
    }
  }

  // ─── right rail ──────────────────────────────────────────────────
  function renderRightRail() {
    const sc = activeScenario();
    if (!sc) { $('#rightRail').innerHTML = ''; return; }

    if (sc.kind === 'sentinel') {
      // Sentinel mode: analyst queue (Shayaun's pattern)
      const alerts = sentinelData.alerts.filter(a => a.subjectId === state.scenarioId);
      $('#rightRailLabel').textContent = 'analyst queue';
      $('#rightRailCount').textContent = alerts.length;
      $('#rightRail').innerHTML = alerts.map(alert => {
        const subj = byId(SENTINEL_SUBJECTS, alert.subjectId);
        return `<button class="queue-item is-active" data-alert-id="${esc(alert.id)}">
          <div class="queue-top">
            <span class="risk-label ${riskClass(alert.riskLevel)}">${esc(alert.riskLevel)}</span>
            <span class="queue-subj">${esc(subj.shortName)}</span>
          </div>
          <b>${esc(alert.disposition)}</b>
          <p>${esc(alert.title)}</p>
        </button>`;
      }).join('');
      return;
    }

    // Config mode: agency console (worker-personas with state)
    const data = sc.data;
    const correctionTargets = new Set(data.correction_targets ?? []);
    const refusalSet = new Set((data.refusal ?? []).map(r => r.agent_id));
    const stateOf = id => refusalSet.has(id) ? 'refused'
                       : correctionTargets.has(id) ? 'active'
                       : (data.reads?.[id] ? 'done' : 'idle');
    const glyphOf = s => ({ refused: '⌀', active: '◇', done: '✓', idle: '○' })[s] ?? '·';

    $('#rightRailLabel').textContent = 'agents · 6 bounded';
    $('#rightRailCount').textContent = cfg.WORKER_PERSONAS.length;
    $('#rightRail').innerHTML = cfg.WORKER_PERSONAS.map(p => {
      const s = stateOf(p.id);
      return `<div class="queue-item">
        <div class="queue-top">
          <span class="risk-label ${s === 'refused' ? 'risk-watch' : s === 'active' ? '' : 'risk-good'}" style="${s === 'active' ? 'color: var(--p-accent);' : ''}">${esc(s)}</span>
          <span class="queue-subj">${esc(glyphOf(s))}</span>
        </div>
        <b>${esc(p.label)}</b>
        <p>${esc(p.role)}</p>
      </div>`;
    }).join('');
  }

  // ─── workbench ───────────────────────────────────────────────────
  function renderWorkbench() {
    const sc = activeScenario();
    if (!sc) { $('#workbench').innerHTML = '<div class="empty">no scenario</div>'; return; }
    if (sc.kind === 'sentinel') return renderSentinel(sc.data);
    return renderConfigDoc(sc.data);
  }

  // ─── Sentinel rendering (lifted from Shayaun's index.html, parameterized) ─
  function renderSentinel(s) {
    const events = sentinelData.events.filter(e => e.subjectId === s.id).sort((a, b) => new Date(b.ts) - new Date(a.ts));
    const alerts = sentinelData.alerts.filter(a => a.subjectId === s.id);
    const alert = alerts[0] || sentinelData.alerts[0];
    const feedNames = (s.sourceIds || []).map(id => (byId(sentinelData.feeds, id) || { id }).id.toUpperCase()).join(' · ');

    const nav = `<div class="nav-row">
      <div class="nav-group">
        ${SENTINEL_SUBJECTS.map(x => `<button class="tab ${x.id === state.scenarioId ? 'is-active' : ''}" data-jump="${esc(x.id)}">${esc(x.shortName)}</button>`).join('')}
      </div>
      <div class="nav-group">
        <button class="tab ${state.view === 'timeline' ? 'is-active' : ''}" data-view="timeline">timeline</button>
        <button class="tab ${state.view === 'packet' ? 'is-active' : ''}" data-view="packet">packet</button>
      </div>
    </div>`;

    const subjectBar = (state.view === 'timeline' || state.view === 'packet') ? '' : `<section class="subject-bar">
      <div class="subject-id">
        <h2>${esc(s.displayName)}</h2>
        <p>${esc(s.summary)}</p>
        <div class="fusion-line">
          <span class="live-dot" aria-hidden="true"></span>
          <span>fusing ${esc(feedNames)}</span>
          <span class="age">${esc(events[0] ? relTime(events[0].ts) : 'no events')}</span>
        </div>
      </div>
      <div class="subject-risk ${riskClass(s.riskBand)}">${esc(s.riskBand)}</div>
    </section>`;

    let body = '';
    if (state.view === 'timeline') {
      body = renderTimelineView();
    } else if (state.view === 'packet') {
      body = renderPacketView();
    } else if (state.view === 'target') {
      body = renderTargetBody(s, events, alerts, alert);
    } else {
      body = renderInsiderBody(s, events, alert);
    }

    $('#workbench').innerHTML = nav + subjectBar + body;

    document.querySelectorAll('[data-jump]').forEach(b => b.onclick = () => setScenario(b.dataset.jump));
    document.querySelectorAll('[data-view]').forEach(b => b.onclick = () => setView(b.dataset.view));
  }

  function renderInsiderBody(s, events, alert) {
    return `
      <section class="section">
        <header class="section-head">
          <span class="head-title">Ingested signals · ${events.length}</span>
          <span class="head-aux">${esc(s.metrics?.signalCount ?? events.length)} flagged · ${esc(pct(s.metrics?.confidence))} confidence</span>
        </header>
        <div class="timeline">${events.map(e => renderTimelineRow(e)).join('')}</div>
      </section>

      <section class="section">
        <header class="section-head"><span class="head-title">Analyst views</span></header>
        <article class="claim-block">
          <h3>possible explanations · required</h3>
          <p>Authorized tasking, training, protected disclosure, or benign operational reasons must be tested before escalation. Sentinel keeps that branch visible.</p>
        </article>
      </section>

      <section class="section">
        <header class="section-head"><span class="head-title">Suggested actions</span></header>
        ${renderActionCard(s, alert)}
      </section>
    `;
  }

  function renderTargetBody(s, events, alerts, alert) {
    const changed = alerts.slice(1);
    return `
      <section class="section">
        <header class="section-head">
          <span class="head-title">Ingested signals · ${events.length}</span>
          <span class="head-aux">${esc(pct(s.metrics?.confidence))} confidence</span>
        </header>
        <div class="timeline">${events.map(e => renderTimelineRow(e)).join('')}</div>
      </section>

      <section class="section">
        <header class="section-head"><span class="head-title">Analyst views</span></header>
        ${changed.length ? `<article class="card">
          <h3>what changed since last brief</h3>
          <p>${changed.map(a => `${esc(a.title)} — ${esc(a.disposition)}`).join(' · ')}</p>
          <div class="meta">${changed.length} delta${changed.length === 1 ? '' : 's'} since last packet</div>
        </article>` : ''}
        <article class="alias-strip">
          <h3>aliases (${(s.aliases || []).length})</h3>
          <ul>
            ${(s.aliases || []).map(a => `<li><b>${esc(a.value)}</b>${esc(a.note ?? '')} <span>${esc(a.kind || 'alias')} · ${esc(pct(a.confidence ?? 1))}</span></li>`).join('')}
          </ul>
        </article>
        <details class="graph-toggle" open>
          <summary>relationship graph (${sentinelData.graph?.nodes?.length || 0} nodes)</summary>
          ${renderGraph()}
        </details>
      </section>

      <section class="section">
        <header class="section-head"><span class="head-title">Suggested actions</span></header>
        ${renderActionCard(s, alert)}
      </section>
    `;
  }

  function renderTimelineView() {
    const rows = [...sentinelData.events].sort((a, b) => new Date(b.ts) - new Date(a.ts));
    return `
      <h2 class="view-heading">Analyst timeline</h2>
      <p class="lead-line">A source-backed chronology: what changed, which source saw it, why it matters, and what action is recommended.</p>
      <div class="timeline">${rows.map(renderTimelineRow).join('')}</div>
    `;
  }

  function renderPacketView() {
    const packet = sentinelData.packet;
    return `
      <h2 class="view-heading">Evidence packet</h2>
      <p class="lead-line">A reviewer handoff with source IDs, caveats, recommendation state, and audit hash.</p>
      <div class="packet-list">
        ${packet.sections.map((sec, i) => `<article class="packet-line"><b>${String(i + 1).padStart(2, '0')}</b><p>${esc(sec)}. Rendered from selected events, source IDs, recommendation state, and analyst caveats.</p><span class="value">packet section</span></article>`).join('')}
        <article class="packet-line"><b>hash</b><p>${esc(packet.audit.hash)}. Previous packet: ${esc(packet.audit.previous)}.</p><span class="value">audit seal</span></article>
      </div>
    `;
  }

  function renderTimelineRow(event) {
    const s = byId(SENTINEL_SUBJECTS, event.subjectId);
    const alert = sentinelData.alerts.find(a => (a.eventIds || []).includes(event.id));
    const action = alert?.disposition || 'Analyst review';
    const f = byId(sentinelData.feeds, event.feedId) || { id: event.feedId, cadence: '·' };
    const tier = f.type === 'OSINT' ? 'osint' : 'endpoint';
    return `<article class="timeline-row ${event.subjectId === state.scenarioId ? 'is-active' : ''}">
      <div class="t-when">
        <span class="value">${esc(new Date(event.ts).toISOString().slice(0,16).replace('T', ' '))}Z</span>
        <span class="key">${esc(f.id.toUpperCase())} · ${esc(event.reliability ?? '·')}</span>
        <span class="key">${esc(tier)} · ${esc(f.cadence)}</span>
      </div>
      <div class="t-what">
        <h3>${esc(event.title)}</h3>
        <p>${esc(event.analyticValue)}</p>
        <div class="meta">${esc(s?.shortName ?? '·')} · ${esc(f.name ?? f.id)} · evidence: ${esc((event.evidence || []).join(' · '))} · <span class="${riskClass(alert?.riskLevel || s?.riskBand)}">${esc(action)}</span></div>
      </div>
    </article>`;
  }

  function renderGraph() {
    // Use Sentinel's data.graph if it has nodes; otherwise fall back to Shayaun's hardcoded layout.
    const g = sentinelData.graph;
    if (!g?.nodes?.length) return '<div class="graph"></div>';
    // Simple radial layout centered on the heaviest node.
    const main = g.nodes.reduce((m, n) => (n.weight ?? 0) > (m.weight ?? 0) ? n : m, g.nodes[0]);
    const others = g.nodes.filter(n => n.id !== main.id);
    const positions = others.map((n, i) => {
      const angle = (i / others.length) * 2 * Math.PI;
      return { x: 50 + Math.cos(angle) * 32, y: 45 + Math.sin(angle) * 30, label: n.label };
    });
    return `<div class="graph">
      <span class="node main" style="left:50%;top:45%">${esc(main.label)}</span>
      ${positions.map(p => `<span class="node" style="left:${p.x}%;top:${p.y}%">${esc(p.label)}</span>`).join('')}
    </div>`;
  }

  function renderActionCard(s, alert) {
    return `<article class="action-card">
      <div class="action-row">
        <div class="big-risk ${riskClass(alert?.riskLevel)}">${esc(alert?.riskLevel ?? 'REVIEW')}</div>
        <div class="action-meta">${esc(pct(s.metrics?.confidence))} confidence · ${esc(s.metrics?.corroboration ?? 0)} source families</div>
      </div>
      <h3>${esc(alert?.disposition ?? 'Analyst review')}<span class="gate-pill"><span class="live-dot" aria-hidden="true"></span>human-gated</span></h3>
      <p>${esc(alert?.recommendedAction ?? s.recommendedAction ?? '·')}</p>
      <div class="action-meta">monitoring · ${esc(alert?.monitoring ?? 'standard')}</div>
      <p class="caveat">Sentinel never accuses, never auto-tasks collection, never escalates without a human. Every packet is sealed with an audit hash before it leaves this console.</p>
    </article>`;
  }

  // ─── Config-doc rendering (Personal/Team + non-institutional Business) ─
  const SECTION_MAP = [
    { id: 'diligence', label: 'DILIGENCE', sec_title: 'context loaded',  personas: ['operator', 'synthesizer'] },
    { id: 'synthesis', label: 'SYNTHESIS', sec_title: 'frame the move',  personas: ['strategist', 'contrarian'] },
    { id: 'judgment',  label: 'JUDGMENT',  sec_title: 'verdict + fixes', personas: ['manager', 'planner'] },
  ];

  function renderConfigDoc(scenario) {
    const featuredPillar = cfg.BIDIRECTIONAL_ETHICS.pillars.find(p => p.id === scenario.featured_pillar);
    const product = cfg.PRODUCTS.find(p => p.id === state.product);

    const banner = featuredPillar ? `
      <div class="doc-banner">
        <span class="glyph">◇</span>
        <div><strong>${esc(featuredPillar.label.toLowerCase())}</strong>${esc(featuredPillar.one_line)}</div>
        <span class="attr">${esc(featuredPillar.id.replace(/_/g, ' '))}</span>
      </div>
    ` : '';

    const tags = [];
    if (featuredPillar) tags.push({ label: featuredPillar.label.toLowerCase(), pillar: true });
    if (scenario.in_lane) tags.push({ label: 'in-lane', pillar: false });
    if (scenario.consent_class) tags.push({ label: scenario.consent_class.split('·')[0].trim(), pillar: false });
    if (scenario.read_shape) tags.push({ label: scenario.read_shape, pillar: false });
    if (scenario.is_liminal_close) tags.push({ label: 'liminal close · live', pillar: true });

    const tagsHtml = tags.map(t => `<span class="doc-tag${t.pillar ? ' is-pillar' : ''}">${esc(t.label)}</span>`).join('');

    const roughs = (scenario.case_file ?? '').split(' · ').filter(Boolean);

    const sectionsHtml = SECTION_MAP.map((sec, i) => {
      const personasHtml = sec.personas.map(pid => {
        const persona = PERSONAS[pid];
        const read = scenario.reads?.[pid] ?? '·';
        return `<div class="persona">
          <div class="persona-name">${esc((persona?.label ?? pid).toUpperCase())}</div>
          <div class="persona-body">${esc(read)}</div>
        </div>`;
      }).join('');
      const mystic = sec.id === 'synthesis' && scenario.pillar_note ? `
        <aside class="mystic-margin">
          <div class="mystic-attr"><span class="glyph">◇</span>LIMINAL · ${esc(featuredPillar?.label ?? 'pillar')}</div>
          ${esc(scenario.pillar_note)}
        </aside>
      ` : '';
      const verdict = sec.id === 'judgment' ? `
        <div class="verdict-card">
          <div class="verdict-head">
            <span class="verdict-badge">vault · calibration</span>
            <span class="verdict-title">what the vault now knows</span>
          </div>
          <div class="verdict-body">${esc(scenario.vault_calibration ?? '·')}</div>
        </div>
      ` : '';
      return `<div class="doc-section" data-register="${sec.id}">
        <div class="doc-section-label">
          <span class="glyph">◇</span>
          <span class="reg-name">${sec.label}</span>
          <span class="sec-title">${sec.sec_title}</span>
          <span class="sec-time">+${(i + 1) * 1.4}s</span>
        </div>
        ${personasHtml}
        ${mystic}
        ${verdict}
      </div>`;
    }).join('');

    const disagreementsHtml = (scenario.disagreements ?? []).length ? `
      <div class="disagreements">
        <div class="disagreements-label">disagreement · the signal</div>
        <ul>
          ${scenario.disagreements.map(d => {
            const a = PERSONAS[d.a]?.label ?? d.a;
            const b = PERSONAS[d.b]?.label ?? d.b;
            return `<li><strong>${esc(a)} ↔ ${esc(b)}</strong> · ${esc(d.on)}</li>`;
          }).join('')}
        </ul>
      </div>
    ` : '';

    $('#workbench').innerHTML = `
      <div class="doc-area">
        ${banner}
        <div class="doc-meta">
          ${esc(product.short.toUpperCase())}<span class="dot">·</span>${esc((product.read_shape ?? 'read').toUpperCase())}<span class="dot">·</span>${esc((scenario.date ?? 'today').toUpperCase())}
        </div>
        <h1 class="doc-title">${esc(scenario.label)}</h1>
        <div class="doc-tags">${tagsHtml}</div>
        <div class="rough-label">at intake</div>
        <ul class="rough-list">
          ${roughs.map(r => `<li>${esc(r)}</li>`).join('')}
        </ul>
        <div class="invocation-divider"><span>/agency invoked · ${nowTime()}</span></div>
        ${sectionsHtml}
        ${disagreementsHtml}
      </div>
    `;
  }

  // ─── command bar ─────────────────────────────────────────────────
  function renderCommand() {
    const sc = activeScenario();
    const product = cfg.PRODUCTS.find(p => p.id === state.product);
    if (!sc) { $('#commandText').textContent = `liminal · ${product.short.toLowerCase()}`; return; }
    if (sc.kind === 'sentinel') {
      const view = state.view === 'target' ? 'target-watchboard' : state.view;
      $('#commandText').textContent = `sentinel ${view} --subject ${sc.data.shortName.toLowerCase()} --product ${state.product}`;
    } else {
      $('#commandText').textContent = `liminal ${state.product} --scenario ${sc.id} --read ${product.read_shape}`;
    }
  }

  // ─── version pin ─────────────────────────────────────────────────
  function setVersionPin() {
    $('#vPinSpec').textContent = `spec ${cfg.SPEC_VERSION}`;
    $('#vPinProto').textContent = `proto v0.4.0-merged`;
  }

  // ─── boot ────────────────────────────────────────────────────────
  setProduct('business');  // boots Business + Snowden default per Sentinel conventions
</script>

</body>
</html>
